const SCAT_COLOR={blindspot:'var(--amber)',idea:'var(--w)',outlook:'var(--w2)',custom:'var(--green)',watchlist:'var(--p)'};
const SCAT_LABEL={blindspot:'Blind Spot',idea:'Idea',outlook:'Outlook',custom:'Custom',watchlist:'Watchlist'};
const SSTAT_COLOR={pending:'var(--dim)',approved:'var(--green)',researching:'var(--w)',denied:'var(--red)'};
const SPRI={p1:{c:'var(--red)',l:'P1'},p2:{c:'var(--amber)',l:'P2'},p3:{c:'var(--w)',l:'P3'}};
const SPRI_NEXT={p1:'p2',p2:'p3',p3:'','':'p1'};

function getStrategyItems(){
  const rd=(id,k)=>{try{return localStorage.getItem('strat.'+k+'.'+id);}catch(e){return null;}};
  const enrich=it=>({
    ...it,
    status:rd(it.id,'s')||it.status||'pending',
    priority:rd(it.id,'p')||it.priority||'',
    ip:!!rd(it.id,'ip'),          // handed off to Cowork → In Progress
    cmp:rd(it.id,'cmp')==='1',    // ledger Promoted=yes → Completed
    unc:rd(it.id,'unc')==='1'     // restored-from-completed override (forces Promoted=no next sync)
  });
  const base=(window.STRATEGY_DATA?.items||[]).map(enrich);
  let custom=[];
  try{custom=JSON.parse(localStorage.getItem('strat.custom')||'[]').map(enrich);}catch(e){}
  return [...base,...custom];
}
// Workflow lane for a card — drives rendering + counts.
function _scLane(it){
  if(it.status==='denied')return 'denied';
  if(it.cmp)return 'completed';
  if(it.ip)return 'inprogress';
  if(it.status==='approved'||it.status==='researching')return 'decided';
  return 'pending';
}

function stratAct(id,next){
  let cur='pending';try{cur=localStorage.getItem('strat.s.'+id)||'pending';}catch(e){}
  const ns=cur===next?'pending':next;
  try{
    localStorage.setItem('strat.s.'+id,ns);
    if(ns!=='pending')localStorage.setItem('strat.ts.'+id,new Date().toISOString());
    // A changed/fresh decision restarts the workflow: drop In-Progress + Completed state
    // so it must be re-handed-off via → Cowork. (Deny lands it in the Denied bucket.)
    localStorage.removeItem('strat.ip.'+id);
    localStorage.removeItem('strat.cmp.'+id);
    localStorage.removeItem('strat.unc.'+id);
  }catch(e){}
  show('strategy');
}

// ── Cowork ledger sync — browser-side merge, writes straight to 00_Strategy\Dashboard ──
// One click: read the existing ledger, merge this tab's decisions BY ID (preserving each
// row's Promoted flag + any rows already there), write it back. No JSON, no .bat, no node.
const _SC_COLS=['ID','Title','Category','Status','Priority','Decided','Promoted','Notes'];
const _SC_HEADER='| '+_SC_COLS.join(' | ')+' |';
const _SC_SEP='|'+_SC_COLS.map(()=>'---').join('|')+'|';
const _SC_LEDGER='strategy_decisions_ledger.md';
const _scCell=s=>String(s==null?'':s).replace(/\r?\n+/g,' ').replace(/\|/g,'\\|').replace(/\s+/g,' ').trim();
const _scPriDisp=p=>{p=(p||'').toLowerCase();return p?p.toUpperCase():'—';};
const _scSplit=line=>line.split(/(?<!\\)\|/).slice(1,-1).map(c=>c.trim());
const _scToday=()=>new Date().toISOString().slice(0,10);

function _scTemplate(tableBlock,updatedLine){
  return '<!-- BIMpossible strategy decisions ledger — durable record of decisions made on the\n'
    +'     dashboard Strategy tab, written directly (one click) by the "→ Cowork" button.\n'
    +'     Rows are appended/updated BY ID, never overwritten — history and the Promoted flag\n'
    +'     persist. Claude Cowork READS this as the source of truth. Promotion of approved items\n'
    +'     into BIMpossible_ProgramPlan_*.md is a SEPARATE, human-reviewed step. -->\n\n'
    +'# BIMpossible — Strategy Decisions Ledger\n\n'
    +updatedLine+'\n'
    +'**Source:** dashboard Strategy tab (one-click write), merged by ID (append/update, never overwrite).\n'
    +'One row per decision. **Promoted = yes** means the item has been marked ✓ Done (handled / folded into the ProgramPlan) via the dashboard and archived off the active board; Restore sets it back to no.\n\n'
    +'## Status legend\n'
    +'- `approved` — ratified; eligible for promotion into the ProgramPlan.\n'
    +'- `researching` — needs investigation before deciding.\n'
    +'- `denied` — rejected; kept for the audit trail, never promoted.\n\n'
    +'## Decisions\n\n'
    +tableBlock+'\n';
}

// Pure merge: existing ledger text + decided items → new full text + stats.
function _scMerge(existingText,decided){
  let existingRows=[];
  if(existingText){
    const lines=existingText.split(/\r?\n/);
    const s=lines.findIndex(l=>/^\|\s*ID\s*\|/i.test(l));
    if(s>=0)for(let i=s+2;i<lines.length&&/^\s*\|/.test(lines[i]);i++){const c=_scSplit(lines[i]);if(c.length>=7&&c[0])existingRows.push(c);}
  }
  const order=existingRows.map(r=>r[0]);
  const rowById=new Map(existingRows.map(r=>[r[0],r]));
  const today=_scToday();
  let added=0,updated=0,unchanged=0;
  decided.forEach(d=>{
    const prev=rowById.get(d.id);
    const dec=d.decided_at?String(d.decided_at).slice(0,10):(prev?prev[5]:today);
    const prevPromoted=prev?(prev[6]||'no'):'no';
    const promoted=d.unc?'no':prevPromoted;   // preserve the ledger's Promoted (set during the promotion pass); Restore forces it back to no
    const row=[d.id,_scCell(d.title),_scCell(d.cat),_scCell(d.status),_scPriDisp(d.priority),dec,promoted,_scCell(d.body)];
    if(!prev){added++;order.push(d.id);}
    else if(JSON.stringify(prev)===JSON.stringify(row)){unchanged++;}
    else{updated++;}
    rowById.set(d.id,row);
  });
  const rows=order.map(id=>rowById.get(id));
  const cnt={approved:0,researching:0,denied:0};
  rows.forEach(r=>{const st=(r[3]||'').toLowerCase();if(st in cnt)cnt[st]++;});
  const tableBlock=[_SC_HEADER,_SC_SEP,...rows.map(r=>'| '+r.join(' | ')+' |')].join('\n');
  const updatedLine='**Updated:** '+today+' ('+rows.length+' decisions: '+cnt.approved+' approved · '+cnt.researching+' research · '+cnt.denied+' denied)';
  let out;
  if(!existingText){out=_scTemplate(tableBlock,updatedLine);}
  else{
    const lines=existingText.split(/\r?\n/);
    const s=lines.findIndex(l=>/^\|\s*ID\s*\|/i.test(l));
    if(s>=0){let e=s+1;while(e+1<lines.length&&/^\s*\|/.test(lines[e+1]))e++;out=[...lines.slice(0,s),...tableBlock.split('\n'),...lines.slice(e+1)].join('\n');}
    else if(/^##\s+Decisions/m.test(existingText)){out=existingText.replace(/(^##\s+Decisions.*$)/m,'$1\n\n'+tableBlock);}
    else{out=existingText.replace(/\s*$/,'')+'\n\n## Decisions\n\n'+tableBlock+'\n';}
    if(/^\*\*Updated:\*\*.*$/m.test(out))out=out.replace(/^\*\*Updated:\*\*.*$/m,updatedLine);
    else out=out.replace(/^(#\s+.*$)/m,'$1\n\n'+updatedLine);
  }
  return {out,added,updated,unchanged,total:rows.length,cnt};
}

function _scCollect(){
  return getStrategyItems().filter(i=>i.status!=='pending').map(d=>({
    id:d.id,cat:d.cat,title:d.title,body:d.body||'',status:d.status,priority:d.priority||'',unc:!!d.unc,
    decided_at:(()=>{try{return localStorage.getItem('strat.ts.'+d.id)||null;}catch(e){return null;}})()
  }));
}
// Parse the Promoted column out of an existing ledger → { id: 'yes'|'no' }.
function _scPromotedMap(text){
  const m={};if(!text)return m;
  const lines=text.split(/\r?\n/);
  const s=lines.findIndex(l=>/^\|\s*ID\s*\|/i.test(l));
  if(s>=0)for(let i=s+2;i<lines.length&&/^\s*\|/.test(lines[i]);i++){const c=_scSplit(lines[i]);if(c.length>=7&&c[0])m[c[0]]=(c[6]||'').toLowerCase();}
  return m;
}

function stratExportDecisions(){
  const decided=_scCollect();
  if(!decided.length){_scFlash('Nothing decided yet — approve, research, or deny some items first');return;}
  if(!window.showDirectoryPicker){   // non-Chromium fallback: download JSON, merge via strategy_cowork_sync.mjs
    _scDownload(JSON.stringify({generated:new Date().toISOString(),decisions:decided},null,2));return;
  }
  (async()=>{
    let dir=await _scGetHandle();
    if(dir&&dir.kind!=='directory')dir=null;
    if(dir){let p=await dir.queryPermission({mode:'readwrite'}).catch(()=>'denied');if(p!=='granted')p=await dir.requestPermission({mode:'readwrite'}).catch(()=>'denied');if(p!=='granted')dir=null;}
    if(!dir){
      _scToast('One-time setup: pick the folder  00_Strategy \\ Dashboard  — the dashboard remembers it after this.');
      try{dir=await window.showDirectoryPicker({mode:'readwrite',id:'scledger'});}
      catch(e){if(e.name!=='AbortError')_scFlash('Folder pick cancelled');return;}
      await _scStoreHandle(dir);
    }
    try{
      const fh=await dir.getFileHandle(_SC_LEDGER,{create:true});
      let existing='';try{existing=await (await fh.getFile()).text();}catch(e){}
      const r=_scMerge(existing,decided);
      const w=await fh.createWritable();await w.write(r.out);await w.close();
      // ── Reconcile workflow lanes from the merged ledger ──
      // Triggering Cowork moves every decided item to In Progress; completion is read
      // back from the ledger's Promoted column (set during the promotion pass).
      const pm=_scPromotedMap(r.out);let comp=0;
      decided.forEach(d=>{try{
        if(d.status==='approved'||d.status==='researching'){
          if(!localStorage.getItem('strat.ip.'+d.id))localStorage.setItem('strat.ip.'+d.id,new Date().toISOString());
        }
        if(pm[d.id]==='yes'&&localStorage.getItem('strat.unc.'+d.id)!=='1'){localStorage.setItem('strat.cmp.'+d.id,'1');comp++;}
        else localStorage.removeItem('strat.cmp.'+d.id);
      }catch(e){}});
      show('strategy');
      _scFlash('✅ Synced "'+dir.name+'" — '+r.total+' tracked · '+comp+' completed',true);
    }catch(e){_scFlash('Write failed: '+(e.message||e.name||'error'));}
  })();
}
function _scDownload(json){
  const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(json);a.download=_SC_LEDGER.replace('.md','.json');document.body.appendChild(a);a.click();document.body.removeChild(a);
  _scFlash('📥 Downloaded JSON — this browser cannot write files directly; use Chrome/Edge for one-click, or run strategy_cowork_sync.mjs');
}
function _scFlash(msg,ok){

  const orig=b.dataset.orig||b.textContent;b.dataset.orig=orig;b.textContent=msg;if(ok)b.style.color='var(--green)';
  clearTimeout(b._t);b._t=setTimeout(()=>{b.textContent=orig;b.style.color='';},4000);

function _scToast(msg){
  const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove('show'),4200);

function _scGetHandle(){
  return new Promise(r=>{try{const q=indexedDB.open('sc1',1);q.onupgradeneeded=()=>q.result.createObjectStore('h');q.onsuccess=()=>{const t=q.result.transaction('h','readonly'),g=t.objectStore('h').get('dir');g.onsuccess=()=>r(g.result||null);g.onerror=()=>r(null);};q.onerror=()=>r(null);}catch(e){r(null);}});
}
function _scStoreHandle(h){
  return new Promise(r=>{try{const q=indexedDB.open('sc1',1);q.onupgradeneeded=()=>q.result.createObjectStore('h');q.onsuccess=()=>{const t=q.result.transaction('h','readwrite');t.objectStore('h').put(h,'dir');t.oncomplete=()=>r();t.onerror=()=>r();};q.onerror=()=>r();}catch(e){r();}});
}

function strategyView(){
  const items=getStrategyItems();
  let catF='all',laneF='all',sortF='pri';
  try{
    catF=localStorage.getItem('strat.cat')||'all';
    laneF=localStorage.getItem('strat.status')||'all';
    sortF=localStorage.getItem('strat.sort')||'pri';
  }catch(e){}
  if(laneF==='approved'||laneF==='researching')laneF='decided';   // migrate old saved filters
  if(laneF==='archived')laneF='completed';

  // Assign every card to a workflow lane.
  const lane={};items.forEach(it=>lane[it.id]=_scLane(it));
  const byLane={pending:[],decided:[],inprogress:[],completed:[],denied:[]};
  items.forEach(it=>byLane[lane[it.id]].push(it));

  const sortItems=arr=>{const a=[...arr];if(sortF==='pri')a.sort((x,y)=>PRIORD[x.priority||'']-PRIORD[y.priority||'']);else if(sortF==='alpha')a.sort((x,y)=>x.title.localeCompare(y.title));return a;};

  if(byLane.inprogress.length)cmdItems.push(`<span class="badge st-ok">${byLane.inprogress.length} in progress</span>`);
  if(byLane.decided.length)cmdItems.push(`<span class="badge st-info">${byLane.decided.length} decided</span>`);
  if(catCount.blindspot)cmdItems.push(`<span class="badge st-warn">${catCount.blindspot} blind spot${catCount.blindspot!==1?'s':''}</span>`);
  if(!cmdItems.length){
    if(activeItems.length)cmdItems.push(`<span style="font-size:var(--ts-sm);color:var(--muted)">${activeItems.length} items — no priorities or decisions yet</span>`);
    else cmdItems.push(`<span style="font-size:var(--ts-sm);color:var(--status-ok)">Strategy clear — add ideas to track them here</span>`);
  }
  let h=`<div class="crumbs">Strategy</div><h2 class="page">Strategy &amp; Ideas</h2>`;
  h+=`<div class="ov-cmd ${cmdClass}">
    <div class="ov-cmd-dot"></div>
    <div class="ov-cmd-items">${cmdItems.join('')}</div>

  </div>`;

  // Quick Capture panel
  let capOpen=false;try{capOpen=localStorage.getItem('strat.capture')==='1';}catch(e){}
  const dumps=getDumps();
  h+=`<div class="strat-capture">
    <div class="strat-cap-hdr" onclick="toggleCapture()">

  if(capOpen){
    h+=`<div class="strat-cap-body">
      <textarea class="strat-cap-ta" id="cap-ta" placeholder="Dump an idea, observation, question, or risk — hit Save or Ctrl+Enter. Promote to a card later." onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter'){event.preventDefault();saveDump();}"></textarea>

    if(dumps.length){
      h+=`<div class="cap-list">`;

        const ts=ago<1?'just now':ago<60?ago+'m ago':ago<1440?Math.floor(ago/60)+'h ago':new Date(d.ts).toLocaleDateString();
        const safe=d.id.replace(/'/g,"\\'");

          <span class="cap-ts">${ts}</span>
          <span class="cap-text">${esc(d.text.length>180?d.text.slice(0,180)+'…':d.text)}</span>
          <div class="cap-acts">
            <button class="cap-promote" onclick="promoteDump('${safe}')">→ Card</button>
            <button class="cap-del" onclick="deleteDump('${safe}')">✕</button>

      });
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;

  // Category tabs
  const CATS=[['all','All'],['blindspot','Blind Spots'],['idea','Ideas'],['outlook','Outlook'],['watchlist','Watchlist'],['custom','Custom']];
  h+=`<div class="strat-tabs">`;
  CATS.forEach(([c,lbl])=>{
    if(c!=='all'&&!catCount[c]&&!byLane.completed.some(i=>i.cat===c))return;

  });
  h+=`</div>`;

  // Lane filter pills + sort + add
  h+=`<div class="strat-sr">`;
  [['all','All',activeItems.length],['pending','Pending',byLane.pending.length],['decided','Decided',byLane.decided.length],['inprogress','In Progress',byLane.inprogress.length],['completed','Completed',byLane.completed.length]].forEach(([k,lbl,n])=>{
    h+=`<button class="strat-sp${laneF===k?' active':''}" onclick="stratFilter('status','${k}')">${lbl} ${n}</button>`;
  });
  h+=`<div style="margin-left:auto;display:flex;gap:6px;align-items:center">
    <select onchange="stratFilter('sort',this.value)" style="background:rgba(22,30,54,.9);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;outline:none;">
      <option value="pri"${sortF==='pri'?' selected':''}>↑ Priority</option>

  // Add idea form
  h+=`<div id="strat-form" style="display:none"><div class="strat-form">

    <div class="strat-fbtns">

      <button class="sf-save" onclick="saveIdea()">Save Idea</button>
    </div>
  </div></div>`;

  // ── Grouped sections: active cards on top, minimized Completed stacked beneath, per group ──
  const showLane=k=>laneF==='all'||laneF===k;
  const cats=catF==='all'?['blindspot','idea','outlook','watchlist','custom']:[catF];
  let anySection=false;
  cats.forEach(c=>{
    const actInCat=sortItems(activeItems.filter(i=>i.cat===c&&showLane(lane[i.id])));
    const showComp=laneF==='all'||laneF==='completed';
    const compInCat=showComp?sortItems(byLane.completed.filter(i=>i.cat===c)):[];
    if(!actInCat.length&&!compInCat.length)return;
    anySection=true;
    h+=`<div class="strat-section">
      <div class="strat-section-hdr"><span class="nm" style="color:${SCAT_COLOR[c]||'var(--muted)'}">${SCAT_LABEL[c]||c}</span><span class="ct">${actInCat.length} active${compInCat.length?` · ${compInCat.length} done`:''}</span></div>`;
    if(actInCat.length){
      h+=`<div class="strat-grid">`;
      actInCat.forEach(it=>{h+=_stratCard(it,lane[it.id]);});
      h+=`</div>`;
    } else if(compInCat.length){
      h+=`<div class="strat-sec-empty">All resolved — completed work below.</div>`;
    }
    if(compInCat.length){
      h+=`<div class="strat-minstack">`;
      compInCat.forEach(it=>{
        const safe=it.id.replace(/'/g,"\\'");
        h+=`<div class="strat-min completed"><span class="dot"></span><span class="mt" title="${esc(it.title)}">${esc(it.title)}</span><span class="mc">done</span><button class="mr" title="Restore to In Progress" onclick="stratRestoreCompleted('${safe}')">↩</button></div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  if(!anySection){
    h+=`<p class="empty" style="margin-top:24px;font-size:var(--ts-base)">${laneF==='completed'?'Nothing completed yet — finished work stacks here as the ledger marks it promoted.':'No items match — try a different filter.'}</p>`;
  }

  // ── Single collapsible Denied bucket — out of the main flow, kept for review ──
  if(byLane.denied.length){
    let dOpen=false;try{dOpen=localStorage.getItem('strat.deniedOpen')==='1';}catch(e){}
    h+=`<div class="strat-denied">
      <div class="strat-denied-hdr" onclick="toggleDenied()"><span style="color:var(--red);font-weight:700">✕</span><span class="dl">Denied</span><span class="dc">${byLane.denied.length}</span><span style="margin-left:auto;color:var(--dim);font-size:12px">${dOpen?'▲ hide':'▼ review'}</span></div>`;
    if(dOpen){
      h+=`<div class="strat-denied-body">`;
      sortItems(byLane.denied).forEach(it=>{
        const safe=it.id.replace(/'/g,"\\'");
        const isCustom=it.id.startsWith('custom-');
        h+=`<div class="strat-min denied"><span class="dot"></span><span class="mt" title="${esc(it.title)}">${esc(it.title)}</span><span class="mc" style="color:rgba(248,113,113,.6)">${SCAT_LABEL[it.cat]||it.cat}</span><button class="mr" title="Restore to Pending" onclick="stratRestoreDenied('${safe}')">↩</button>${isCustom?`<button class="mr" title="Delete" onclick="deleteIdea('${safe}')">🗑</button>`:''}</div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  }

  return h;
}
// Full active card (pending / decided / in-progress). Denied + completed render minimized.
function _stratCard(it,ln){
  const st=it.status||'pending';

  const isCustom=it.id.startsWith('custom-');
  const safe=it.id.replace(/'/g,"\\'");

  const inProg=ln==='inprogress';
  return `<div class="strat-card${inProg?' inprogress':''}">
    <div class="strat-ct">
      <span class="strat-cat-lbl" style="color:${SCAT_COLOR[it.cat]||'var(--dim)'}">${SCAT_LABEL[it.cat]||it.cat}</span>
      <div style="display:flex;align-items:center;gap:6px">
        ${inProg?`<span class="strat-ip-badge">⟳ In progress</span>`:''}
        <button onclick="stratPri('${safe}')" title="Cycle priority: P1→P2→P3→none" style="background:transparent;border:1px solid;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.05em;${priStyle}">${pri?SPRI[pri].l:'—'}</button>
        <span class="strat-stat-lbl" style="color:${SSTAT_COLOR[st]||'var(--dim)'}">${st}</span>
      </div>
    </div>
    <div class="strat-title">${esc(it.title)}</div>
    <div class="strat-body">${esc(it.body)}</div>
    <div class="strat-acts">
      <button class="sa sa-ok${st==='approved'?' on':''}" onclick="stratAct('${safe}','approved')">✓ Approve</button>

      ${isCustom?`<button class="sa sa-del" onclick="deleteIdea('${safe}')" title="Delete">🗑</button>`:''}
    </div>
  </div>`;
}

const CPAL=['#6ea8ff','#a78bfa','#34d399','#fbbf24','#f87171','#22d3ee','#fb923c','#a3e635','#f472b6','#60a5fa'];
function arcGauge(pct,size,color,big,sub){
  pct=Math.max(0,Math.min(100,pct));
  const sw=Math.max(8,Math.round(size*.085)),r=(size-sw)/2-1,c=2*Math.PI*r,arc=0.75;

    <svg width="${size}" height="${size}" style="transform:rotate(135deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--track)" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${c*arc} ${c}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${c*arc*pct/100} ${c}"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">

      ${sub?`<div style="font-size:${Math.max(9,Math.round(size*.072))}px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em">${sub}</div>`:''}
    </div></div>`;
}
function ringChart(segs,size,big,sub){
  const sw=Math.max(10,Math.round(size*.15)),r=(size-sw)/2-1,c=2*Math.PI*r;
  const total=segs.reduce((s,x)=>s+x.value,0)||1;let off=0;
  const arcs=segs.map(x=>{const len=c*(x.value/total);const el=`<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${x.color}" stroke-width="${sw}" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-off}"><title>${esc(x.label)}</title></circle>`;off+=len;return el;}).join('');
  return`<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--track)" stroke-width="${sw}"/>${arcs}</svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="font-family:Sora;font-size:${Math.round(size*.15)}px;font-weight:700;color:var(--text);line-height:1.1">${big}</div>

}
function legend(segs){

function sankeyFlow(w,totals){
  const types=(w.subagentTypes||[]).slice(0,7);
  if(!types.length)return '<p class="sub" style="margin:0">No subagent spawns in the scanned window.</p>';
  const W=820,padT=14,padB=14,gap=10,H=Math.max(220,types.length*54);
  const totalSpawn=types.reduce((a,b)=>a+b.count,0)||1;
  const usable=H-padT-padB-(types.length-1)*gap;
  let y=padT;const tN=types.map((t,i)=>{const hh=Math.max(20,usable*(t.count/totalSpawn));const o={...t,y,h:hh,color:CPAL[i%CPAL.length]};y+=hh+gap;return o;});
  const sX=24,sW=110,mX=210,mW=120,tX=400,tW=180,oX=684,oW=112,sMid=H/2,mMid=H/2;
  const completed=Math.round(totalSpawn*w.successRate/100),errored=Math.max(0,totalSpawn-completed);
  const cH=Math.max(26,(H-padT-padB-gap)*(completed/totalSpawn)),eH=Math.max(14,errored>0?(H-padT-padB-gap)*(errored/totalSpawn):0),cY=padT,eY=cY+cH+gap;
  const link=(x1,y1,x2,y2,wd,col,op)=>{const mx=(x1+x2)/2;return`<path d="M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="${Math.max(1,wd)}" stroke-opacity="${op}" stroke-linecap="round"/>`;};
  let links=link(sX+sW,sMid,mX,mMid,16,'#6ea8ff',.3);
  for(const t of tN){const cy=t.y+t.h/2,wd=Math.max(2,t.h*.5);links+=link(mX+mW,mMid,tX,cy,wd,t.color,.3);links+=link(tX+tW,cy,oX,cY+cH/2,Math.max(2,wd*w.successRate/100),'#34d399',.26);if(errored>0)links+=link(tX+tW,cy,oX,eY+eH/2,Math.max(1,wd*(1-w.successRate/100)),'#f87171',.3);}
  const node=(x,yy,ww,hh,fill,label,badge)=>`<rect x="${x}" y="${yy}" width="${ww}" height="${hh}" rx="7" fill="${fill}" fill-opacity="0.17" stroke="${fill}" stroke-opacity="0.6"/><text x="${x+10}" y="${yy+hh/2+1}" dominant-baseline="middle" font-size="12" fill="#e2e6f3" font-family="Inter">${esc(label)}</text>${badge!=null?`<text x="${x+ww-9}" y="${yy+hh/2+1}" text-anchor="end" dominant-baseline="middle" font-size="11" fill="#8491a8" font-family="Inter">${badge}</text>`:''}`;
  let nodes=node(sX,sMid-22,sW,44,'#6ea8ff','Sessions',totals.sessions)+node(mX,mMid-22,mW,44,'#a78bfa','Main agent',totalSpawn);
  for(const t of tN)nodes+=node(tX,t.y,tW,t.h,t.color,t.type.length>17?t.type.slice(0,16)+'…':t.type,t.count);
  nodes+=node(oX,cY,oW,cH,'#34d399','Completed',completed)+(errored>0?node(oX,eY,oW,eH,'#f87171','Error',errored):'');
  const head=[['ORIGIN',sX],['MAIN AGENT',mX],['SUBAGENT TYPES',tX],['OUTCOMES',oX]].map(([t,x])=>`<text x="${x}" y="9" font-size="9" fill="#4d5870" font-family="Inter" letter-spacing="1">${t}</text>`).join('');
  return`<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H+18}" width="100%" style="min-width:680px;display:block">${head}<g transform="translate(0,14)">${links}${nodes}</g></svg></div>`;
}
function heatGrid(days){
  if(!days||!days.length)return '';
  const max=Math.max(...days.map(d=>d.cost),1),byDate={};days.forEach(d=>byDate[d.date]=d.cost);
  const first=new Date(days[0].date+'T00:00:00Z'),last=new Date(days[days.length-1].date+'T00:00:00Z');
  const start=new Date(first);start.setUTCDate(start.getUTCDate()-start.getUTCDay());
  const cells=[];let cur=new Date(start);
  while(cur<=last){const ds=cur.toISOString().slice(0,10);cells.push({ds,v:byDate[ds]||0,col:Math.floor((cur-start)/6048e5),row:cur.getUTCDay()});cur.setUTCDate(cur.getUTCDate()+1);}
  const cols=Math.max(...cells.map(c=>c.col))+1,cell=14,gap=4,W=cols*(cell+gap),H=7*(cell+gap);
  const COL=['rgba(110,168,255,.06)','rgba(110,168,255,.3)','rgba(110,168,255,.52)','rgba(110,168,255,.74)','#6ea8ff'];
  const rects=cells.map(c=>{const lv=c.v===0?0:Math.min(4,Math.ceil(c.v/max*4));return`<rect x="${c.col*(cell+gap)}" y="${c.row*(cell+gap)}" width="${cell}" height="${cell}" rx="3" fill="${COL[lv]}"><title>${c.ds}: $${c.v.toFixed(2)}</title></rect>`;}).join('');
  return`<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" width="${Math.min(W,640)}" height="${H}" style="display:block">${rects}</svg></div>`;
}

function _ago(iso){
  if(!iso)return '';
  const A=window.DASHBOARD_AGENTS;
  const now=A&&A.generated?Date.parse(A.generated):Date.parse(iso);
  const m=Math.round((now-Date.parse(iso))/60000);
  if(m<1)return 'just now'; if(m<60)return m+'m ago';
  const hr=Math.round(m/60); if(hr<24)return hr+'h ago';
  return Math.round(hr/24)+'d ago';
}

function reportBody(){

function mdToHtml(md){
  md=md.replace(/\r/g,'');
  const e=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inl=s=>e(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  const lines=md.split('\n'),out=[];let i=0;
  while(i<lines.length){
    const ln=lines[i];
    if(/^```/.test(ln)){const c=[];i++;while(i<lines.length&&!/^```/.test(lines[i])){c.push(e(lines[i]));i++;}i++;out.push('<pre class="mdcode">'+c.join('\n')+'</pre>');continue;}
    const hm=ln.match(/^(#{1,6})\s+(.*)/);
    if(hm){out.push('<h'+hm[1].length+'>'+inl(hm[2])+'</h'+hm[1].length+'>');i++;continue;}
    if(/^\|/.test(ln)&&i+1<lines.length&&/^\|[\s:|-]+\|\s*$/.test(lines[i+1])){
      const head=ln.split('|').slice(1,-1).map(c=>'<th>'+inl(c.trim())+'</th>').join('');i+=2;const rows=[];
      while(i<lines.length&&/^\|/.test(lines[i])){rows.push('<tr>'+lines[i].split('|').slice(1,-1).map(c=>'<td>'+inl(c.trim())+'</td>').join('')+'</tr>');i++;}

<div class="tk-controls">
  <input class="tk-search" id="tkSearch" placeholder="Search tools by name, command, or description…" oninput="tkApply()">
  <div class="tk-chips">${CHIPS.map((c,i)=>`<button class="tk-chip${i===0?' on':''}" onclick="tkSetCat(this,'${c[0]}')">${esc(c[1])}</button>`).join('')}</div>
</div>`;
  SECT.forEach(s=>{
    h+=`<section class="tk-section" data-cat="${s.cat}">
<div class="tk-sec-head"><div class="tk-sec-top"><h3>${esc(s.title)}</h3><span class="tk-sec-count">${s.items.length}</span></div><div class="tk-sec-ctx">${esc(s.ctx)}</div></div>
<div class="tk-grid">`;
    s.items.forEach(it=>{
      const search=(it.cmd+' '+it.name+' '+it.desc+' '+(it.where||'')+' '+(it.trigger||'')).toLowerCase();
      h+=`<article class="tk-card" data-cat="${s.cat}" data-search="${esc(search)}">
<div class="tk-card-h"><span class="tk-name">${esc(it.name)}</span><span class="tk-tag c-${s.cat}">${esc(s.cat)}</span></div>
<p class="tk-desc">${esc(it.desc)}</p>
${it.trigger?`<div class="tk-trig">→ ${esc(it.trigger)}</div>`:''}
<div class="tk-card-f"><button class="tk-cmd" onclick='tkCopy(this,${JSON.stringify(it.cmd)})' title="Copy command"><span>${esc(it.cmd)}</span>${CP}</button>${it.where?`<span class="tk-where">${esc(it.where)}</span>`:''}</div>
</article>`;
    });
    h+=`</div></section>`;
  });
  h+=`<div class="tk-empty tk-hidden" id="tkEmpty">No tools match — try a different search or category.</div>`;
  return h;
}
let tkCat='all';
function tkSetCat(btn,cat){tkCat=cat;document.querySelectorAll('.tk-chip').forEach(c=>c.classList.toggle('on',c===btn));tkApply();}
function tkApply(){
  const q=(document.getElementById('tkSearch').value||'').toLowerCase().trim();
  document.querySelectorAll('.tk-card').forEach(c=>{
    const okCat=tkCat==='all'||c.dataset.cat===tkCat;
    const okQ=!q||c.dataset.search.includes(q);
    c.classList.toggle('tk-hidden',!(okCat&&okQ));
  });
  document.querySelectorAll('.tk-section').forEach(s=>{
    s.classList.toggle('tk-hidden',![...s.querySelectorAll('.tk-card')].some(c=>!c.classList.contains('tk-hidden')));
  });
  const any=[...document.querySelectorAll('.tk-card')].some(c=>!c.classList.contains('tk-hidden'));
  const e=document.getElementById('tkEmpty');if(e)e.classList.toggle('tk-hidden',any);
}
function tkCopy(btn,cmd){
  navigator.clipboard.writeText(cmd).catch(()=>{});
  btn.classList.add('done');const sp=btn.querySelector('span');if(!sp)return;const o=sp.textContent;sp.textContent='copied';
  setTimeout(()=>{sp.textContent=o;btn.classList.remove('done');},1300);
}

function show(id){
  closePP();
  try{localStorage.setItem('dash.tab',id);}catch(e){}
  document.querySelectorAll('.nav').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  const m=document.getElementById('main');
  if(id==='overview')m.innerHTML=overview();
  else if(id==='audit')m.innerHTML=auditView();
  else if(id==='graph')m.innerHTML=codebaseView();
  else if(id==='roadmap')m.innerHTML=roadmapView();
  else if(id==='strategy')m.innerHTML=strategyView();
  else if(id==='usage')m.innerHTML=monitorView();
  else if(id==='toolkit')m.innerHTML=toolkitView();
  else{const p=D.projects.find(q=>q.id===id);m.innerHTML=project(p);}
  m.querySelectorAll('[data-id]').forEach(el=>{if(!el.classList.contains('nav'))el.onclick=()=>show(el.dataset.id);});
  m.querySelectorAll('.ph-click').forEach(el=>{el.onclick=e=>{e.stopPropagation();openPP(el.dataset.pk,el);};});
  m.querySelectorAll('.mtab[data-mt]').forEach(el=>{el.onclick=()=>{window._mtab=el.dataset.mt;try{localStorage.setItem('dash.mtab',el.dataset.mt);}catch(e){} show('usage');};});
  m.querySelectorAll('.mtab[data-ct]').forEach(el=>{el.onclick=()=>{window._ctab=el.dataset.ct;try{localStorage.setItem('dash.ctab',el.dataset.ct);}catch(e){} show('graph');};});
  animate();
}

// ── Init ──────────────────────────────────────────────────────────────────
buildSide();
let init='overview';
try{
  let s=localStorage.getItem('dash.tab');
  window._mtab=localStorage.getItem('dash.mtab')||'usage';
  const _savedCtab=localStorage.getItem('dash.ctab');
  window._ctab=(_savedCtab==='network'||_savedCtab==='dashboard'||_savedCtab==='report')?_savedCtab:null;
  if(s==='agents'||s==='health'){window._mtab=s;s='usage';}
  if(s&&(s==='overview'||s==='audit'||s==='graph'||s==='roadmap'||s==='strategy'||s==='usage'||s==='toolkit'||D.projects.some(p=>p.id===s)))init=s;
}catch(e){}
show(init);
</script>
</body>
</html>
