  h+=`<div class="strat-capture">
    <div class="strat-cap-hdr" onclick="toggleCapture()">
      <span class="strat-cap-title">⚡ Quick Capture
        ${dumps.length?`<span class="strat-cap-cnt">${dumps.length}</span>`:''}
        <span style="font-size:11px;color:var(--muted);font-weight:400">— dump ideas before they disappear</span>
      </span>
      <span style="color:var(--dim);font-size:13px">${capOpen?'▲':'▼'}</span>
    </div>`;
  if(capOpen){
    h+=`<div class="strat-cap-body">
      <textarea class="strat-cap-ta" id="cap-ta" placeholder="Dump an idea, observation, question, or risk — hit Save or Ctrl+Enter. Promote to a card later." onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter'){event.preventDefault();saveDump();}"></textarea>
      <button class="strat-cap-save" onclick="saveDump()">Save ↵</button>`;
    if(dumps.length){
      h+=`<div class="cap-list">`;
      dumps.forEach(d=>{
        const ago=Math.floor((Date.now()-new Date(d.ts))/60000);
        const ts=ago<1?'just now':ago<60?ago+'m ago':ago<1440?Math.floor(ago/60)+'h ago':new Date(d.ts).toLocaleDateString();
        const safe=d.id.replace(/'/g,"\\'");
        h+=`<div class="cap-item">
          <span class="cap-ts">${ts}</span>
          <span class="cap-text">${esc(d.text.length>180?d.text.slice(0,180)+'…':d.text)}</span>
          <div class="cap-acts">
            <button class="cap-promote" onclick="promoteDump('${safe}')">→ Card</button>
            <button class="cap-del" onclick="deleteDump('${safe}')">✕</button>
          </div>
        </div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;

  // Stat strip — Active total excludes Completed + Denied
  h+=`<div class="stat-row">
    <div class="stat info"><div class="v num">${activeItems.length}</div><div class="l">Active</div></div>
    <div class="stat warn"><div class="v num">${byLane.pending.length}</div><div class="l">Pending</div></div>
    <div class="stat ok"><div class="v num">${byLane.decided.length}</div><div class="l">Decided</div></div>
    <div class="stat info"><div class="v num">${byLane.inprogress.length}</div><div class="l">In Progress</div></div>
    <div class="stat"><div class="v num">${byLane.completed.length}</div><div class="l">Completed</div></div>
    <div class="stat bad"><div class="v num">${byLane.denied.length}</div><div class="l">Denied</div></div>
  </div>`;

  // Category tabs
  const CATS=[['all','All'],['blindspot','Blind Spots'],['idea','Ideas'],['outlook','Outlook'],['watchlist','Watchlist'],['custom','Custom']];
  h+=`<div class="strat-tabs">`;
  CATS.forEach(([c,lbl])=>{
    if(c!=='all'&&!catCount[c]&&!byLane.completed.some(i=>i.cat===c))return;
    h+=`<button class="strat-tab${catF===c?' active':''}" onclick="stratFilter('cat','${c}')">${lbl}<span class="tc">${catCount[c]||0}</span></button>`;
  });
  h+=`</div>`;

  // Lane filter pills + sort + add
  h+=`<div class="strat-sr">`;

    h+=`<button class="strat-sp${laneF===k?' active':''}" onclick="stratFilter('status','${k}')">${lbl} ${n}</button>`;
  });

const CPAL=['#6ea8ff','#a78bfa','#34d399','#fbbf24','#f87171','#22d3ee','#fb923c','#a3e635','#f472b6','#60a5fa'];
function arcGauge(pct,size,color,big,sub){
  pct=Math.max(0,Math.min(100,pct));
  const sw=Math.max(8,Math.round(size*.085)),r=(size-sw)/2-1,c=2*Math.PI*r,arc=0.75;
  return`<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0">
    <svg width="${size}" height="${size}" style="transform:rotate(135deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--track)" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${c*arc} ${c}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${c*arc*pct/100} ${c}"/>
    </svg>

    </div></div>`;
}
function ringChart(segs,size,big,sub){
  const sw=Math.max(10,Math.round(size*.15)),r=(size-sw)/2-1,c=2*Math.PI*r;
  const total=segs.reduce((s,x)=>s+x.value,0)||1;let off=0;
  const arcs=segs.map(x=>{const len=c*(x.value/total);const el=`<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${x.color}" stroke-width="${sw}" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-off}"><title>${esc(x.label)}</title></circle>`;off+=len;return el;}).join('');
  return`<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--track)" stroke-width="${sw}"/>${arcs}</svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="font-family:Sora;font-size:${Math.round(size*.15)}px;font-weight:700;color:var(--text);line-height:1.1">${big}</div>

}
function legend(segs){

function sankeyFlow(w,totals){
  const types=(w.subagentTypes||[]).slice(0,7);
  if(!types.length)return '<p class="sub" style="margin:0">No subagent spawns in the scanned window.</p>';
  const W=820,padT=14,padB=14,gap=10,H=Math.max(220,types.length*54);
  const totalSpawn=types.reduce((a,b)=>a+b.count,0)||1;
  const usable=H-padT-padB-(types.length-1)*gap;
  let y=padT;const tN=types.map((t,i)=>{const hh=Math.max(20,usable*(t.count/totalSpawn));const o={...t,y,h:hh,color:CPAL[i%CPAL.length]};y+=hh+gap;return o;});
  const sX=24,sW=110,mX=210,mW=120,tX=400,tW=180,oX=684,oW=112,sMid=H/2,mMid=H/2;
  const completed=Math.round(totalSpawn*w.successRate/100),errored=Math.max(0,totalSpawn-completed);
  const cH=Math.max(26,(H-padT-padB-gap)*(completed/totalSpawn)),eH=Math.max(14,errored>0?(H-padT-padB-gap)*(errored/totalSpawn):0),cY=padT,eY=cY+cH+gap;
  const link=(x1,y1,x2,y2,wd,col,op)=>{const mx=(x1+x2)/2;return`<path d="M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="${Math.max(1,wd)}" stroke-opacity="${op}" stroke-linecap="round"/>`;};
  let links=link(sX+sW,sMid,mX,mMid,16,'#6ea8ff',.3);
  for(const t of tN){const cy=t.y+t.h/2,wd=Math.max(2,t.h*.5);links+=link(mX+mW,mMid,tX,cy,wd,t.color,.3);links+=link(tX+tW,cy,oX,cY+cH/2,Math.max(2,wd*w.successRate/100),'#34d399',.26);if(errored>0)links+=link(tX+tW,cy,oX,eY+eH/2,Math.max(1,wd*(1-w.successRate/100)),'#f87171',.3);}
  const node=(x,yy,ww,hh,fill,label,badge)=>`<rect x="${x}" y="${yy}" width="${ww}" height="${hh}" rx="7" fill="${fill}" fill-opacity="0.17" stroke="${fill}" stroke-opacity="0.6"/><text x="${x+10}" y="${yy+hh/2+1}" dominant-baseline="middle" font-size="12" fill="#e2e6f3" font-family="Inter">${esc(label)}</text>${badge!=null?`<text x="${x+ww-9}" y="${yy+hh/2+1}" text-anchor="end" dominant-baseline="middle" font-size="11" fill="#8491a8" font-family="Inter">${badge}</text>`:''}`;
  let nodes=node(sX,sMid-22,sW,44,'#6ea8ff','Sessions',totals.sessions)+node(mX,mMid-22,mW,44,'#a78bfa','Main agent',totalSpawn);
  for(const t of tN)nodes+=node(tX,t.y,tW,t.h,t.color,t.type.length>17?t.type.slice(0,16)+'…':t.type,t.count);
  nodes+=node(oX,cY,oW,cH,'#34d399','Completed',completed)+(errored>0?node(oX,eY,oW,eH,'#f87171','Error',errored):'');
  const head=[['ORIGIN',sX],['MAIN AGENT',mX],['SUBAGENT TYPES',tX],['OUTCOMES',oX]].map(([t,x])=>`<text x="${x}" y="9" font-size="9" fill="#4d5870" font-family="Inter" letter-spacing="1">${t}</text>`).join('');
  return`<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H+18}" width="100%" style="min-width:680px;display:block">${head}<g transform="translate(0,14)">${links}${nodes}</g></svg></div>`;
}
function heatGrid(days){
  if(!days||!days.length)return '';
  const max=Math.max(...days.map(d=>d.cost),1),byDate={};days.forEach(d=>byDate[d.date]=d.cost);
  const first=new Date(days[0].date+'T00:00:00Z'),last=new Date(days[days.length-1].date+'T00:00:00Z');
  const start=new Date(first);start.setUTCDate(start.getUTCDate()-start.getUTCDay());
  const cells=[];let cur=new Date(start);
  while(cur<=last){const ds=cur.toISOString().slice(0,10);cells.push({ds,v:byDate[ds]||0,col:Math.floor((cur-start)/6048e5),row:cur.getUTCDay()});cur.setUTCDate(cur.getUTCDate()+1);}
  const cols=Math.max(...cells.map(c=>c.col))+1,cell=14,gap=4,W=cols*(cell+gap),H=7*(cell+gap);
  const COL=['rgba(110,168,255,.06)','rgba(110,168,255,.3)','rgba(110,168,255,.52)','rgba(110,168,255,.74)','#6ea8ff'];
  const rects=cells.map(c=>{const lv=c.v===0?0:Math.min(4,Math.ceil(c.v/max*4));return`<rect x="${c.col*(cell+gap)}" y="${c.row*(cell+gap)}" width="${cell}" height="${cell}" rx="3" fill="${COL[lv]}"><title>${c.ds}: $${c.v.toFixed(2)}</title></rect>`;}).join('');
  return`<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" width="${Math.min(W,640)}" height="${H}" style="display:block">${rects}</svg></div>`;
}

}

function reportBody(){
  setTimeout(async()=>{
    const el=document.getElementById('cbreport');if(!el)return;
    try{const r=await fetch('codebase/GRAPH_REPORT.md',{cache:'no-store'});if(!r.ok)throw 0;el.innerHTML=mdToHtml(await r.text());}
    catch(e){el.innerHTML='<p class="sub">Could not load GRAPH_REPORT.md — run <code>node codebase_sync.mjs</code> to bundle it.</p>';}
  },0);
  const cm=window.DASHBOARD_CODEBASE;
  return`<p class="sub">Full graphify report for the BIMpossible backend${cm?` — ${cm.nodes.toLocaleString()} nodes · ${cm.links.toLocaleString()} edges · ${cm.communities} communities @ <code>${esc(cm.commit)}</code>`:''}.</p>
    <div class="card fade" style="max-height:78vh;overflow:auto"><div id="cbreport" class="mdbody"><p class="sub" style="margin:0">Loading report…</p></div></div>`;
}
function mdToHtml(md){
  md=md.replace(/\r/g,'');
  const e=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inl=s=>e(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  const lines=md.split('\n'),out=[];let i=0;
  while(i<lines.length){
    const ln=lines[i];
    if(/^```/.test(ln)){const c=[];i++;while(i<lines.length&&!/^```/.test(lines[i])){c.push(e(lines[i]));i++;}i++;out.push('<pre class="mdcode">'+c.join('\n')+'</pre>');continue;}
    const hm=ln.match(/^(#{1,6})\s+(.*)/);
    if(hm){out.push('<h'+hm[1].length+'>'+inl(hm[2])+'</h'+hm[1].length+'>');i++;continue;}
    if(/^\|/.test(ln)&&i+1<lines.length&&/^\|[\s:|-]+\|\s*$/.test(lines[i+1])){
      const head=ln.split('|').slice(1,-1).map(c=>'<th>'+inl(c.trim())+'</th>').join('');i+=2;const rows=[];
      while(i<lines.length&&/^\|/.test(lines[i])){rows.push('<tr>'+lines[i].split('|').slice(1,-1).map(c=>'<td>'+inl(c.trim())+'</td>').join('')+'</tr>');i++;}
      out.push('<table class="mdtable"><thead><tr>'+head+'</tr></thead><tbody>'+rows.join('')+'</tbody></table>');continue;}
    if(/^\s*[-*]\s+/.test(ln)){const it=[];while(i<lines.length&&/^\s*[-*]\s+/.test(lines[i])){it.push('<li>'+inl(lines[i].replace(/^\s*[-*]\s+/,''))+'</li>');i++;}out.push('<ul>'+it.join('')+'</ul>');continue;}
    if(/^(---+|\*\*\*+)\s*$/.test(ln)){out.push('<hr>');i++;continue;}
    if(/^\s*$/.test(ln)){i++;continue;}
    out.push('<p>'+inl(ln)+'</p>');i++;
  }
  return out.join('');
}
function codebaseView(){
  let ct=window._ctab||'metrics';
  if(!CTABS.some(t=>t[0]===ct))ct='metrics';
  let h='<div class="crumbs">Codebase</div><h2 class="page">Backend Knowledge Graph</h2>';

  else if(ct==='dashboard')h+='<p class="sub">The graphify dashboard for the BIMpossible backend.</p>'+codeFrame('codebase/graph-dashboard','Graphify dashboard',GO+'dashboard.html');
  else if(ct==='report')h+=reportBody();
  return h;
}

}
