<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-Dev Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080d;--panel:rgba(16,20,34,.82);--panel2:#131928;--panel3:#0f1422;
  --border:rgba(255,255,255,.065);--border-hi:rgba(110,140,255,.38);
  --text:#e2e6f3;--muted:#8491a8;--dim:#4d5870;
  --w:#6ea8ff;--w2:#a78bfa;--w3:#34d399;
  --p:#fb923c;--p2:#fbbf24;
  --green:#34d399;--amber:#fbbf24;--red:#f87171;--grey:#5d6880;
  --track:rgba(255,255,255,.055);--r:14px;
  /* type scale — 6 steps, nothing outside these */
  --ts-xs:10px;--ts-sm:12px;--ts-base:13.5px;--ts-md:16px;--ts-lg:21px;--ts-xl:24px;
  /* spacing rhythm — 4px base unit */
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:36px;--sp-7:48px;
  /* status semantics — one system, five roles */
  --status-ok:#34d399;--status-warn:#fbbf24;--status-danger:#f87171;--status-info:#6ea8ff;--status-dim:#5d6880;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--text);
  font:var(--ts-base)/1.6 Inter,"Segoe UI",system-ui,sans-serif;
  background-image:
    radial-gradient(ellipse 1000px 600px at 8% -8%,rgba(70,110,255,.09),transparent 58%),
    radial-gradient(ellipse 700px 500px at 92% 12%,rgba(140,80,255,.06),transparent 55%),
    radial-gradient(ellipse 500px 400px at 50% 100%,rgba(251,146,60,.03),transparent 60%);
  background-attachment:fixed;
}
h1,h2,h3,h4,.num{font-family:Sora,sans-serif;}
.num{font-variant-numeric:tabular-nums;}

/* ── Layout ────────────────────────────────── */
.app{display:flex;min-height:100vh;}

/* ── Sidebar ───────────────────────────────── */
aside{
  width:252px;flex-shrink:0;padding:18px 11px;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:1px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.logo{display:flex;align-items:center;gap:10px;padding:4px 10px 18px;}
.logo .mark{
  width:30px;height:30px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--w),var(--w2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 18px rgba(110,168,255,.32);
}
.logo .mark svg{width:15px;height:15px;stroke:#fff;stroke-width:2;fill:none;}
.logo h1{font-size:var(--ts-base);font-weight:700;line-height:1.15;}
.logo span{font-size:10px;color:var(--dim);}

.grp-lbl{
  font-size:var(--ts-xs);font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);padding:14px 12px 5px;
}
.grp-lbl.personal{color:rgba(251,146,60,.45);}
.grp-sep{height:1px;background:var(--border);margin:6px 12px;}

.nav{
  display:flex;align-items:center;gap:9px;padding:8px 11px;
  border-radius:10px;cursor:pointer;color:var(--muted);
  border:1px solid transparent;
  transition:background .15s,color .15s,border-color .15s;user-select:none;
}
.nav:hover{background:rgba(255,255,255,.04);color:var(--text);}
.nav.active{
  background:linear-gradient(90deg,rgba(110,168,255,.14),rgba(167,139,250,.07));
  border-color:var(--border-hi);color:var(--text);
}
.nav.pers.active{
  background:linear-gradient(90deg,rgba(251,146,60,.13),rgba(251,191,36,.06));
  border-color:rgba(251,146,60,.38);
}
.nav svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0;}
.nav .nm{flex:1;font-size:var(--ts-sm);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav .pc{font-size:10px;color:var(--dim);font-family:Sora;}
.nav .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.side-foot{margin-top:auto;padding:14px 10px 2px;font-size:var(--ts-xs);color:var(--dim);}
.side-foot .warn{color:var(--amber);}
.reload-btn{
  display:flex;align-items:center;gap:6px;width:100%;margin-top:9px;
  padding:7px 12px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:11px;
  font-family:Inter,sans-serif;cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;text-align:left;
}
.reload-btn:hover{background:rgba(110,168,255,.1);color:var(--w);border-color:var(--border-hi);}
.reload-btn svg{width:12px;height:12px;flex-shrink:0;}
.reload-btn.spinning svg{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Main ──────────────────────────────────── */
main{flex:1;padding:var(--sp-6) var(--sp-6) 60px;min-width:0;}
.crumbs{font-size:11px;color:var(--dim);margin-bottom:3px;}
h2.page{font-size:var(--ts-lg);font-weight:700;letter-spacing:-.01em;margin-bottom:3px;}
.sub{color:var(--muted);margin-bottom:20px;max-width:82ch;font-size:var(--ts-base);}
.mtabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,.08);}
.mtab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:inherit;font-size:var(--ts-base);font-weight:600;padding:8px 15px;cursor:pointer;transition:color .15s,border-color .15s;margin-bottom:-1px;}
.mtab:hover{color:var(--text);}
.mtab.on{color:var(--w);border-bottom-color:var(--w);}
.mdbody{font-size:var(--ts-base);color:var(--text);line-height:1.6;}
.mdbody h1,.mdbody h2,.mdbody h3,.mdbody h4{font-family:Sora;color:#fff;margin:18px 0 8px;line-height:1.3;}
.mdbody h1{font-size:20px;}.mdbody h2{font-size:var(--ts-md);border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:5px;}.mdbody h3{font-size:var(--ts-md);}.mdbody h4{font-size:var(--ts-base);color:var(--muted);}
.mdbody p{margin:7px 0;color:var(--muted);}
.mdbody code{background:rgba(110,168,255,.1);color:var(--w);padding:1px 5px;border-radius:4px;font-size:12px;}
.mdbody pre.mdcode{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:7px;padding:12px;overflow:auto;font-size:12px;}
.mdbody pre.mdcode code{background:none;padding:0;color:var(--text);}
.mdbody ul{margin:7px 0;padding-left:20px;color:var(--muted);}.mdbody li{margin:3px 0;}
.mdbody a{color:var(--w);text-decoration:none;}.mdbody a:hover{text-decoration:underline;}
.mdbody hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:16px 0;}
.mdbody table.mdtable{border-collapse:collapse;width:100%;margin:10px 0;font-size:12px;}
.mdbody .mdtable th{text-align:left;color:var(--muted);font-weight:600;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.12);text-transform:uppercase;font-size:var(--ts-xs);letter-spacing:.04em;}
.mdbody .mdtable td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.05);}
.mdbody .mdtable tr:hover td{background:rgba(110,168,255,.04);}

/* ── Pills ─────────────────────────────────── */
.pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;border:1px solid transparent;
}
.pill::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;}
.p-active {color:var(--status-ok);   background:rgba(52,211,153,.1);  border:1px solid rgba(52,211,153,.28);}
.p-gated  {color:var(--status-warn); background:rgba(251,191,36,.1);  border:1px solid rgba(251,191,36,.28);}
.p-paused {color:var(--status-info); background:rgba(110,168,255,.08);border:1px solid rgba(110,168,255,.2);}
.p-dormant{color:var(--status-dim);  background:rgba(93,104,128,.1);  border:1px solid rgba(93,104,128,.22);}

/* ── Cards ─────────────────────────────────── */
.card{
  background:rgba(22,30,54,.94);
  border:1px solid rgba(255,255,255,.11);
  border-radius:var(--r);padding:var(--sp-4) var(--sp-5);
  backdrop-filter:blur(16px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 2px 8px rgba(0,0,0,.5),0 14px 36px rgba(0,0,0,.28);
}
.card h3{
  font-size:var(--ts-xs);font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;
}
.card.glow{
  border-color:rgba(110,168,255,.36);
  animation:wglow 3.5s ease-in-out infinite;
}
.card.pglow{
  border-color:rgba(251,146,60,.3);
  animation:pglow 3.5s ease-in-out infinite;
}
@keyframes wglow{
  0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 2px 8px rgba(0,0,0,.5),0 14px 36px rgba(0,0,0,.28),0 0 0 1px rgba(110,168,255,.08);}
  50%{box-shadow:inset 0 1px 0 rgba(110,168,255,.14),0 2px 8px rgba(0,0,0,.5),0 16px 44px rgba(0,0,0,.32),0 0 32px rgba(110,168,255,.16);}
}
@keyframes pglow{
  0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 2px 8px rgba(0,0,0,.5),0 14px 36px rgba(0,0,0,.28),0 0 0 1px rgba(251,146,60,.07);}
  50%{box-shadow:inset 0 1px 0 rgba(251,146,60,.12),0 2px 8px rgba(0,0,0,.5),0 16px 44px rgba(0,0,0,.32),0 0 28px rgba(251,146,60,.14);}
}

/* ── Stat row ──────────────────────────────── */
.stat-row{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
.stat{
  flex:1;min-width:110px;padding:13px 15px;
  background:rgba(18,26,48,.92);border:1px solid rgba(255,255,255,.1);border-radius:11px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 8px rgba(0,0,0,.4);
  cursor:default;
}
.stat .v{font-family:Sora;font-size:var(--ts-xl);font-weight:700;line-height:1;}
.stat .l{font-size:var(--ts-xs);color:var(--dim);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;}
.stat.ok .v,.stat.st-ok .v    {color:var(--status-ok);}
.stat.warn .v,.stat.st-warn .v {color:var(--status-warn);}
.stat.bad .v,.stat.st-danger .v{color:var(--status-danger);}
.stat.info .v,.stat.st-info .v {color:var(--status-info);}
.stat[data-id]{cursor:pointer;transition:border-color .15s;}
.stat[data-id]:hover{border-color:var(--border-hi);}

/* ── Section headers ───────────────────────── */
.sec-hd{display:flex;align-items:center;gap:12px;margin:0 0 14px;}
.sec-hd .t{font-size:var(--ts-xs);font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);white-space:nowrap;}
.sec-hd .ln{flex:1;height:1px;background:var(--border);}
.sec-hd.pers .t{color:rgba(251,146,60,.55);}
.sec-hd.pers .ln{background:rgba(251,146,60,.14);}

/* ── Grid ──────────────────────────────────── */
.g{display:grid;gap:var(--sp-3);}
.g2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
.g3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));}
.g4{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
.span4{grid-column:span 4;}
.span2{grid-column:span 2;}

/* ── Donut ─────────────────────────────────── */
.donut{position:relative;flex-shrink:0;}
.donut svg{transform:rotate(-90deg);display:block;}
.donut .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut .mid .n{font-family:Sora;font-weight:700;}
.donut .mid .t{font-size:var(--ts-xs);color:var(--dim);text-transform:uppercase;letter-spacing:.07em;}
.donut circle.val{transition:stroke-dashoffset .9s cubic-bezier(.22,1,.36,1);}

/* ── Progress bars ─────────────────────────── */
.phases{display:flex;flex-direction:column;gap:9px;}
.ph .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:6px;}
.ph .nm{font-size:var(--ts-sm);font-weight:500;}
.ph .nt{font-size:11px;color:var(--dim);}
.ph .pv{font-family:Sora;font-weight:600;font-size:12px;color:var(--muted);}
.bar{height:7px;border-radius:5px;background:var(--track);overflow:hidden;}
.bar i{display:block;height:100%;width:0;border-radius:5px;
  background:linear-gradient(90deg,var(--w),var(--w2));
  box-shadow:0 0 8px rgba(110,168,255,.28);
  transition:width .9s cubic-bezier(.22,1,.36,1);}
.bar i.full{background:linear-gradient(90deg,var(--green),#19b07f);box-shadow:0 0 8px rgba(52,211,153,.22);}
.pers-bars .bar i{background:linear-gradient(90deg,var(--p),var(--p2));box-shadow:0 0 8px rgba(251,146,60,.22);}

/* mini bars */
.mphases{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.mph{display:flex;align-items:center;gap:7px;}
.mph .lbl{font-size:var(--ts-xs);color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.mph .bar{flex:0 0 60px;height:5px;}
.mph .pv{font-size:10px;color:var(--dim);font-family:Sora;font-weight:600;min-width:26px;text-align:right;}

/* ── Heat grid ─────────────────────────────── */
.heat{display:flex;gap:3px;align-items:center;}
.hc{width:15px;height:15px;border-radius:3px;background:var(--track);flex-shrink:0;transition:opacity .2s;}
.hc:hover{opacity:.7;}
.hc.h1{background:rgba(110,168,255,.18);}
.hc.h2{background:rgba(110,168,255,.42);}
.hc.h3{background:rgba(110,168,255,.68);}
.hc.h4{background:rgba(110,168,255,.92);}
.pers .hc.h1{background:rgba(251,146,60,.18);}
.pers .hc.h2{background:rgba(251,146,60,.42);}
.pers .hc.h3{background:rgba(251,146,60,.68);}
.pers .hc.h4{background:rgba(251,146,60,.9);}

/* ── Badges ────────────────────────────────── */
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
.badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:6px;font-size:var(--ts-xs);font-weight:600;
  background:var(--panel2);border:1px solid var(--border);color:var(--dim);
}
.badge.ok,.badge.st-ok      {color:var(--status-ok);    border-color:rgba(52,211,153,.28); background:rgba(52,211,153,.06);}
.badge.warn,.badge.st-warn  {color:var(--status-warn);  border-color:rgba(251,191,36,.28); background:rgba(251,191,36,.05);}
.badge.bad,.badge.st-danger {color:var(--status-danger);border-color:rgba(248,113,113,.28);background:rgba(248,113,113,.05);}
.badge.info,.badge.st-info  {color:var(--status-info);  border-color:rgba(110,168,255,.28);background:rgba(110,168,255,.06);}
.badge.info{color:var(--w);    border-color:rgba(110,168,255,.22); background:rgba(110,168,255,.06);}

/* ── Focus chip ────────────────────────────── */
.focus{
  margin-top:11px;padding:9px 13px;border-radius:10px;
  background:linear-gradient(100deg,rgba(110,168,255,.11),rgba(167,139,250,.05));
  border:1px solid rgba(110,168,255,.22);font-size:var(--ts-sm);color:var(--muted);
}
.focus b{display:block;color:var(--w);font-size:var(--ts-xs);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px;}
.focus-p{background:linear-gradient(100deg,rgba(251,146,60,.09),rgba(251,191,36,.04));border-color:rgba(251,146,60,.22);}
.focus-p b{color:var(--p);}

/* ── Timeline ──────────────────────────────── */
.tl{display:flex;flex-direction:column;gap:10px;}
.tl-i{display:flex;gap:9px;align-items:flex-start;}
.tl-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;margin-top:5px;}
.tl-dot.now{background:var(--green);box-shadow:0 0 6px rgba(52,211,153,.5);}
.tl-dot.new{background:var(--w);}
.tl-body{flex:1;min-width:0;}
.tl-date{font-size:10px;color:var(--dim);font-family:Sora;}
.tl-text{font-size:var(--ts-sm);color:var(--muted);line-height:1.45;}

/* ── Wave panel ────────────────────────────── */
.wave-sum{display:flex;gap:8px;margin-bottom:12px;}
.wpip{flex:1;text-align:center;padding:8px 4px;background:var(--panel3);border:1px solid var(--border);border-radius:9px;}
.wpip .wn{font-family:Sora;font-size:var(--ts-md);font-weight:700;line-height:1;}
.wpip .wl{font-size:var(--ts-xs);color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.wi{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);}
.wi:last-child{border-bottom:none;}
.wst{font-size:var(--ts-xs);font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.wbody{flex:1;min-width:0;}
.wtitle{font-size:12px;color:var(--muted);font-weight:500;}
.wnote{font-size:var(--ts-xs);color:var(--dim);margin-top:1px;}

/* ── Audit ─────────────────────────────────── */
.sevcounts{display:flex;gap:7px;flex-wrap:wrap;}
.sevpip{display:flex;flex-direction:column;align-items:center;min-width:55px;padding:9px 5px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);}
.sevpip.hot{border-color:rgba(248,113,113,.32);}
.sevpip .n{font-family:Sora;font-weight:700;font-size:var(--ts-md);}
.sevpip .k{font-size:var(--ts-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-top:1px;}
.sev{display:inline-flex;align-items:center;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.sev-critical{color:#fff;                  background:var(--status-danger);}
.sev-high    {color:var(--status-danger);  background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.35);}
.sev-medium  {color:var(--status-warn);    background:rgba(251,191,36,.08); border:1px solid rgba(251,191,36,.30);}
.sev-low     {color:var(--status-dim);     background:rgba(93,104,128,.08); border:1px solid rgba(93,104,128,.22);}
.sev-info    {color:var(--status-dim);     background:rgba(93,104,128,.05); border:1px solid rgba(93,104,128,.15);}
.sev-info{color:var(--dim);background:rgba(120,130,150,.08);border:1px solid var(--border);}
.find{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
.find:last-child{border-bottom:none;}
.find .fid{font-family:Sora;font-size:var(--ts-xs);color:var(--muted);min-width:76px;padding-top:1px;}
.find .ft{flex:1;font-size:var(--ts-sm);}.find .fw{color:var(--dim);font-size:11px;}
.auditrow{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:8px;}
.auditrow:last-child{border-bottom:none;}.auditrow:hover{background:rgba(255,255,255,.03);}
.auditrow .anm{flex:1;font-weight:600;}
.trend.improving{color:var(--green);font-weight:600;}
.trend.flat{color:var(--dim);}
.trend.worsening{color:var(--red);font-weight:600;}
.clean{color:var(--green);font-size:var(--ts-sm);display:inline-flex;align-items:center;gap:6px;}
/* audit run history */
.ah{margin-top:15px;padding-top:13px;border-top:1px solid var(--border);}
.ah-h{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:11px;}
.ah-row{display:grid;grid-template-columns:100px 1fr auto;gap:14px;align-items:start;padding:10px 0;border-bottom:1px solid var(--border);}
.ah-row:last-child{border-bottom:none;}
.ah-when{display:flex;flex-direction:column;gap:2px;}
.ah-date{font-family:Sora,sans-serif;font-size:12px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;}
.ah-type{font-size:var(--ts-xs);color:var(--dim);line-height:1.35;}
.ah-body{min-width:0;}
.ah-result{font-size:12px;color:var(--text);line-height:1.5;}
.ah-scope{font-size:var(--ts-xs);color:var(--dim);margin-top:3px;}
.ah-ref{font-family:ui-monospace,Consolas,monospace;font-size:10px;color:var(--dim);white-space:nowrap;flex-shrink:0;padding-top:2px;}
@media(max-width:640px){
  .ah-row{grid-template-columns:1fr;gap:5px;}
  .ah-when{flex-direction:row;align-items:baseline;gap:8px;}
  .ah-ref{display:none;}
}
.au-latest{font-size:var(--ts-sm);color:var(--muted);margin-top:2px;}
.au-latest b{color:var(--text);font-family:Sora,sans-serif;font-weight:600;}

/* ── Git warn ──────────────────────────────── */
.gwarn{
  margin-top:10px;padding:8px 12px;border-radius:9px;font-size:var(--ts-sm);
  background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.22);color:var(--amber);
}

/* ── Lists ─────────────────────────────────── */
ul.alist{list-style:none;display:flex;flex-direction:column;gap:7px;}
ul.alist li{display:flex;gap:8px;align-items:flex-start;font-size:var(--ts-sm);color:var(--muted);}
ul.alist li::before{content:"→";color:var(--w);flex-shrink:0;font-weight:700;}
ul.alist li.blk::before{content:"⬥";color:var(--red);}
ul.alist li.dec::before{content:"◆";color:var(--amber);}
ul.alist li.rem::before{content:"○";color:var(--dim);}
.links a{color:var(--w);text-decoration:none;font-size:var(--ts-sm);display:inline-block;margin:0 14px 6px 0;}
.links a:hover{text-decoration:underline;}
.path-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--w);background:rgba(110,168,255,.06);border:1px solid rgba(110,168,255,.18);border-radius:5px;cursor:pointer;padding:3px 9px;margin:0 8px 6px 0;font-family:inherit;text-decoration:none;transition:background .15s,border-color .15s,color .15s;}
.path-chip:hover{background:rgba(110,168,255,.12);border-color:rgba(110,168,255,.38);color:#fff;}
.path-chip.copied{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.4);color:var(--green);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(30,38,58,.96);border:1px solid rgba(110,168,255,.3);border-radius:8px;padding:8px 18px;font-size:var(--ts-base);color:var(--text);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{color:var(--dim);font-style:italic;font-size:var(--ts-sm);}
code{background:var(--panel2);border:1px solid var(--border);padding:1px 6px;border-radius:5px;font-size:var(--ts-sm);}

/* ── Activity chart ────────────────────────── */
.chart-wrap{margin-top:4px;}
.chart-wrap svg{display:block;width:100%;height:auto;}
.axis{font-size:var(--ts-xs);fill:var(--dim);font-family:Inter;}

/* ── Phase popup ───────────────────────────── */
.ph-click{cursor:pointer;border-radius:8px;padding:5px 7px;margin:-5px -7px;transition:background .14s;}
.ph-click:hover{background:rgba(110,168,255,.07);}
.ph-click:hover .nm{color:var(--w);}
.ph-click::after{content:"↗";font-size:var(--ts-xs);color:var(--dim);margin-left:5px;opacity:0;transition:opacity .14s;vertical-align:1px;}
.ph-click:hover::after{opacity:1;}
.tsumm{font-size:var(--ts-xs);color:var(--dim);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;}
.ts-done{color:var(--green);}.ts-active{color:var(--w);}.ts-blocked{color:var(--red);}
.pp{
  position:fixed;z-index:1000;min-width:290px;max-width:450px;max-height:72vh;
  overflow-y:auto;background:#181f32;
  border:1px solid rgba(110,168,255,.38);border-radius:13px;
  padding:17px 19px;box-shadow:0 24px 70px rgba(0,0,0,.65);
  animation:ppIn .15s cubic-bezier(.22,1,.36,1);
}
@keyframes ppIn{from{opacity:0;transform:translateY(-5px) scale(.98)}to{opacity:1;transform:none}}
.pp-head{display:flex;align-items:flex-start;gap:9px;margin-bottom:5px;}
.pp-title{font-family:Sora;font-weight:700;font-size:var(--ts-base);flex:1;line-height:1.3;}
.pp-pct{font-family:Sora;font-weight:700;font-size:16px;color:var(--w);white-space:nowrap;flex-shrink:0;}
.pp-x{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;padding:0;line-height:1;transition:background .14s,color .14s;}
.pp-x:hover{background:rgba(255,255,255,.08);color:var(--text);}
.pp-mb{height:4px;border-radius:3px;background:var(--track);margin:7px 0;overflow:hidden;}
.pp-mb-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--w),var(--w2));transition:width .6s cubic-bezier(.22,1,.36,1);}
.pp-note{font-size:var(--ts-sm);color:var(--muted);margin:0 0 11px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.pp-tasks{display:flex;flex-direction:column;gap:7px;}
.tr{display:flex;align-items:flex-start;gap:8px;}
.ti{width:17px;height:17px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:var(--ts-xs);font-weight:700;margin-top:1px;}
.ti.done{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.24);}
.ti.active{background:rgba(110,168,255,.1);color:var(--w);border:1px solid rgba(110,168,255,.24);}
.ti.pending{background:rgba(255,255,255,.03);color:var(--dim);border:1px solid var(--border);}
.ti.blocked{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.24);}
.tb{flex:1;min-width:0;}
.tl2{font-size:var(--ts-sm);font-weight:500;line-height:1.35;}
.tn{font-size:11px;color:var(--dim);margin-top:1px;line-height:1.35;}

/* ── Fade-in ───────────────────────────────── */
.fade{opacity:0;transform:translateY(6px);animation:rise .45s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes rise{to{opacity:1;transform:none;}}
/* Fix: when glow+fade coexist, combine both animations so rise isn't overridden */
.card.glow.fade{animation:rise .45s cubic-bezier(.22,1,.36,1) forwards,wglow 3.5s ease-in-out .5s infinite;}
.card.pglow.fade{animation:rise .45s cubic-bezier(.22,1,.36,1) forwards,pglow 3.5s ease-in-out .5s infinite;}
@media(prefers-reduced-motion:reduce){
  .fade{animation:none;opacity:1;transform:none;}
  .bar i,.donut circle.val{transition:none;}
  .card.glow,.card.pglow{animation:none;}
}

/* ── Card accent borders ───────────────────── */
.ca-blue  {border-left:4px solid var(--status-info);   padding-left:18px;background:rgba(110,168,255,.04);}
.ca-green {border-left:4px solid var(--status-ok);     padding-left:18px;background:rgba(52,211,153,.04);}
.ca-amber {border-left:4px solid var(--status-warn);   padding-left:18px;background:rgba(251,191,36,.03);}
.ca-red   {border-left:4px solid var(--status-danger); padding-left:18px;background:rgba(248,113,113,.04);}
.ca-purple{border-left:4px solid rgba(167,139,250,.75);padding-left:18px;background:rgba(167,139,250,.04);}
.ca-grey  {border-left:4px solid var(--status-dim);    padding-left:18px;}

/* ── Project hero card ─────────────────────── */
.proj-hero{
  background:linear-gradient(155deg,rgba(26,38,72,.98) 0%,rgba(16,22,48,.96) 100%);
  border-color:rgba(110,168,255,.42);
  box-shadow:inset 0 1px 0 rgba(110,168,255,.14),0 2px 8px rgba(0,0,0,.55),0 18px 48px rgba(0,0,0,.35),0 0 40px rgba(110,168,255,.07);
}
.proj-hero-p{
  background:linear-gradient(155deg,rgba(56,34,18,.98) 0%,rgba(30,18,8,.96) 100%);
  border-color:rgba(251,146,60,.38);
  box-shadow:inset 0 1px 0 rgba(251,146,60,.12),0 2px 8px rgba(0,0,0,.55),0 18px 48px rgba(0,0,0,.35),0 0 36px rgba(251,146,60,.07);
}

/* ── Colored card h3 labels ────────────────── */
.h3-blue  .card h3,.card.h3-blue h3  {color:rgba(110,168,255,.7);}
.h3-green .card h3,.card.h3-green h3 {color:rgba(52,211,153,.7);}
.h3-amber .card h3,.card.h3-amber h3 {color:rgba(251,191,36,.6);}
.h3-red   .card h3,.card.h3-red h3   {color:rgba(248,113,113,.7);}
.h3-purple.card h3,.card.h3-purple h3{color:rgba(167,139,250,.7);}

/* ── Stat tile colored accents ─────────────── */
.stat.ok,.stat.st-ok      {border-left:3px solid var(--status-ok);    background:rgba(52,211,153,.05);}
.stat.warn,.stat.st-warn  {border-left:3px solid var(--status-warn);  background:rgba(251,191,36,.04);}
.stat.bad,.stat.st-danger {border-left:3px solid var(--status-danger);background:rgba(248,113,113,.05);}
.stat.info,.stat.st-info  {border-left:3px solid var(--status-info);  background:rgba(110,168,255,.05);}

/* ── Overview hero card ────────────────────── */
.ov-hero{
  background:linear-gradient(145deg,rgba(24,34,66,.99) 0%,rgba(18,26,54,.97) 60%,rgba(24,18,54,.94) 100%);
  border-color:rgba(110,168,255,.42);
  box-shadow:inset 0 1px 0 rgba(110,168,255,.15),0 4px 12px rgba(0,0,0,.55),0 20px 52px rgba(0,0,0,.35),0 0 48px rgba(110,168,255,.08);
}

/* ── Section header enhanced ───────────────── */
.sec-hd .t{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;
  background:linear-gradient(90deg,var(--w),var(--w2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sec-hd.pers .t{
  background:linear-gradient(90deg,var(--p),var(--p2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── Responsive ────────────────────────────── */
/* 1200px grid override removed — auto-fit handles column reflow */
@media(max-width:900px){
  .app{flex-direction:column;}
  aside{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;padding:10px;}
  .side-foot,.grp-lbl,.grp-sep{display:none;}
  main{padding:16px 15px 50px;}
  .g2,.g3,.g4{grid-template-columns:1fr;}
  .span4,.span2{grid-column:span 1;}
}
/* graph */
.gmg{grid-template-columns:repeat(4,1fr);margin-bottom:14px;}
@media(max-width:900px){.gmg{grid-template-columns:repeat(2,1fr);}}

/* ── Strategy view ─────────────────────────────────────────────────── */
.strat-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.strat-tab{background:rgba(22,30,54,.9);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 13px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit;}
.strat-tab:hover{border-color:rgba(110,168,255,.35);color:var(--text);}
.strat-tab.active{background:rgba(110,168,255,.13);border-color:rgba(110,168,255,.44);color:#fff;}
.strat-tab .tc{display:inline-block;margin-left:5px;background:rgba(255,255,255,.08);border-radius:4px;padding:1px 6px;font-size:10px;}
.strat-tab.active .tc{background:rgba(110,168,255,.2);}
.strat-sr{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.strat-sp{background:transparent;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--dim);cursor:pointer;transition:all .15s;font-family:inherit;text-transform:capitalize;}
.strat-sp:hover{border-color:rgba(255,255,255,.18);color:var(--muted);}
.strat-sp.active{border-color:rgba(110,168,255,.42);color:var(--w);background:rgba(110,168,255,.08);}
.strat-add-btn{margin-left:auto;background:rgba(110,168,255,.1);border:1px solid rgba(110,168,255,.28);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--w);cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500;}
.strat-add-btn:hover{background:rgba(110,168,255,.18);border-color:rgba(110,168,255,.5);}
.strat-form{background:rgba(16,24,46,.97);border:1px solid rgba(110,168,255,.28);border-radius:14px;padding:20px 22px;margin-bottom:16px;box-shadow:inset 0 1px 0 rgba(110,168,255,.1),0 4px 20px rgba(0,0,0,.4);}
.strat-form label{font-size:var(--ts-xs);font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);display:block;margin-bottom:5px;}
.strat-form input,.strat-form textarea,.strat-form select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:var(--ts-base);margin-bottom:12px;outline:none;transition:border-color .15s;display:block;}
.strat-form input:focus,.strat-form textarea:focus,.strat-form select:focus{border-color:rgba(110,168,255,.5);}
.strat-form textarea{min-height:80px;resize:vertical;}
.strat-form select option{background:#131928;}
.strat-fbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.sf-save{background:rgba(110,168,255,.12);border:1px solid rgba(110,168,255,.38);border-radius:7px;padding:7px 18px;color:var(--w);cursor:pointer;font-family:inherit;font-size:var(--ts-sm);font-weight:600;transition:all .15s;}
.sf-save:hover{background:rgba(110,168,255,.2);}
.sf-cancel{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:7px 18px;color:var(--muted);cursor:pointer;font-family:inherit;font-size:var(--ts-sm);transition:all .15s;}
.sf-cancel:hover{border-color:rgba(255,255,255,.2);color:var(--text);}
.strat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:13px;}
.strat-card{background:rgba(22,30,54,.94);border:1px solid rgba(255,255,255,.11);border-radius:14px;padding:18px 20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 2px 8px rgba(0,0,0,.5),0 10px 28px rgba(0,0,0,.25);transition:border-color .18s,opacity .18s;display:flex;flex-direction:column;}
.strat-card:hover{border-color:rgba(255,255,255,.19);}
.strat-card.denied{opacity:.38;}
.strat-ct{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.strat-cat-lbl{font-size:var(--ts-xs);font-weight:700;text-transform:uppercase;letter-spacing:.12em;}
.strat-stat-lbl{font-size:var(--ts-xs);font-weight:700;text-transform:uppercase;letter-spacing:.1em;}
.strat-title{font-family:Sora;font-size:var(--ts-base);font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.42;}
.strat-body{font-size:12px;color:var(--muted);line-height:1.65;flex:1;margin-bottom:14px;}
.strat-acts{display:flex;gap:6px;margin-top:auto;}
.sa{flex:1;border-radius:7px;padding:6px 8px;font-size:11px;cursor:pointer;border:1px solid;font-family:inherit;transition:all .15s;font-weight:500;text-align:center;}
.sa-ok{background:rgba(52,211,153,.06);border-color:rgba(52,211,153,.22);color:rgba(52,211,153,.75);}
.sa-ok:hover{background:rgba(52,211,153,.13);border-color:rgba(52,211,153,.48);color:var(--green);}
.sa-ok.on{background:rgba(52,211,153,.16);border-color:rgba(52,211,153,.6);color:var(--green);font-weight:700;}
.sa-rs{background:rgba(110,168,255,.06);border-color:rgba(110,168,255,.2);color:rgba(110,168,255,.75);}
.sa-rs:hover{background:rgba(110,168,255,.13);border-color:rgba(110,168,255,.46);color:var(--w);}
.sa-rs.on{background:rgba(110,168,255,.16);border-color:rgba(110,168,255,.58);color:var(--w);font-weight:700;}
.sa-no{background:rgba(248,113,113,.05);border-color:rgba(248,113,113,.18);color:rgba(248,113,113,.65);}
.sa-no:hover{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.44);color:var(--red);}
.sa-no.on{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.55);color:var(--red);font-weight:700;}
.sa-del{background:transparent;border-color:rgba(255,255,255,.08);color:var(--dim);max-width:34px;}
.sa-del:hover{border-color:rgba(248,113,113,.35);color:var(--red);}
/* ── Workflow lanes: in-progress, group sections, minimized completed, denied bucket ── */
.strat-card.inprogress{border-color:rgba(167,139,250,.34);box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 0 0 1px rgba(167,139,250,.1),0 10px 28px rgba(0,0,0,.25);}
.strat-ip-badge{font-size:var(--ts-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--w2);background:rgba(167,139,250,.14);border:1px solid rgba(167,139,250,.3);border-radius:5px;padding:2px 6px;white-space:nowrap;}
.strat-section{margin-bottom:24px;}
.strat-section-hdr{display:flex;align-items:center;gap:9px;margin:0 2px 11px;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,.07);}
.strat-section-hdr .nm{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.strat-section-hdr .ct{font-size:10px;color:var(--dim);background:rgba(255,255,255,.05);border-radius:5px;padding:1px 7px;}
.strat-sec-empty{font-size:12px;color:var(--dim);font-style:italic;padding:2px 2px 0;}
.strat-minstack{display:flex;flex-direction:column;gap:4px;margin-top:11px;}
.strat-min{display:flex;align-items:center;gap:10px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.022);border:1px solid rgba(255,255,255,.05);opacity:.7;transition:opacity .12s,background .12s;}
.strat-min:hover{opacity:1;background:rgba(255,255,255,.045);}
.strat-min .dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 6px rgba(52,211,153,.55);}
.strat-min.denied .dot{background:var(--red);box-shadow:0 0 6px rgba(248,113,113,.55);}
.strat-min .mt{flex:1;min-width:0;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.strat-min .mc{font-size:var(--ts-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);flex-shrink:0;}
.strat-min .mr{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:5px;color:var(--dim);font-size:11px;padding:2px 8px;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .12s;}
.strat-min .mr:hover{color:var(--w);border-color:rgba(110,168,255,.4);background:rgba(110,168,255,.08);}
.strat-denied{margin-top:14px;border:1px solid rgba(248,113,113,.16);border-radius:12px;background:rgba(248,113,113,.03);overflow:hidden;}
.strat-denied-hdr{display:flex;align-items:center;gap:9px;padding:11px 16px;cursor:pointer;user-select:none;transition:background .12s;}
.strat-denied-hdr:hover{background:rgba(248,113,113,.05);}
.strat-denied-hdr .dl{font-size:12px;font-weight:600;color:rgba(248,113,113,.85);}
.strat-denied-hdr .dc{font-size:10px;color:var(--dim);background:rgba(255,255,255,.05);border-radius:5px;padding:1px 7px;}
.strat-denied-body{padding:4px 13px 13px;display:flex;flex-direction:column;gap:4px;}
/* ── Quick Capture & Priority ─────────────────────────────────────────── */
.strat-capture{background:rgba(14,20,42,.97);border:1px solid rgba(255,255,255,.09);border-radius:14px;margin-bottom:18px;overflow:hidden;}
.strat-cap-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;cursor:pointer;user-select:none;transition:background .15s;}
.strat-cap-hdr:hover{background:rgba(255,255,255,.025);}
.strat-cap-title{font-size:var(--ts-sm);font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.strat-cap-cnt{background:rgba(251,146,60,.18);color:var(--p);border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700;}
.strat-cap-body{padding:0 18px 18px;border-top:1px solid rgba(255,255,255,.06);}
.strat-cap-ta{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:var(--ts-base);resize:vertical;min-height:72px;outline:none;margin-top:14px;transition:border-color .15s;display:block;}
.strat-cap-ta:focus{border-color:rgba(110,168,255,.45);}
.strat-cap-save{margin-top:8px;background:rgba(110,168,255,.1);border:1px solid rgba(110,168,255,.28);border-radius:7px;padding:6px 16px;color:var(--w);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s;}
.strat-cap-save:hover{background:rgba(110,168,255,.18);}
.cap-list{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
.cap-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;}
.cap-ts{font-size:10px;color:var(--dim);white-space:nowrap;flex-shrink:0;padding-top:2px;}
.cap-text{font-size:var(--ts-sm);color:var(--muted);flex:1;line-height:1.55;}
.cap-acts{display:flex;gap:5px;flex-shrink:0;}
.cap-promote{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.22);border-radius:6px;padding:4px 10px;font-size:var(--ts-xs);color:rgba(52,211,153,.85);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.cap-promote:hover{background:rgba(52,211,153,.14);border-color:rgba(52,211,153,.45);}

/* ── Toolkit (its own cleaner, lower-noise treatment) ─────────── */

.tk-search:focus{border-color:var(--border-hi);}
.tk-chips{display:flex;flex-wrap:wrap;gap:7px;}
.tk-chip{font-family:inherit;font-size:var(--ts-sm);font-weight:500;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:999px;padding:5px 13px;cursor:pointer;transition:color .14s,border-color .14s,background .14s;user-select:none;}

.tk-sec-ctx{font-size:var(--ts-sm);color:var(--dim);}

.tk-card{background:var(--panel3);border:1px solid var(--border);border-radius:14px;padding:15px 16px 13px;display:flex;flex-direction:column;gap:7px;transition:border-color .14s,transform .14s;}

.tk-tag{font-size:var(--ts-xs);font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;}

.c-skill{color:var(--w2);background:rgba(167,139,250,.1);}

.tk-desc{font-size:12px;color:var(--muted);line-height:1.55;}
.tk-card-f{display:flex;align-items:center;gap:9px;margin-top:auto;padding-top:5px;flex-wrap:wrap;}
.tk-cmd{display:inline-flex;align-items:center;gap:6px;max-width:100%;font-family:ui-monospace,'Cascadia Code','SFMono-Regular',Consolas,monospace;font-size:var(--ts-sm);color:var(--text);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:4px 9px;cursor:pointer;transition:color .14s,border-color .14s;}

/* ── Wave 1: Design System Token Layer ──────────────────────────── */
/* Section heading — fills the 21px→10px heading cliff */
.sh{font-family:Sora,sans-serif;font-size:var(--ts-md);font-weight:600;color:var(--text);margin:var(--sp-5) 0 var(--sp-3);}
.sh small{font-size:var(--ts-xs);font-weight:600;text-transform:uppercase;letter-spacing:.10em;color:var(--muted);margin-left:8px;}

/* Unified status component classes — one system for ok/warn/danger/info/dim */

.st-danger{color:var(--status-danger);border-color:rgba(248,113,113,.28);   background:rgba(248,113,113,.05);}

.st-dim   {color:var(--status-dim);   border-color:rgba(93,104,128,.25);    background:rgba(93,104,128,.06);}

/* State components — for panels whose generator failed or returned empty */

<script>
const D=window.DASHBOARD_DATA;

const WORK=['bimpossible','addins','site','families','aiserver','ai-brain-data','bimpossible-workspace','dashboard-auto','bimpossible-tests'];
const PERS=['pickem','laundry','pc-monitor'];

const DOTC={active:'var(--status-ok)',gated:'var(--status-warn)',paused:'var(--status-info)',dormant:'var(--status-dim)'};
const SC={CLOSED:'var(--status-ok)',SHIPPED:'var(--status-ok)',BUILT:'var(--status-warn)',PARTIAL:'var(--status-info)',ACTIVE:'var(--status-info)','SCOPE-LOCK':'var(--w2)',PLANNED:'var(--status-dim)',PENDING:'var(--status-dim)'};
const SEVS=['critical','high','medium','low','info'];
const SEVLBL={critical:'Critical',high:'High',medium:'Medium',low:'Low',info:'Info'};
const ICO={
  grid:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',

  brain:'<svg viewBox="0 0 24 24"><path d="M9.5 2A5.5 5.5 0 0 0 4 7.5a5.5 5.5 0 0 0 1 3.18V17a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3v-6.32A5.5 5.5 0 0 0 20 7.5 5.5 5.5 0 0 0 14.5 2"/><path d="M9.5 2a5.5 5.5 0 0 1 5 5M12 7v4M9 12h6"/></svg>',

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function pathLink(p,label){const uri='vscode://file/'+p.replace(/\\/g,'/');return`<a class="path-chip" href="${esc(uri)}" title="${esc(p)}">${esc(label||p)}</a>`;}
let _toastTimer;
function copyPath(el,path){
  navigator.clipboard.writeText(path).catch(()=>{const i=Object.assign(document.createElement('input'),{value:path,style:'position:fixed;opacity:0'});document.body.appendChild(i);i.select();document.execCommand('copy');i.remove();});
  el.classList.add('copied');setTimeout(()=>el.classList.remove('copied'),1400);
  const t=document.getElementById('toast');t.textContent='📋 Path copied — paste in Explorer, VS Code, or Terminal';t.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
function daysAgo(iso){if(!iso)return null;return Math.round((TODAY-new Date(iso+'T00:00:00'))/86400000);}
function ageHtml(iso){
  const n=daysAgo(iso);if(n===null)return'';
  const t=n<=0?'today':n===1?'yesterday':n+'d ago';
  const c=n>=14?'color:var(--status-danger)':n>=7?'color:var(--status-warn)':'color:var(--dim)';
  return`<span style="${c}">${t}</span>`;
}
// Phases the owner has put ON HOLD, or that are CONDITIONAL/PLACEHOLDER future work, are
// excluded from the headline donut: a flat average over them buries real momentum for months
// (every unbuilt future phase reads ~0%). They're still shown individually in the phase list
// below. Status comes from the ledger-rendered note prefix, so this stays honest automatically.
const HELD_PHASE=/^(on hold|conditional|placeholder)/i;
function inScopePhases(p){
  if(!p||!p.progress||!p.progress.phases||!p.progress.phases.length)return null;
  const a=p.progress.phases.filter(x=>!HELD_PHASE.test((x.note||'').trim()));
  return a.length?a:p.progress.phases;
}
function overallPct(p){
  const ph=inScopePhases(p);
  if(!ph)return null;
  return Math.round(ph.reduce((s,x)=>s+x.pct,0)/ph.length);
}
function scopeCaption(p){
  if(!p||!p.progress||!p.progress.phases)return'';
  const held=p.progress.phases.length-inScopePhases(p).length;
  if(!held)return'';
  return`<div style="font-size:10px;color:var(--dim);text-align:center;margin-top:6px;max-width:130px;line-height:1.3">active scope · ${held} on-hold/future excluded</div>`;
}
function auditSummary(p){
  if(!p.audit)return null;
  const c=p.audit.counts||{};
  const total=SEVS.reduce((s,k)=>s+(c[k]||0),0);
  const hot=(c.critical||0)+(c.high||0);
  return{total,hot,c};
}
function getTC(tasks){const c={done:0,active:0,pending:0,blocked:0};tasks.forEach(t=>{if(c[t.status]!==undefined)c[t.status]++;});return c;}
function buildTS(c){
  const p=[];
  if(c.done)p.push('<span class="ts-done">&#10003;'+c.done+'</span>');
  if(c.active)p.push('<span class="ts-active">&#9679;'+c.active+'</span>');
  if(c.pending)p.push('<span>&#9675;'+c.pending+'</span>');
  if(c.blocked)p.push('<span class="ts-blocked">&#10007;'+c.blocked+'</span>');
  return p.length?'<div class="tsumm">'+p.join('')+'</div>':'';
}
const TICONS={done:'&#10003;',active:'&#9679;',pending:'&#9675;',blocked:'&#10007;'};

function donut(pct,size,label){
  const sw=Math.max(7,Math.round(size*.082));
  const r=(size-sw)/2-1,c=2*Math.PI*r,off=c*(1-pct/100);
  const fs=Math.round(size*.2);
  const uid='dg'+size+'_'+Math.random().toString(36).slice(2,6);
  return`<div class="donut" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}">
      <defs><linearGradient id="${uid}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="var(--w)"/><stop offset="100%" stop-color="var(--w2)"/>
      </linearGradient></defs>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--track)" stroke-width="${sw}"/>
      <circle class="val" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#${uid})" stroke-width="${sw}"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}" data-off="${off}"/>
    </svg>
    <div class="mid"><span class="n num" style="font-size:${fs}px">${pct}%</span>
    ${label?`<span class="t">${esc(label)}</span>`:''}</div>
  </div>`;
}

function heat(series,isP){
  const max=Math.max(...series.concat([1]));
  const base=new Date(D.activitySince+'T00:00:00');
  return'<div class="heat'+(isP?' pers':'')+'">'+series.map((v,i)=>{
    const d=new Date(base.getTime()+i*86400000);
    const lv=v===0?0:Math.min(4,Math.ceil(v/max*4));
    const label=`${d.getMonth()+1}/${d.getDate()}: ${v} commit${v!==1?'s':''}`;
    return`<div class="hc h${lv}" title="${label}"></div>`;
  }).join('')+'</div>';
}

function miniPhases(phases,isP){
  if(!phases||!phases.length)return'';
  return'<div class="mphases'+(isP?' pers-bars':'')+'">'+
    phases.slice(0,4).map(ph=>'<div class="mph">'+
      `<span class="lbl">${esc(ph.name)}</span>`+
      `<div class="bar"><i data-w="${ph.pct}" class="${ph.pct>=100?'full':''}"></i></div>`+
      `<span class="pv num">${ph.pct}%</span>`+
    '</div>').join('')+'</div>';
}

function phaseBars(prog,pid){
  if(!prog)return'<p class="empty">no phase data yet</p>';
  return'<div class="phases">'+prog.phases.map((ph,i)=>{
    const key=(pid||'ph')+'_'+i;window._PR[key]=ph;
    const has=ph.tasks&&ph.tasks.length;
    const cnt=has?getTC(ph.tasks):null;
    return`<div class="ph${has?' ph-click':''}"${has?` data-pk="${key}"`:''}>`+
      `<div class="row"><span class="nm">${esc(ph.name)}${ph.note?` <span class="nt">– ${esc(ph.note)}</span>`:''}</span><span class="pv num">${ph.pct}%</span></div>`+
      `<div class="bar"><i data-w="${ph.pct}" class="${ph.pct>=100?'full':''}"></i></div>`+
      (cnt?buildTS(cnt):'')+'</div>';
  }).join('')+'</div>';
}

function areaChart(series,w,h,id){
  const n=series.length;if(!n)return'';
  const max=Math.max(...series.concat([1]));
  const pL=6,pR=6,pT=8,pB=16,iw=w-pL-pR,ih=h-pT-pB;
  const pts=series.map((v,i)=>[pL+iw*i/(n-1),pT+ih*(1-v/max)]);
  let d='M'+pts[0][0]+','+pts[0][1];
  for(let i=1;i<n;i++){const p0=pts[i-1],p1=pts[i],mx=(p0[0]+p1[0])/2;d+=` C${mx},${p0[1]} ${mx},${p1[1]} ${p1[0]},${p1[1]}`;}
  const area=d+` L${pts[n-1][0]},${pT+ih} L${pts[0][0]},${pT+ih} Z`;
  const start=new Date(D.activitySince+'T00:00:00');
  let ticks='';
  for(let i=0;i<n;i+=Math.ceil(n/5)){
    const dt=new Date(start.getTime()+i*86400000);
    ticks+=`<text class="axis" x="${pL+iw*i/(n-1)}" y="${h-3}" text-anchor="middle">${dt.getMonth()+1}/${dt.getDate()}</text>`;
  }
  const dots=pts.map((p,i)=>series[i]>0?`<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="var(--w)"><title>${series[i]} commits</title></circle>`:'').join('');
  return`<div class="chart-wrap"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="max-height:${h}px">
    <defs><linearGradient id="ag${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(110,168,255,.38)"/><stop offset="100%" stop-color="rgba(110,168,255,0)"/>
    </linearGradient></defs>
    <line x1="${pL}" y1="${pT+ih}" x2="${w-pR}" y2="${pT+ih}" stroke="var(--track)"/>
    <path d="${area}" fill="url(#ag${id})"/>
    <path d="${d}" fill="none" stroke="var(--w)" stroke-width="1.8"/>
    ${dots}${ticks}</svg></div>`;
}

function badges(p,isP){
  const b=[];
  const as=auditSummary(p);
  if(as){
    if(as.total===0)b.push('<span class="badge st-ok">✓ Audit clear</span>');
    else b.push(`<span class="badge ${as.hot?'st-danger':'st-warn'}">${as.total} open findings</span>`);
  }
  const dec=(p.pendingDecisions||[]).length;
  if(dec)b.push(`<span class="badge st-warn">◆ ${dec} decision${dec>1?'s':''}</span>`);
  const blk=(p.blockers||[]).length;
  if(blk)b.push(`<span class="badge st-danger">⬥ ${blk} blocker${blk>1?'s':''}</span>`);
  const rem=(p.reminders||[]).length;
  if(rem)b.push(`<span class="badge">${rem} reminder${rem>1?'s':''}</span>`);
  if(p.git&&p.git.warn)b.push('<span class="badge st-warn">⚠ git</span>');
  return b.length?`<div class="badges">${b.join('')}</div>`:'';
}

function wavePanel(w){
  const sm=w.summary||{};
  let h='<div class="wave-sum">';
  [['done',sm.done,'var(--green)'],['built',sm.built,'var(--amber)'],['in flight',sm.inFlight,'var(--w)'],['ahead',sm.ahead,'var(--dim)']].forEach(([l,n,c])=>{
    h+=`<div class="wpip"><div class="wn" style="color:${c}">${n||0}</div><div class="wl">${l}</div></div>`;
  });
  h+='</div>';
  if(w.lastCompleted){
    h+=`<p style="font-size:11px;color:var(--dim);margin-bottom:10px">Last done: <b style="color:var(--muted)">Wave ${esc(w.lastCompleted.id)}</b> ${esc(w.lastCompleted.title||'')}${w.lastCompleted.date?' ('+esc(w.lastCompleted.date)+')':''}</p>`;
  }
  h+=(w.current||[]).map(v=>{
    const c=SC[v.status]||'var(--dim)';
    return`<div class="wi">
      <span class="wst" style="background:${c}22;color:${c}">Wave ${esc(v.id)}</span>
      <div class="wbody"><div class="wtitle">${esc(v.status)} – ${esc(v.title)}</div>${v.note?`<div class="wnote">${esc(v.note)}</div>`:''}</div>
    </div>`;
  }).join('');
  const realDrift=(w.drift||[]).filter(d=>!d.startsWith('No wave-'));
  if(realDrift.length)h+=`<div class="gwarn" style="margin-top:8px">⚠ ${realDrift.map(esc).join('<br>⚠ ')}</div>`;
  return h;
}

function tlItem(raw){
  const m=raw.match(/^(\d{4}-\d{2}-\d{2})\s*[-–]\s*/);
  const date=m?m[1]:'';
  const text=m?raw.slice(m[0].length):raw;
  const n=daysAgo(date);
  const dc=n===null?'':n<=0?'now':n<=3?'new':'';
  return`<div class="tl-i"><div class="tl-dot ${dc}"></div><div class="tl-body"><div class="tl-date">${esc(date)}</div><div class="tl-text">${esc(text)}</div></div></div>`;
}

function openPP(key,el){
  const ph=window._PR[key];if(!ph)return;
  const pp=document.getElementById('pp');
  let html=`<div class="pp-head"><span class="pp-title">${esc(ph.name)}</span><span class="pp-pct num">${ph.pct}%</span><button class="pp-x" onclick="closePP()">&#10005;</button></div>`+
    `<div class="pp-mb"><div class="pp-mb-fill" style="width:0%" data-w="${ph.pct}"></div></div>`;
  if(ph.note)html+=`<div class="pp-note">${esc(ph.note)}</div>`;
  if(ph.tasks&&ph.tasks.length){
    html+='<div class="pp-tasks">'+ph.tasks.map(t=>{
      const st=t.status||'pending';
      return`<div class="tr"><span class="ti ${st}">${TICONS[st]||'&#9675;'}</span><div class="tb"><div class="tl2">${esc(t.label)}</div>${t.note?`<div class="tn">${esc(t.note)}</div>`:''}</div></div>`;
    }).join('')+'</div>';
  }
  pp.innerHTML=html;pp.style.visibility='hidden';pp.style.display='block';
  document.getElementById('ppb').style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const f=pp.querySelector('.pp-mb-fill');if(f)f.style.width=f.dataset.w+'%';
  }));
  const rect=el.getBoundingClientRect(),pw=pp.offsetWidth,ph2=pp.offsetHeight;
  const vw=window.innerWidth,vh=window.innerHeight;
  let top=rect.bottom+8;if(top+ph2>vh-16)top=Math.max(10,rect.top-ph2-8);
  let left=rect.left;if(left+pw>vw-16)left=vw-pw-16;if(left<10)left=10;
  pp.style.top=top+'px';pp.style.left=left+'px';pp.style.visibility='';
}
function closePP(){document.getElementById('pp').style.display='none';document.getElementById('ppb').style.display='none';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePP();});

function doReload(btn){btn.classList.add('spinning');btn.disabled=true;setTimeout(()=>location.reload(),300);}

function animate(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.bar i').forEach(b=>{b.style.width=b.dataset.w+'%';});
    document.querySelectorAll('.donut circle.val').forEach(c=>{c.style.strokeDashoffset=c.dataset.off;});
  }));
}

// ── Overview ──────────────────────────────────────────────────────────────
function overview(){
  const act=D.projects.filter(p=>p.status==='active').length;
  const allDec=D.projects.reduce((s,p)=>s+(p.pendingDecisions||[]).length,0);
  const allBlk=D.projects.reduce((s,p)=>s+(p.blockers||[]).length,0);
  const auHot=D.projects.reduce((s,p)=>{const a=auditSummary(p);return s+(a?a.hot:0);},0);
  const totalC=D.projects[0].activity.map((_,i)=>D.projects.reduce((s,p)=>s+((p.activity||[])[i]||0),0)).reduce((a,b)=>a+b,0);

  // health level for command bar
  const hCls=allBlk||auHot?'danger':allDec?'warn':'clear';
  const hItems=[];
  if(allBlk)hItems.push(`<span class="badge st-danger">${allBlk} blocker${allBlk>1?'s':''}</span>`);
  if(auHot) hItems.push(`<span class="badge st-danger">${auHot} urgent audit issue${auHot>1?'s':''}</span>`);
  if(allDec)hItems.push(`<span class="badge st-warn">${allDec} pending decision${allDec>1?'s':''}</span>`);
  const hLine=hItems.length?hItems.join(' '):`<span style="color:var(--status-ok);font-weight:600">Portfolio clear</span>`;

  let h='<div class="crumbs">Overview</div><h2 class="page">Mission Control</h2>';

  // 1. Command bar — health + counters (replaces abstract stat strip)
  h+=`<div class="ov-cmd ${hCls} fade">`;
  h+=`<div class="ov-cmd-dot"></div>`;
  h+=`<div class="ov-cmd-items">${hLine}</div>`;
  h+=`<span class="ov-cmd-meta">${act} active · ${totalC} commits (14d)</span>`;
  h+=`</div>`;

  // 2. BIMpossible — primary card, focus leads
  const bp=D.projects.find(p=>p.id==='bimpossible');
  if(bp){
    const pct=overallPct(bp);
    h+=`<div class="card glow fade" style="margin-bottom:18px;cursor:pointer;animation-delay:.04s" data-id="${bp.id}">`;

    h+=`</div>`;
    // Focus block — PRIMARY content slot
    if(bp.focus){
      const ft=bp.focus.length>220?bp.focus.slice(0,220)+'…':bp.focus;
      h+=`<div class="ov-focus"><span class="ov-focus-lbl">Focus now</span>${esc(ft)}</div>`;
    }

    h+=`<div style="display:flex;gap:20px;flex-wrap:wrap">`;
    h+=`<div style="flex:2;min-width:260px">${phaseBars(bp.progress,bp.id)}`;
    if(bp.git&&bp.git.warn)h+=`<div class="gwarn" style="margin-top:10px">⚠ ${esc(bp.git.warn.split('.')[0])}</div>`;
    h+=`</div>`;
    h+=`<div style="flex:1;min-width:180px;display:flex;flex-direction:column;gap:11px">`;

  const pers=PERS.map(id=>D.projects.find(p=>p.id===id)).filter(Boolean);
  if(pers.length){
    h+=`<div class="ov-group pers fade" style="animation-delay:.14s">Personal</div>`;

    pers.forEach(p=>{
      const pct=overallPct(p);
      h+=`<div class="card pglow ov-compact" style="border-color:rgba(251,146,60,.14)" data-id="${p.id}">`;
      h+=`<div class="ov-nm">`;

      h+=`<span style="flex:1">${esc(p.name)}</span>`;
      h+=`<span class="pill ${PILL[p.status]}">${p.status}</span>`;
      h+=`</div>`;
      h+=`<div class="ov-sub">${esc(p.oneLiner||'')}</div>`;
      if(p.focus)h+=`<div class="ov-sub" style="color:rgba(251,146,60,.9)">${esc(p.focus.slice(0,90))}${p.focus.length>90?'…':''}</div>`;
      if((p.nextActions||[]).length)h+=`<div style="font-size:var(--ts-sm);color:var(--p);font-weight:600;margin-top:4px">→ ${esc(p.nextActions[0])}</div>`;
      h+=`<div class="ov-foot">`;

      h+=`</div>`;
      h+=badges(p,true);
      h+=`</div>`;

    h+=`</div>`;

  return h;

  h+=`<div style="flex:1;min-width:260px">`;
  h+=`<div style="font-family:Sora;font-weight:600;font-size:14px;line-height:1.45">${esc(p.phase||'')}</div>`;
  h+=`<div style="font-size:12px;color:var(--muted);margin-top:7px">Last activity: <b>${esc((p.lastActivity&&p.lastActivity.date)||'?')}</b> (${ageHtml(p.lastActivity&&p.lastActivity.date)}) — ${esc((p.lastActivity&&p.lastActivity.summary)||'')}</div>`;
  if(p.branch)h+=`<div style="font-size:12px;color:var(--muted);margin-top:5px">Branch: <code>${esc(p.branch)}</code></div>`;
  if(p.focus)h+=`<div class="focus${isP?' focus-p':''}" style="margin-top:12px"><b>If you only do one thing</b>${esc(p.focus)}</div>`;
  if(p.git&&p.git.warn)h+=`<div class="gwarn">${esc(p.git.warn)}</div>`;
  h+=`</div></div></div></div>`; // close: flex-1, flex-wrap, card, fade-wrapper

  // Phase bars (left) + decisions/watch/commit activity stacked (right column)
  h+=`<div class="g g2 fade" style="animation-delay:.05s;margin-bottom:14px">`;
  h+=`<div class="card ca-blue${isP?' pers-bars':''}"><h3>${esc((p.progress&&p.progress.label)||'Phases')} <span style="font-size:var(--ts-xs);color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0">— click a phase for tasks</span></h3>${phaseBars(p.progress,p.id)}</div>`;
  h+=`<div style="display:flex;flex-direction:column;gap:13px">`;
  if((p.blockers||[]).length)h+=`<div class="card ca-red"><h3>Blockers</h3><ul class="alist">${p.blockers.map(b=>`<li class="blk">${esc(b)}</li>`).join('')}</ul></div>`;
  if((p.pendingDecisions||[]).length)h+=`<div class="card ca-amber"><h3>Decisions waiting on you</h3><ul class="alist">${p.pendingDecisions.map(d=>`<li class="dec">${esc(d)}</li>`).join('')}</ul></div>`;
  if((p.reminders||[]).length)h+=`<div class="card ca-grey"><h3>Watch items</h3><ul class="alist">${p.reminders.map(r=>`<li class="rem">${esc(r)}</li>`).join('')}</ul></div>`;
  h+=`<div class="card ca-grey"><h3>Commit activity (14 days)</h3>${areaChart(p.activity||[],360,140,p.id+'x')}</div>`;
  h+=`</div></div>`;

  // Next actions (full width)
  h+=`<div class="fade" style="animation-delay:.09s;margin-bottom:14px">`;
  h+=`<div class="card ca-blue"><h3>Next actions</h3>`;
  if((p.nextActions||[]).length)h+=`<ul class="alist">${p.nextActions.map(a=>`<li>${esc(a)}</li>`).join('')}</ul>`;
  else h+=`<p class="empty">none</p>`;
  h+=`</div></div>`;

  // Audit
  if(p.audit){
    const a=p.audit;const tot=SEVS.reduce((s,k)=>s+(a.counts[k]||0),0);
    h+=`<div class="card fade ca-green" style="animation-delay:.13s;margin-bottom:14px"><h3>Audit</h3>`;
    h+=`<div class="au-latest">Latest run · <b>${esc(a.lastRun)}</b> · ${esc(a.runType)}</div>`;
    h+=`<div class="sevcounts" style="margin:13px 0 ${tot?'13px':'4px'}">`;
    SEVS.forEach(k=>{
      const n=a.counts[k]||0;
      h+=`<div class="sevpip${(k==='critical'||k==='high')&&n?' hot':''}"><span class="n" style="color:${n?(k==='critical'?'var(--red)':k==='high'?'var(--amber)':'var(--text)'):'var(--dim)'}">${n}</span><span class="k">${SEVLBL[k]}</span></div>`;
    });
    h+=`</div>`;
    if(tot)h+=`<div class="ah-h">Open findings · ${tot}</div>`+a.open.map(f=>`<div class="find"><span class="fid">${sevBadge(f.sev)}</span><div class="ft"><b style="font-family:Sora;font-weight:600">${esc(f.id)}</b> – ${esc(f.title)}${f.where?` <span class="fw">(${esc(f.where)})</span>`:''}</div></div>`).join('');
    else h+=`<p class="clean">${ICO.shield.replace('<svg',`<svg width="15" height="15" style="stroke:var(--green)">`)} No open findings — all clear as of the last run.</p>`;
    h+=`<p style="font-size:var(--ts-sm);color:var(--dim);margin-top:10px"><span class="trend ${a.trend||'flat'}">${a.trend||'flat'}</span> · ${a.closedLastRun||0} closed last run${a.cadence?' · '+esc(a.cadence):''}</p>`;
    h+=auditHistory(p);
    h+=`<div class="links" style="margin-top:8px">${pathLink(a.reportPath,'Full report')}${a.ledgerPath?pathLink(a.ledgerPath,'Audit ledger'):''}</div></div>`;
  }

  // Waves
  if(p.waves){
    const w=p.waves;
    h+=`<div class="card fade ca-purple" style="animation-delay:.15s;margin-bottom:14px"><h3>Waves${w.updated?` <span style="font-size:var(--ts-xs);color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0">ledger updated ${esc(w.updated)}</span>`:''}</h3>`;
    h+=wavePanel(w);
    if(w.source)h+=`<div class="links" style="margin-top:10px">${pathLink(w.source,'Wave ledger')}</div>`;
    h+=`</div>`;
  }

  // Recent + links
  if((p.recent||[]).length){
    h+=`<div class="card fade ca-grey" style="animation-delay:.17s;margin-bottom:14px"><h3>Recent activity</h3><div class="tl">${p.recent.map(tlItem).join('')}</div></div>`;
  }
  if((p.links||[]).length){
    h+=`<div class="card fade ca-grey" style="animation-delay:.19s"><h3>Key files</h3><div class="links">${p.links.map(l=>pathLink(l.path,l.label)).join('')}</div></div>`;
  }
  return h;
}

// ── Audit view ───────────────────────────────────────────────────────────
function auditHistory(p){
  const hist=p.audit&&p.audit.history;
  if(!hist||!hist.length)return'';
  return`<div class="ah"><div class="ah-h">Run history · ${hist.length} run${hist.length!==1?'s':''}</div>`
    +hist.map(r=>`<div class="ah-row"><div class="ah-when"><span class="ah-date">${esc(r.date||'')}</span><span class="ah-type">${esc(r.type||'')}</span></div><div class="ah-body"><div class="ah-result">${esc(r.result||'')}</div>${r.scope?`<div class="ah-scope">${esc(r.scope)}</div>`:''}</div>${r.report?`<span class="ah-ref" title="report reference">${esc(r.report)}</span>`:''}</div>`).join('')
    +`</div>`;
}
function auditView(){
  const wa=D.projects.filter(p=>p.audit);
  const agg={critical:0,high:0,medium:0,low:0,info:0};
  wa.forEach(p=>SEVS.forEach(k=>agg[k]+=(p.audit.counts[k]||0)));
  const totO=SEVS.reduce((s,k)=>s+agg[k],0);
  const closed=wa.reduce((s,p)=>s+(p.audit.closedLastRun||0),0);

  // Split: hot (has unresolved open findings) vs clean vs unaudited
  const hotProjs  =wa.filter(p=>(p.audit.open||[]).length>0);
  const cleanProjs=wa.filter(p=>(p.audit.open||[]).length===0);
  const noAudit   =D.projects.filter(p=>!p.audit);

  let h='<div class="crumbs">Audit</div><h2 class="page">Audit Findings</h2>';

  // 1. Command bar — portfolio health at a glance
  const hCls=totO>0?(agg.critical>0?'danger':'warn'):'clear';
  h+=`<div class="ov-cmd ${hCls} fade">`;
  h+=`<div class="ov-cmd-dot"></div>`;
  h+=`<div class="ov-cmd-items">`;
  if(totO===0){
    h+=`<span style="color:var(--status-ok);font-weight:600">All clear — no open findings across ${wa.length} audited projects</span>`;
  } else {
    SEVS.filter(k=>agg[k]).forEach(k=>{
      const cls=(k==='critical'||k==='high')?'st-danger':k==='medium'?'st-warn':'st-dim';
      h+=`<span class="badge ${cls}">${agg[k]} ${SEVLBL[k].toLowerCase()}</span>`;
    });
  }
  h+=`</div>`;
  if(closed>0)h+=`<span class="ov-cmd-meta">${closed} findings closed across recent audits</span>`;
  h+=`</div>`;

  // 2. Open findings — severity-led, project-attributed
  //    These are CURRENTLY UNRESOLVED items, NOT findings from the latest run.
  if(hotProjs.length){
    h+=`<div class="sh fade" style="animation-delay:.04s">Currently unresolved <small>${totO} finding${totO!==1?'s':''}</small></div>`;
    hotProjs.forEach((p,pi)=>{
      (p.audit.open||[]).forEach((f,fi)=>{
        const isCrit=(f.sev==='critical'||f.sev==='high');
        h+=`<div class="card ${isCrit?'ca-red':'ca-amber'} au-finding fade" style="animation-delay:${.06+pi*.04+fi*.02}s">`;
        h+=`<div class="au-finding-row">`;
        h+=`<div class="au-sev-col">${sevBadge(f.sev)}</div>`;
        h+=`<div class="au-finding-body">`;
        h+=`<div class="au-finding-title">${esc(f.id)} — ${esc(f.title)}</div>`;
        h+=`<div class="au-finding-meta">`;
        h+=(ICO[p.icon]||ICO.cube).replace('<svg',`<svg width="12" height="12" style="stroke:var(--muted);stroke-width:2;fill:none;flex-shrink:0"`);
        h+=`<span style="font-weight:600">${esc(p.name)}</span>`;
        if(f.where)h+=`<span class="au-where">${esc(f.where)}</span>`;
        h+=`<span class="au-confirmed">unresolved as of ${esc(p.audit.lastRun)}</span>`;
        const tCls=p.audit.trend==='improving'?'st-ok':p.audit.trend==='worsening'?'st-danger':'st-dim';
        h+=`<span class="badge ${tCls}">${p.audit.trend||'flat'}</span>`;
        h+=`</div></div></div></div>`;
      });
    });
  } else if(!totO){
    h+=`<div class="card ca-green fade" style="animation-delay:.04s;padding:18px 22px">`;
    h+=`<div class="clean" style="font-size:var(--ts-base)">${ICO.shield.replace('<svg',`<svg width="18" height="18" style="stroke:var(--status-ok)">`)} No open findings across ${wa.length} audited project${wa.length!==1?'s':''}</div>`;
    if(closed>0)h+=`<div style="font-size:var(--ts-sm);color:var(--muted);margin-top:6px">${closed} findings closed in the most recent runs</div>`;
    h+=`</div>`;
  }

  // 3. Clean projects — compact, with inline recent history
  if(cleanProjs.length){
    h+=`<div class="sh fade" style="animation-delay:.12s">Clean <small>${cleanProjs.length} project${cleanProjs.length!==1?'s':''}</small></div>`;
    h+=`<div class="g g${cleanProjs.length>1?'2':'1'} fade" style="animation-delay:.14s;margin-bottom:4px">`;
    cleanProjs.forEach(p=>{
      const age=daysAgo(p.audit.lastRun);
      const stale=age!==null&&age>14;
      h+=`<div class="card au-clean" data-id="${p.id}">`;
      h+=`<div style="display:flex;align-items:center;gap:10px">`;
      h+=(ICO[p.icon]||ICO.cube).replace('<svg',`<svg width="14" height="14" style="stroke:var(--muted);stroke-width:2;fill:none;flex-shrink:0"`);
      h+=`<span style="font-family:Sora,sans-serif;font-weight:600;flex:1">${esc(p.name)}</span>`;
      h+=`<span style="color:var(--status-ok);font-size:var(--ts-sm)">✓ All clear</span>`;
      h+=`</div>`;
      h+=`<div class="au-clean-meta">`;
      h+=`<span>Last run ${esc(p.audit.lastRun)}${stale?` <span style="color:var(--status-warn)">(stale — ${age}d)</span>`:''}</span>`;
      if(p.audit.closedLastRun)h+=`<span style="color:var(--status-ok)">${p.audit.closedLastRun} closed last run</span>`;
      const tCls2=p.audit.trend==='improving'?'st-ok':p.audit.trend==='worsening'?'st-danger':'st-dim';
      h+=`<span class="badge ${tCls2}">${p.audit.trend||'flat'}</span>`;
      h+=`</div>`;
      if((p.audit.history||[]).length){
        h+=`<div class="au-compact-hist">`;
        p.audit.history.slice(0,2).forEach(r=>{
          h+=`<div class="au-hist-row"><span class="au-hist-date">${esc(r.date)}</span><span class="au-hist-result">${esc(r.result.slice(0,110))}${r.result.length>110?'…':''}</span></div>`;
        });
        if(p.audit.history.length>2)h+=`<div style="font-size:var(--ts-xs);color:var(--dim);padding-top:4px">+${p.audit.history.length-2} earlier runs — see project detail</div>`;
        h+=`</div>`;
      }
      h+=`<div class="links" style="margin-top:10px">${pathLink(p.audit.reportPath,'Latest report')}${p.audit.ledgerPath?pathLink(p.audit.ledgerPath,'Run ledger'):''}</div>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  // 4. Unaudited projects — tertiary, compact chips
  if(noAudit.length){
    h+=`<div class="sh fade" style="animation-delay:.20s">Not yet audited <small>${noAudit.length}</small></div>`;
    h+=`<div class="card fade" style="animation-delay:.22s;padding:12px 16px">`;
    h+=`<div style="display:flex;flex-wrap:wrap;gap:8px">`;
    noAudit.forEach(p=>{
      h+=`<div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);font-size:var(--ts-sm);color:var(--dim)">`;
      h+=(ICO[p.icon]||ICO.cube).replace('<svg',`<svg width="12" height="12" style="stroke:var(--dim);stroke-width:2;fill:none;flex-shrink:0"`);
      h+=`<span>${esc(p.name)}</span>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  }

  // 5. Full run history for hot projects — secondary, positioned last
  hotProjs.filter(p=>(p.audit.history||[]).length).forEach((p,i)=>{
    h+=`<div class="card fade" style="animation-delay:${.26+i*.04}s;margin-top:13px">`;
    h+=`<h3>${esc(p.name)} — run history</h3>`;
    h+=`<div class="au-latest" style="margin-bottom:10px">Last run <b>${esc(p.audit.lastRun)}</b> · ${esc(p.audit.runType||'')}</div>`;
    h+=auditHistory(p);
    h+=`<div class="links" style="margin-top:11px">${pathLink(p.audit.reportPath,'Latest report')}${p.audit.ledgerPath?pathLink(p.audit.ledgerPath,'Run ledger'):''}</div>`;
    h+=`</div>`;
  });

  return h;
}

// ── Graph view ───────────────────────────────────────────────────────────
function glChart(series,labels,w,h,id){
  const n=series.length;if(!n)return'';
  const max=Math.max(...series),min=Math.min(...series),range=max-min||1;
  const pL=32,pR=6,pT=8,pB=20,iw=w-pL-pR,ih=h-pT-pB;
  const pts=series.map((v,i)=>[pL+iw*(n>1?i/(n-1):.5),pT+ih*(1-(v-min)/range)]);
  let d='M'+pts[0][0]+','+pts[0][1];
  for(let i=1;i<n;i++){const p0=pts[i-1],p1=pts[i],mx=(p0[0]+p1[0])/2;d+=` C${mx},${p0[1]} ${mx},${p1[1]} ${p1[0]},${p1[1]}`;}
  const area=d+` L${pts[n-1][0]},${pT+ih} L${pts[0][0]},${pT+ih} Z`;
  const step=Math.ceil(n/5);let ticks='';
  for(let i=0;i<n;i+=step)ticks+=`<text class="axis" x="${pL+iw*(n>1?i/(n-1):.5)}" y="${h-3}" text-anchor="middle">${esc(labels[i])}</text>`;
  const yTicks=[min,max].map((v,k)=>`<text class="axis" x="${pL-3}" y="${k===0?pT+ih:pT+4}" text-anchor="end">${Math.round(v).toLocaleString()}</text>`).join('');
  const dots=pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="var(--w)"><title>${series[i].toLocaleString()}</title></circle>`).join('');
  return`<div class="chart-wrap"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="max-height:${h}px">
    <defs><linearGradient id="gl${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(110,168,255,.32)"/><stop offset="100%" stop-color="rgba(110,168,255,0)"/></linearGradient></defs>
    <line x1="${pL}" y1="${pT+ih}" x2="${w-pR}" y2="${pT+ih}" stroke="var(--track)"/>
    <path d="${area}" fill="url(#gl${id})"/><path d="${d}" fill="none" stroke="var(--w)" stroke-width="1.8"/>
    ${dots}${ticks}${yTicks}</svg></div>`;
}
function gnBar(nodes){
  if(!nodes||!nodes.length)return'';
  const mx=Math.max(...nodes.map(n=>n.edges));
  return'<div style="display:flex;flex-direction:column;gap:6px;padding:2px 0">'+nodes.map(n=>{
    const pct=Math.round(n.edges/mx*100);
    const lbl=n.name.length>32?n.name.slice(0,30)+'…':n.name;
    return`<div style="display:flex;align-items:center;gap:9px">
      <span style="min-width:180px;font-size:var(--ts-sm);font-family:Sora;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(lbl)}</span>
      <div style="flex:1;height:6px;border-radius:4px;background:var(--track);overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--w),var(--w2));transition:width .9s cubic-bezier(.22,1,.36,1)"></div></div>
      <span class="num" style="min-width:26px;font-size:11px;color:var(--dim);text-align:right">${n.edges}</span></div>`;
  }).join('')+'</div>';
}
function networkxImpactBody(){
  const ni=window.NETWORKX_IMPACT;
  if(!ni)return'<p style="color:var(--muted);padding:1rem">No impact data — run networkx_impact.py to generate.</p>';
  const surfaces=ni.surfaces||[];
  const risk   =surfaces.filter(r=>r.category==='risk');
  const active =surfaces.filter(r=>r.category==='active');
  const staticS=surfaces.filter(r=>r.category==='static');
  const missing=surfaces.filter(r=>r.category==='missing');

  // ── palette ────────────────────────────────────────────────────────────────
  const RISK_BG   ='rgba(255,150,0,0.08)';
  const RISK_BORD ='rgba(255,150,0,0.35)';
  const RISK_COL  ='#ffaa33';
  const ACT_BG    ='rgba(80,160,255,0.07)';
  const ACT_BORD  ='rgba(80,160,255,0.25)';
  const ACT_COL   ='#5fa8ff';
  const STAT_BG   ='rgba(255,255,255,0.04)';
  const STAT_BORD ='rgba(255,255,255,0.08)';
  const STAT_COL  ='rgba(255,255,255,0.5)';
  const MISS_BG   ='rgba(255,255,255,0.02)';
  const MISS_BORD ='rgba(255,255,255,0.05)';

  function pill(label,bg,col){
    return`<span style="font-size:0.6rem;font-weight:700;letter-spacing:.07em;padding:2px 8px;border-radius:10px;background:${bg};color:${col}">${label}</span>`;
  }
  function chip(t){
    return`<code style="font-size:0.6rem;background:rgba(255,255,255,.06);padding:1px 5px;border-radius:3px;color:rgba(255,255,255,0.3)">${esc(t)}</code>`;
  }
  function repoTag(r){
    return`<span style="font-size:0.6rem;color:rgba(255,255,255,0.25);background:rgba(255,255,255,.04);padding:1px 6px;border-radius:8px">${esc(r)}</span>`;
  }
  function sectionHead(label){
    return`<div style="display:flex;align-items:center;gap:0.5rem;margin:1.1rem 0 0.55rem">
      <span style="font-size:0.6rem;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,0.25)">${label}</span>
      <div style="flex:1;height:1px;background:rgba(255,255,255,.06)"></div>
    </div>`;
  }

  // ── surface card ───────────────────────────────────────────────────────────
  function card(row){
    const isR=row.category==='risk', isA=row.category==='active',
          isS=row.category==='static', isM=row.category==='missing';
    const bg   =isR?RISK_BG  :isA?ACT_BG  :isS?STAT_BG  :MISS_BG;
    const bord =isR?RISK_BORD:isA?ACT_BORD:isS?STAT_BORD:MISS_BORD;
    const numC =isR?RISK_COL :isA?ACT_COL :STAT_COL;
    const pillH=isR?pill('⚠ RISK',RISK_BG,RISK_COL)
               :isA?pill('● ACTIVE',ACT_BG,ACT_COL)
               :isS?pill('─ MAPPED',STAT_BG,STAT_COL)
                   :pill('○ NO DATA',MISS_BG,'rgba(255,255,255,0.2)');
    const opacity=isM?'0.45':'1';
    const numStr=row.nodes!=null?Number(row.nodes).toLocaleString():null;

    return`<div style="background:${bg};border:1px solid ${bord};border-radius:8px;padding:0.9rem 1rem;display:flex;flex-direction:column;gap:0.3rem;opacity:${opacity}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.4rem;margin-bottom:0.15rem">
        ${pillH}${repoTag(row.repo)}
      </div>
      ${numStr!=null
        ?`<div style="font-size:2rem;font-weight:800;line-height:1;color:${numC};letter-spacing:-.02em">${numStr}</div>`
        :isM?`<div style="font-size:1.1rem;font-weight:700;color:rgba(255,255,255,0.1);line-height:1">—</div>`
            :`<div style="font-size:0.8rem;font-weight:600;color:rgba(255,255,255,0.35);line-height:1.35;margin-top:0.1rem">${esc(row.finding)}</div>`
      }
      <div style="font-size:0.85rem;font-weight:600;color:${isM?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.8)'};line-height:1.2">${esc(row.label)}</div>
      ${numStr!=null&&!isM?`<div style="font-size:0.7rem;color:rgba(255,255,255,0.35);line-height:1.35">${esc(row.finding)}</div>`:''}
      <div style="display:flex;gap:0.25rem;flex-wrap:wrap;margin-top:0.2rem">${chip(row.tool)} ${chip(row.algo)}</div>
    </div>`;
  }

  // ── summary bar ────────────────────────────────────────────────────────────
  const riskPills=risk.map(r=>`<span style="background:${RISK_BG};color:${RISK_COL};padding:3px 10px;border-radius:12px;font-size:0.7rem;font-weight:600;white-space:nowrap">⚠ ${r.nodes} ${esc(r.label.toLowerCase())}</span>`).join('');

function graphMetricsBody(){

    +`</div>`;
  h+=`<p style="font-size:var(--ts-sm);color:var(--dim);margin:12px 0 14px">Snapshot: ${esc(L.ts.slice(0,10))} · commit <code>${esc(L.sha)}</code> · ${gm.length} push${gm.length!==1?'es':''} tracked</p>`;
  h+=`<div class="g g2 fade" style="animation-delay:.06s">`;
  if(gm.length>1){
    h+=`<div class="card"><h3>Nodes over time</h3>${glChart(gm.map(m=>m.nodes),gm.map(m=>m.ts.slice(5,10)+' '+m.sha),360,120,'gn')}</div>`;
    h+=`<div class="card"><h3>Import cycles over time</h3>${glChart(gm.map(m=>m.cycles),gm.map(m=>m.ts.slice(5,10)+' '+m.sha),360,120,'gc')}</div>`;
  }else{
    h+=`<div class="card"><h3>Nodes over time</h3><p class="empty" style="padding:20px 0">Trends appear after the next push.</p></div>`;
    h+=`<div class="card"><h3>Import cycles over time</h3><p class="empty" style="padding:20px 0">Trends appear after the next push.</p></div>`;
  }
  h+=`</div>`;
  const gn=L.godNodes||[];
  if(gn.length)h+=`<div class="card fade" style="animation-delay:.09s;margin-top:13px"><h3>Top god nodes — highest blast radius</h3>${gnBar(gn)}</div>`;
  h+=`<div class="card fade" style="animation-delay:.11s;margin-top:13px"><h3>Quick links</h3><div class="links">`
    +`<a class="path-chip" href="#" onclick="window._ctab='network';show('graph');return false;">Interactive node graph</a>`
    +`<a class="path-chip" href="#" onclick="window._ctab='dashboard';show('graph');return false;">Standalone dashboard</a>`
    +`<a class="path-chip" href="#" onclick="window._ctab='report';show('graph');return false;">Graph report</a>`
    +`</div></div>`;
  return h;
}
