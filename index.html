<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-Dev Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080d;--panel:rgba(16,20,34,.82);--panel2:#131928;--panel3:#0f1422;
  --border:rgba(255,255,255,.065);--border-hi:rgba(110,140,255,.38);
  --text:#e2e6f3;--muted:#8491a8;--dim:#4d5870;
  --w:#6ea8ff;--w2:#a78bfa;--w3:#34d399;
  --p:#fb923c;--p2:#fbbf24;
  --green:#34d399;--amber:#fbbf24;--red:#f87171;--grey:#5d6880;
  --track:rgba(255,255,255,.055);--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--text);
  font:13.5px/1.6 Inter,"Segoe UI",system-ui,sans-serif;
  background-image:
    radial-gradient(ellipse 1000px 600px at 8% -8%,rgba(70,110,255,.09),transparent 58%),
    radial-gradient(ellipse 700px 500px at 92% 12%,rgba(140,80,255,.06),transparent 55%),
    radial-gradient(ellipse 500px 400px at 50% 100%,rgba(251,146,60,.03),transparent 60%);
  background-attachment:fixed;
}
h1,h2,h3,h4,.num{font-family:Sora,sans-serif;}
.num{font-variant-numeric:tabular-nums;}

/* ── Layout ────────────────────────────────── */
.app{display:flex;min-height:100vh;}

/* ── Sidebar ───────────────────────────────── */
aside{
  width:252px;flex-shrink:0;padding:18px 11px;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:1px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.logo{display:flex;align-items:center;gap:10px;padding:4px 10px 18px;}
.logo .mark{
  width:30px;height:30px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--w),var(--w2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 18px rgba(110,168,255,.32);
}
.logo .mark svg{width:15px;height:15px;stroke:#fff;stroke-width:2;fill:none;}
.logo h1{font-size:13.5px;font-weight:700;line-height:1.15;}
.logo span{font-size:10px;color:var(--dim);}

.grp-lbl{
  font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);padding:14px 12px 5px;
}
.grp-lbl.personal{color:rgba(251,146,60,.45);}
.grp-sep{height:1px;background:var(--border);margin:6px 12px;}

.nav{
  display:flex;align-items:center;gap:9px;padding:8px 11px;
  border-radius:10px;cursor:pointer;color:var(--muted);
  border:1px solid transparent;
  transition:background .15s,color .15s,border-color .15s;user-select:none;
}
.nav:hover{background:rgba(255,255,255,.04);color:var(--text);}
.nav.active{
  background:linear-gradient(90deg,rgba(110,168,255,.14),rgba(167,139,250,.07));
  border-color:var(--border-hi);color:var(--text);
}
.nav.pers.active{
  background:linear-gradient(90deg,rgba(251,146,60,.13),rgba(251,191,36,.06));
  border-color:rgba(251,146,60,.38);
}
.nav svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0;}
.nav .nm{flex:1;font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav .pc{font-size:10px;color:var(--dim);font-family:Sora;}
.nav .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.side-foot{margin-top:auto;padding:14px 10px 2px;font-size:10.5px;color:var(--dim);}
.side-foot .warn{color:var(--amber);}
.reload-btn{
  display:flex;align-items:center;gap:6px;width:100%;margin-top:9px;
  padding:7px 12px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:11px;
  font-family:Inter,sans-serif;cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;text-align:left;
}
.reload-btn:hover{background:rgba(110,168,255,.1);color:var(--w);border-color:var(--border-hi);}
.reload-btn svg{width:12px;height:12px;flex-shrink:0;}
.reload-btn.spinning svg{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Main ──────────────────────────────────── */
main{flex:1;padding:26px 34px 60px;min-width:0;}
.crumbs{font-size:11px;color:var(--dim);margin-bottom:3px;}
h2.page{font-size:21px;font-weight:700;letter-spacing:-.01em;margin-bottom:3px;}
.sub{color:var(--muted);margin-bottom:20px;max-width:82ch;font-size:13px;}
.mtabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,.08);}
.mtab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;padding:8px 15px;cursor:pointer;transition:color .15s,border-color .15s;margin-bottom:-1px;}
.mtab:hover{color:var(--text);}
.mtab.on{color:var(--w);border-bottom-color:var(--w);}
.mdbody{font-size:13px;color:var(--text);line-height:1.6;}
.mdbody h1,.mdbody h2,.mdbody h3,.mdbody h4{font-family:Sora;color:#fff;margin:18px 0 8px;line-height:1.3;}
.mdbody h1{font-size:20px;}.mdbody h2{font-size:17px;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:5px;}.mdbody h3{font-size:15px;}.mdbody h4{font-size:13px;color:var(--muted);}
.mdbody p{margin:7px 0;color:var(--muted);}
.mdbody code{background:rgba(110,168,255,.1);color:var(--w);padding:1px 5px;border-radius:4px;font-size:12px;}
.mdbody pre.mdcode{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:7px;padding:12px;overflow:auto;font-size:12px;}
.mdbody pre.mdcode code{background:none;padding:0;color:var(--text);}
.mdbody ul{margin:7px 0;padding-left:20px;color:var(--muted);}.mdbody li{margin:3px 0;}
.mdbody a{color:var(--w);text-decoration:none;}.mdbody a:hover{text-decoration:underline;}
.mdbody hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:16px 0;}
.mdbody table.mdtable{border-collapse:collapse;width:100%;margin:10px 0;font-size:12px;}
.mdbody .mdtable th{text-align:left;color:var(--muted);font-weight:600;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.12);text-transform:uppercase;font-size:10.5px;letter-spacing:.04em;}
.mdbody .mdtable td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.05);}
.mdbody .mdtable tr:hover td{background:rgba(110,168,255,.04);}

/* ── Pills ─────────────────────────────────── */
.pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
}
.pill::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;}
.p-active {color:var(--green);background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.28);}
.p-gated  {color:var(--amber);background:rgba(251,191,36,.1);  border:1px solid rgba(251,191,36,.28);}
.p-paused {color:#b0bac8;    background:rgba(176,186,200,.08); border:1px solid rgba(176,186,200,.2);}
.p-dormant{color:var(--grey); background:rgba(93,104,128,.1);  border:1px solid rgba(93,104,128,.22);}

/* ── Cards ─────────────────────────────────── */
.card{
  background:rgba(22,30,54,.94);
  border:1px solid rgba(255,255,255,.11);
  border-radius:var(--r);padding:18px 20px;
  backdrop-filter:blur(16px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 2px 8px rgba(0,0,0,.5),0 14px 36px rgba(0,0,0,.28);
}
.card h3{
  font-size:10.5px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;
}
.card.glow{
  border-color:rgba(110,168,255,.36);
  animation:wglow 3.5s ease-in-out infinite;
}
.card.pglow{
  border-color:rgba(251,146,60,.3);
  animation:pglow 3.5s ease-in-out infinite;
}
@keyframes wglow{
  0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 2px 8px rgba(0,0,0,.5),0 14px 36px rgba(0,0,0,.28),0 0 0 1px rgba(110,168,255,.08);}
  50%{box-shadow:inset 0 1px 0 rgba(110,168,255,.14),0 2px 8px rgba(0,0,0,.5),0 16px 44px rgba(0,0,0,.32),0 0 32px rgba(110,168,255,.16);}
}
@keyframes pglow{
  0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 2px 8px rgba(0,0,0,.5),0 14px 36px rgba(0,0,0,.28),0 0 0 1px rgba(251,146,60,.07);}
  50%{box-shadow:inset 0 1px 0 rgba(251,146,60,.12),0 2px 8px rgba(0,0,0,.5),0 16px 44px rgba(0,0,0,.32),0 0 28px rgba(251,146,60,.14);}
}

/* ── Stat row ──────────────────────────────── */
.stat-row{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
.stat{
  flex:1;min-width:110px;padding:13px 15px;
  background:rgba(18,26,48,.92);border:1px solid rgba(255,255,255,.1);border-radius:11px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 8px rgba(0,0,0,.4);
  cursor:default;
}
.stat .v{font-family:Sora;font-size:22px;font-weight:700;line-height:1;}
.stat .l{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;}
.stat.ok .v{color:var(--green);}.stat.warn .v{color:var(--amber);}
.stat.bad .v{color:var(--red);}.stat.info .v{color:var(--w);}
.stat[data-id]{cursor:pointer;transition:border-color .15s;}
.stat[data-id]:hover{border-color:var(--border-hi);}

/* ── Section headers ───────────────────────── */
.sec-hd{display:flex;align-items:center;gap:12px;margin:0 0 14px;}
.sec-hd .t{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);white-space:nowrap;}
.sec-hd .ln{flex:1;height:1px;background:var(--border);}
.sec-hd.pers .t{color:rgba(251,146,60,.55);}
.sec-hd.pers .ln{background:rgba(251,146,60,.14);}

/* ── Grid ──────────────────────────────────── */
.g{display:grid;gap:13px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.g4{grid-template-columns:1fr 1fr 1fr 1fr;}
.span4{grid-column:span 4;}
.span2{grid-column:span 2;}

/* ── Donut ─────────────────────────────────── */
.donut{position:relative;flex-shrink:0;}
.donut svg{transform:rotate(-90deg);display:block;}
.donut .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut .mid .n{font-family:Sora;font-weight:700;}
.donut .mid .t{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;}
.donut circle.val{transition:stroke-dashoffset .9s cubic-bezier(.22,1,.36,1);}

/* ── Progress bars ─────────────────────────── */
.phases{display:flex;flex-direction:column;gap:9px;}
.ph .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:6px;}
.ph .nm{font-size:12.5px;font-weight:500;}
.ph .nt{font-size:11px;color:var(--dim);}
.ph .pv{font-family:Sora;font-weight:600;font-size:12px;color:var(--muted);}
.bar{height:7px;border-radius:5px;background:var(--track);overflow:hidden;}
.bar i{display:block;height:100%;width:0;border-radius:5px;
  background:linear-gradient(90deg,var(--w),var(--w2));
  box-shadow:0 0 8px rgba(110,168,255,.28);
  transition:width .9s cubic-bezier(.22,1,.36,1);}
.bar i.full{background:linear-gradient(90deg,var(--green),#19b07f);box-shadow:0 0 8px rgba(52,211,153,.22);}
.pers-bars .bar i{background:linear-gradient(90deg,var(--p),var(--p2));box-shadow:0 0 8px rgba(251,146,60,.22);}

/* mini bars */
.mphases{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.mph{display:flex;align-items:center;gap:7px;}
.mph .lbl{font-size:10.5px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.mph .bar{flex:0 0 60px;height:5px;}
.mph .pv{font-size:10px;color:var(--dim);font-family:Sora;font-weight:600;min-width:26px;text-align:right;}

/* ── Heat grid ─────────────────────────────── */
.heat{display:flex;gap:3px;align-items:center;}
.hc{width:15px;height:15px;border-radius:3px;background:var(--track);flex-shrink:0;transition:opacity .2s;}
.hc:hover{opacity:.7;}
.hc.h1{background:rgba(110,168,255,.18);}
.hc.h2{background:rgba(110,168,255,.42);}
.hc.h3{background:rgba(110,168,255,.68);}
.hc.h4{background:rgba(110,168,255,.92);}
.pers .hc.h1{background:rgba(251,146,60,.18);}
.pers .hc.h2{background:rgba(251,146,60,.42);}
.pers .hc.h3{background:rgba(251,146,60,.68);}
.pers .hc.h4{background:rgba(251,146,60,.9);}

/* ── Badges ────────────────────────────────── */
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
.badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:600;
  background:var(--panel2);border:1px solid var(--border);color:var(--dim);
}
.badge.ok  {color:var(--green);border-color:rgba(52,211,153,.22); background:rgba(52,211,153,.06);}
.badge.warn{color:var(--amber);border-color:rgba(251,191,36,.22); background:rgba(251,191,36,.06);}
.badge.bad {color:var(--red);  border-color:rgba(248,113,113,.22);background:rgba(248,113,113,.06);}
.badge.info{color:var(--w);    border-color:rgba(110,168,255,.22); background:rgba(110,168,255,.06);}

/* ── Focus chip ────────────────────────────── */
.focus{
  margin-top:11px;padding:9px 13px;border-radius:10px;
  background:linear-gradient(100deg,rgba(110,168,255,.11),rgba(167,139,250,.05));
  border:1px solid rgba(110,168,255,.22);font-size:12.5px;color:var(--muted);
}
.focus b{display:block;color:var(--w);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px;}
.focus-p{background:linear-gradient(100deg,rgba(251,146,60,.09),rgba(251,191,36,.04));border-color:rgba(251,146,60,.22);}
.focus-p b{color:var(--p);}

/* ── Timeline ──────────────────────────────── */
.tl{display:flex;flex-direction:column;gap:10px;}
.tl-i{display:flex;gap:9px;align-items:flex-start;}
.tl-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;margin-top:5px;}
.tl-dot.now{background:var(--green);box-shadow:0 0 6px rgba(52,211,153,.5);}
.tl-dot.new{background:var(--w);}
.tl-body{flex:1;min-width:0;}
.tl-date{font-size:10px;color:var(--dim);font-family:Sora;}
.tl-text{font-size:11.5px;color:var(--muted);line-height:1.45;}

/* ── Wave panel ────────────────────────────── */
.wave-sum{display:flex;gap:8px;margin-bottom:12px;}
.wpip{flex:1;text-align:center;padding:8px 4px;background:var(--panel3);border:1px solid var(--border);border-radius:9px;}
.wpip .wn{font-family:Sora;font-size:17px;font-weight:700;line-height:1;}
.wpip .wl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.wi{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);}
.wi:last-child{border-bottom:none;}
.wst{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.wbody{flex:1;min-width:0;}
.wtitle{font-size:12px;color:var(--muted);font-weight:500;}
.wnote{font-size:10.5px;color:var(--dim);margin-top:1px;}

/* ── Audit ─────────────────────────────────── */
.sevcounts{display:flex;gap:7px;flex-wrap:wrap;}
.sevpip{display:flex;flex-direction:column;align-items:center;min-width:55px;padding:9px 5px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);}
.sevpip.hot{border-color:rgba(248,113,113,.32);}
.sevpip .n{font-family:Sora;font-weight:700;font-size:19px;}
.sevpip .k{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-top:1px;}
.sev{display:inline-flex;align-items:center;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.sev-critical{color:#fff;background:var(--red);}
.sev-high{color:#1a1205;background:var(--amber);}
.sev-medium{color:var(--w);background:rgba(110,168,255,.15);border:1px solid rgba(110,168,255,.28);}
.sev-low{color:#b0bac8;background:rgba(176,186,200,.1);border:1px solid rgba(176,186,200,.2);}
.sev-info{color:var(--dim);background:rgba(120,130,150,.08);border:1px solid var(--border);}
.find{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
.find:last-child{border-bottom:none;}
.find .fid{font-family:Sora;font-size:10.5px;color:var(--muted);min-width:76px;padding-top:1px;}
.find .ft{flex:1;font-size:12.5px;}.find .fw{color:var(--dim);font-size:11px;}
.auditrow{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:8px;}
.auditrow:last-child{border-bottom:none;}.auditrow:hover{background:rgba(255,255,255,.03);}
.auditrow .anm{flex:1;font-weight:600;}
.trend.improving{color:var(--green);font-weight:600;}
.trend.flat{color:var(--dim);}
.trend.worsening{color:var(--red);font-weight:600;}
.clean{color:var(--green);font-size:12.5px;display:inline-flex;align-items:center;gap:6px;}

/* ── Git warn ──────────────────────────────── */
.gwarn{
  margin-top:10px;padding:8px 12px;border-radius:9px;font-size:11.5px;
  background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.22);color:var(--amber);
}

/* ── Lists ─────────────────────────────────── */
ul.alist{list-style:none;display:flex;flex-direction:column;gap:7px;}
ul.alist li{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;color:var(--muted);}
ul.alist li::before{content:"→";color:var(--w);flex-shrink:0;font-weight:700;}
ul.alist li.blk::before{content:"⬥";color:var(--red);}
ul.alist li.dec::before{content:"◆";color:var(--amber);}
ul.alist li.rem::before{content:"○";color:var(--dim);}
.links a{color:var(--w);text-decoration:none;font-size:12.5px;display:inline-block;margin:0 14px 6px 0;}
.links a:hover{text-decoration:underline;}
.path-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--w);background:rgba(110,168,255,.06);border:1px solid rgba(110,168,255,.18);border-radius:5px;cursor:pointer;padding:3px 9px;margin:0 8px 6px 0;font-family:inherit;text-decoration:none;transition:background .15s,border-color .15s,color .15s;}
.path-chip:hover{background:rgba(110,168,255,.12);border-color:rgba(110,168,255,.38);color:#fff;}
.path-chip.copied{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.4);color:var(--green);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(30,38,58,.96);border:1px solid rgba(110,168,255,.3);border-radius:8px;padding:8px 18px;font-size:13px;color:var(--text);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{color:var(--dim);font-style:italic;font-size:12.5px;}
code{background:var(--panel2);border:1px solid var(--border);padding:1px 6px;border-radius:5px;font-size:11.5px;}

/* ── Activity chart ────────────────────────── */
.chart-wrap{margin-top:4px;}
.chart-wrap svg{display:block;width:100%;height:auto;}
.axis{font-size:9px;fill:var(--dim);font-family:Inter;}

/* ── Phase popup ───────────────────────────── */
.ph-click{cursor:pointer;border-radius:8px;padding:5px 7px;margin:-5px -7px;transition:background .14s;}
.ph-click:hover{background:rgba(110,168,255,.07);}
.ph-click:hover .nm{color:var(--w);}
.ph-click::after{content:"↗";font-size:9px;color:var(--dim);margin-left:5px;opacity:0;transition:opacity .14s;vertical-align:1px;}
.ph-click:hover::after{opacity:1;}
.tsumm{font-size:10.5px;color:var(--dim);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;}
.ts-done{color:var(--green);}.ts-active{color:var(--w);}.ts-blocked{color:var(--red);}
.pp{
  position:fixed;z-index:1000;min-width:290px;max-width:450px;max-height:72vh;
  overflow-y:auto;background:#181f32;
  border:1px solid rgba(110,168,255,.38);border-radius:13px;
  padding:17px 19px;box-shadow:0 24px 70px rgba(0,0,0,.65);
  animation:ppIn .15s cubic-bezier(.22,1,.36,1);
}
@keyframes ppIn{from{opacity:0;transform:translateY(-5px) scale(.98)}to{opacity:1;transform:none}}
.pp-head{display:flex;align-items:flex-start;gap:9px;margin-bottom:5px;}
.pp-title{font-family:Sora;font-weight:700;font-size:13.5px;flex:1;line-height:1.3;}
.pp-pct{font-family:Sora;font-weight:700;font-size:16px;color:var(--w);white-space:nowrap;flex-shrink:0;}
.pp-x{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;padding:0;line-height:1;transition:background .14s,color .14s;}
.pp-x:hover{background:rgba(255,255,255,.08);color:var(--text);}
.pp-mb{height:4px;border-radius:3px;background:var(--track);margin:7px 0;overflow:hidden;}
.pp-mb-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--w),var(--w2));transition:width .6s cubic-bezier(.22,1,.36,1);}
.pp-note{font-size:11.5px;color:var(--muted);margin:0 0 11px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.pp-tasks{display:flex;flex-direction:column;gap:7px;}
.tr{display:flex;align-items:flex-start;gap:8px;}
.ti{width:17px;height:17px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-top:1px;}
.ti.done{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.24);}
.ti.active{background:rgba(110,168,255,.1);color:var(--w);border:1px solid rgba(110,168,255,.24);}
.ti.pending{background:rgba(255,255,255,.03);color:var(--dim);border:1px solid var(--border);}
.ti.blocked{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.24);}
.tb{flex:1;min-width:0;}
.tl2{font-size:12.5px;font-weight:500;line-height:1.35;}
.tn{font-size:11px;color:var(--dim);margin-top:1px;line-height:1.35;}

/* ── Fade-in ───────────────────────────────── */
.fade{opacity:0;transform:translateY(6px);animation:rise .45s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes rise{to{opacity:1;transform:none;}}
/* Fix: when glow+fade coexist, combine both animations so rise isn't overridden */
.card.glow.fade{animation:rise .45s cubic-bezier(.22,1,.36,1) forwards,wglow 3.5s ease-in-out .5s infinite;}
.card.pglow.fade{animation:rise .45s cubic-bezier(.22,1,.36,1) forwards,pglow 3.5s ease-in-out .5s infinite;}
@media(prefers-reduced-motion:reduce){
  .fade{animation:none;opacity:1;transform:none;}
  .bar i,.donut circle.val{transition:none;}
  .card.glow,.card.pglow{animation:none;}
}

/* ── Card accent borders ───────────────────── */
.ca-blue  {border-left:4px solid rgba(110,168,255,.75);padding-left:18px;background:rgba(110,168,255,.04);}
.ca-green {border-left:4px solid rgba(52,211,153,.75); padding-left:18px;background:rgba(52,211,153,.04);}
.ca-amber {border-left:4px solid rgba(251,191,36,.75);  padding-left:18px;background:rgba(251,191,36,.03);}
.ca-red   {border-left:4px solid rgba(248,113,113,.75); padding-left:18px;background:rgba(248,113,113,.04);}
.ca-purple{border-left:4px solid rgba(167,139,250,.75); padding-left:18px;background:rgba(167,139,250,.04);}
.ca-grey  {border-left:4px solid rgba(140,155,190,.5);  padding-left:18px;}

/* ── Project hero card ─────────────────────── */
.proj-hero{
  background:linear-gradient(155deg,rgba(26,38,72,.98) 0%,rgba(16,22,48,.96) 100%);
  border-color:rgba(110,168,255,.42);
  box-shadow:inset 0 1px 0 rgba(110,168,255,.14),0 2px 8px rgba(0,0,0,.55),0 18px 48px rgba(0,0,0,.35),0 0 40px rgba(110,168,255,.07);
}
.proj-hero-p{
  background:linear-gradient(155deg,rgba(56,34,18,.98) 0%,rgba(30,18,8,.96) 100%);
  border-color:rgba(251,146,60,.38);
  box-shadow:inset 0 1px 0 rgba(251,146,60,.12),0 2px 8px rgba(0,0,0,.55),0 18px 48px rgba(0,0,0,.35),0 0 36px rgba(251,146,60,.07);
}

/* ── Colored card h3 labels ────────────────── */
.h3-blue  .card h3,.card.h3-blue h3  {color:rgba(110,168,255,.7);}
.h3-green .card h3,.card.h3-green h3 {color:rgba(52,211,153,.7);}
.h3-amber .card h3,.card.h3-amber h3 {color:rgba(251,191,36,.6);}
.h3-red   .card h3,.card.h3-red h3   {color:rgba(248,113,113,.7);}
.h3-purple.card h3,.card.h3-purple h3{color:rgba(167,139,250,.7);}

/* ── Stat tile colored accents ─────────────── */
.stat.ok  {border-left:3px solid rgba(52,211,153,.65);background:rgba(52,211,153,.05);}
.stat.warn{border-left:3px solid rgba(251,191,36,.65);background:rgba(251,191,36,.04);}
.stat.bad {border-left:3px solid rgba(248,113,113,.65);background:rgba(248,113,113,.05);}
.stat.info{border-left:3px solid rgba(110,168,255,.65);background:rgba(110,168,255,.05);}

/* ── Overview hero card ────────────────────── */
.ov-hero{
  background:linear-gradient(145deg,rgba(24,34,66,.99) 0%,rgba(18,26,54,.97) 60%,rgba(24,18,54,.94) 100%);
  border-color:rgba(110,168,255,.42);
  box-shadow:inset 0 1px 0 rgba(110,168,255,.15),0 4px 12px rgba(0,0,0,.55),0 20px 52px rgba(0,0,0,.35),0 0 48px rgba(110,168,255,.08);
}

/* ── Section header enhanced ───────────────── */
.sec-hd .t{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;
  background:linear-gradient(90deg,var(--w),var(--w2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sec-hd.pers .t{
  background:linear-gradient(90deg,var(--p),var(--p2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── Responsive ────────────────────────────── */
@media(max-width:1200px){
  .g4{grid-template-columns:1fr 1fr;}.span4{grid-column:span 2;}
  .g3{grid-template-columns:1fr 1fr;}
}
@media(max-width:900px){
  .app{flex-direction:column;}
  aside{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;padding:10px;}
  .side-foot,.grp-lbl,.grp-sep{display:none;}
  main{padding:16px 15px 50px;}
  .g2,.g3,.g4{grid-template-columns:1fr;}
  .span4,.span2{grid-column:span 1;}
}
/* graph */
.gmg{grid-template-columns:repeat(4,1fr);margin-bottom:14px;}
@media(max-width:900px){.gmg{grid-template-columns:repeat(2,1fr);}}

/* ── Strategy view ─────────────────────────────────────────────────── */
.strat-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.strat-tab{background:rgba(22,30,54,.9);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 13px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit;}
.strat-tab:hover{border-color:rgba(110,168,255,.35);color:var(--text);}
.strat-tab.active{background:rgba(110,168,255,.13);border-color:rgba(110,168,255,.44);color:#fff;}
.strat-tab .tc{display:inline-block;margin-left:5px;background:rgba(255,255,255,.08);border-radius:4px;padding:1px 6px;font-size:10px;}
.strat-tab.active .tc{background:rgba(110,168,255,.2);}
.strat-sr{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.strat-sp{background:transparent;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--dim);cursor:pointer;transition:all .15s;font-family:inherit;text-transform:capitalize;}
.strat-sp:hover{border-color:rgba(255,255,255,.18);color:var(--muted);}
.strat-sp.active{border-color:rgba(110,168,255,.42);color:var(--w);background:rgba(110,168,255,.08);}
.strat-add-btn{margin-left:auto;background:rgba(110,168,255,.1);border:1px solid rgba(110,168,255,.28);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--w);cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500;}
.strat-add-btn:hover{background:rgba(110,168,255,.18);border-color:rgba(110,168,255,.5);}
.strat-form{background:rgba(16,24,46,.97);border:1px solid rgba(110,168,255,.28);border-radius:14px;padding:20px 22px;margin-bottom:16px;box-shadow:inset 0 1px 0 rgba(110,168,255,.1),0 4px 20px rgba(0,0,0,.4);}
.strat-form label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);display:block;margin-bottom:5px;}
.strat-form input,.strat-form textarea,.strat-form select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;margin-bottom:12px;outline:none;transition:border-color .15s;display:block;}
.strat-form input:focus,.strat-form textarea:focus,.strat-form select:focus{border-color:rgba(110,168,255,.5);}
.strat-form textarea{min-height:80px;resize:vertical;}
.strat-form select option{background:#131928;}
.strat-fbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.sf-save{background:rgba(110,168,255,.12);border:1px solid rgba(110,168,255,.38);border-radius:7px;padding:7px 18px;color:var(--w);cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;transition:all .15s;}
.sf-save:hover{background:rgba(110,168,255,.2);}
.sf-cancel{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:7px 18px;color:var(--muted);cursor:pointer;font-family:inherit;font-size:12.5px;transition:all .15s;}
.sf-cancel:hover{border-color:rgba(255,255,255,.2);color:var(--text);}
.strat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:13px;}
.strat-card{background:rgba(22,30,54,.94);border:1px solid rgba(255,255,255,.11);border-radius:14px;padding:18px 20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 2px 8px rgba(0,0,0,.5),0 10px 28px rgba(0,0,0,.25);transition:border-color .18s,opacity .18s;display:flex;flex-direction:column;}
.strat-card:hover{border-color:rgba(255,255,255,.19);}
.strat-card.denied{opacity:.38;}
.strat-ct{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.strat-cat-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;}
.strat-stat-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;}
.strat-title{font-family:Sora;font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.42;}
.strat-body{font-size:12px;color:var(--muted);line-height:1.65;flex:1;margin-bottom:14px;}
.strat-acts{display:flex;gap:6px;margin-top:auto;}
.sa{flex:1;border-radius:7px;padding:6px 8px;font-size:11px;cursor:pointer;border:1px solid;font-family:inherit;transition:all .15s;font-weight:500;text-align:center;}
.sa-ok{background:rgba(52,211,153,.06);border-color:rgba(52,211,153,.22);color:rgba(52,211,153,.75);}
.sa-ok:hover{background:rgba(52,211,153,.13);border-color:rgba(52,211,153,.48);color:var(--green);}
.sa-ok.on{background:rgba(52,211,153,.16);border-color:rgba(52,211,153,.6);color:var(--green);font-weight:700;}
.sa-rs{background:rgba(110,168,255,.06);border-color:rgba(110,168,255,.2);color:rgba(110,168,255,.75);}
.sa-rs:hover{background:rgba(110,168,255,.13);border-color:rgba(110,168,255,.46);color:var(--w);}
.sa-rs.on{background:rgba(110,168,255,.16);border-color:rgba(110,168,255,.58);color:var(--w);font-weight:700;}
.sa-no{background:rgba(248,113,113,.05);border-color:rgba(248,113,113,.18);color:rgba(248,113,113,.65);}
.sa-no:hover{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.44);color:var(--red);}
.sa-no.on{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.55);color:var(--red);font-weight:700;}
.sa-del{background:transparent;border-color:rgba(255,255,255,.08);color:var(--dim);max-width:34px;}
.sa-del:hover{border-color:rgba(248,113,113,.35);color:var(--red);}
/* ── Workflow lanes: in-progress, group sections, minimized completed, denied bucket ── */
.strat-card.inprogress{border-color:rgba(167,139,250,.34);box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 0 0 1px rgba(167,139,250,.1),0 10px 28px rgba(0,0,0,.25);}
.strat-ip-badge{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--w2);background:rgba(167,139,250,.14);border:1px solid rgba(167,139,250,.3);border-radius:5px;padding:2px 6px;white-space:nowrap;}
.strat-section{margin-bottom:24px;}
.strat-section-hdr{display:flex;align-items:center;gap:9px;margin:0 2px 11px;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,.07);}
.strat-section-hdr .nm{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.strat-section-hdr .ct{font-size:10px;color:var(--dim);background:rgba(255,255,255,.05);border-radius:5px;padding:1px 7px;}
.strat-sec-empty{font-size:12px;color:var(--dim);font-style:italic;padding:2px 2px 0;}
.strat-minstack{display:flex;flex-direction:column;gap:4px;margin-top:11px;}
.strat-min{display:flex;align-items:center;gap:10px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.022);border:1px solid rgba(255,255,255,.05);opacity:.7;transition:opacity .12s,background .12s;}
.strat-min:hover{opacity:1;background:rgba(255,255,255,.045);}
.strat-min .dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 6px rgba(52,211,153,.55);}
.strat-min.denied .dot{background:var(--red);box-shadow:0 0 6px rgba(248,113,113,.55);}
.strat-min .mt{flex:1;min-width:0;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.strat-min .mc{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);flex-shrink:0;}
.strat-min .mr{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:5px;color:var(--dim);font-size:11px;padding:2px 8px;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .12s;}
.strat-min .mr:hover{color:var(--w);border-color:rgba(110,168,255,.4);background:rgba(110,168,255,.08);}
.strat-denied{margin-top:14px;border:1px solid rgba(248,113,113,.16);border-radius:12px;background:rgba(248,113,113,.03);overflow:hidden;}
.strat-denied-hdr{display:flex;align-items:center;gap:9px;padding:11px 16px;cursor:pointer;user-select:none;transition:background .12s;}
.strat-denied-hdr:hover{background:rgba(248,113,113,.05);}
.strat-denied-hdr .dl{font-size:12px;font-weight:600;color:rgba(248,113,113,.85);}
.strat-denied-hdr .dc{font-size:10px;color:var(--dim);background:rgba(255,255,255,.05);border-radius:5px;padding:1px 7px;}
.strat-denied-body{padding:4px 13px 13px;display:flex;flex-direction:column;gap:4px;}
/* ── Quick Capture & Priority ─────────────────────────────────────────── */
.strat-capture{background:rgba(14,20,42,.97);border:1px solid rgba(255,255,255,.09);border-radius:14px;margin-bottom:18px;overflow:hidden;}
.strat-cap-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;cursor:pointer;user-select:none;transition:background .15s;}
.strat-cap-hdr:hover{background:rgba(255,255,255,.025);}
.strat-cap-title{font-size:12.5px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.strat-cap-cnt{background:rgba(251,146,60,.18);color:var(--p);border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700;}
.strat-cap-body{padding:0 18px 18px;border-top:1px solid rgba(255,255,255,.06);}
.strat-cap-ta{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:13px;resize:vertical;min-height:72px;outline:none;margin-top:14px;transition:border-color .15s;display:block;}
.strat-cap-ta:focus{border-color:rgba(110,168,255,.45);}
.strat-cap-save{margin-top:8px;background:rgba(110,168,255,.1);border:1px solid rgba(110,168,255,.28);border-radius:7px;padding:6px 16px;color:var(--w);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s;}
.strat-cap-save:hover{background:rgba(110,168,255,.18);}
.cap-list{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
.cap-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;}
.cap-ts{font-size:10px;color:var(--dim);white-space:nowrap;flex-shrink:0;padding-top:2px;}
.cap-text{font-size:12.5px;color:var(--muted);flex:1;line-height:1.55;}
.cap-acts{display:flex;gap:5px;flex-shrink:0;}
.cap-promote{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.22);border-radius:6px;padding:4px 10px;font-size:10.5px;color:rgba(52,211,153,.85);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.cap-promote:hover{background:rgba(52,211,153,.14);border-color:rgba(52,211,153,.45);}
.cap-del{background:transparent;border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:4px 8px;font-size:10.5px;color:var(--dim);cursor:pointer;font-family:inherit;transition:all .15s;}
.cap-del:hover{border-color:rgba(248,113,113,.35);color:var(--red);}
/* ── Toolkit view ───────────────────────────── */
.tk-search{width:100%;padding:9px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;margin-bottom:20px;display:block;}
.tk-search::placeholder{color:var(--dim);}
.tk-search:focus{border-color:rgba(110,168,255,.5);background:rgba(255,255,255,.06);}
.tk-grp{margin-bottom:26px;}
.tk-grp-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.tk-grp-lbl{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);}
.tk-grp-ctx{font-size:10px;color:var(--dim);background:rgba(255,255,255,.05);padding:2px 7px;border-radius:4px;white-space:nowrap;}
.tk-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:9px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);margin-bottom:5px;transition:background .12s,border-color .12s;}
.tk-row:hover{background:rgba(110,168,255,.05);border-color:rgba(110,168,255,.16);}
.tk-cmd{font-family:'Courier New',monospace;font-size:12px;color:var(--w);background:rgba(110,168,255,.1);padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:1px;}
.tk-info{flex:1;min-width:0;}
.tk-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.tk-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.tk-trigger{font-size:11px;color:var(--dim);margin-top:3px;}
.tk-copy{background:none;border:1px solid rgba(255,255,255,.08);border-radius:5px;color:var(--dim);font-size:10px;padding:3px 7px;cursor:pointer;font-family:inherit;flex-shrink:0;align-self:flex-start;transition:all .12s;white-space:nowrap;}
.tk-copy:hover{color:var(--w);border-color:rgba(110,168,255,.4);background:rgba(110,168,255,.08);}
.tk-copy.done{color:var(--green);border-color:rgba(52,211,153,.4);}
.tk-hidden{display:none!important;}
</style>
</head>
<body>
<div class="app">
  <aside id="side"></aside>
  <main id="main"></main>
</div>
<div id="ppb" style="display:none;position:fixed;inset:0;z-index:999;cursor:default;" onclick="closePP()"></div>
<div id="toast"></div>
<div id="pp" class="pp" style="display:none;"></div>
<script src="data.js"></script>
<script src="graph-metrics.js" onerror="void 0"></script>
<script src="strategy.js" onerror="void 0"></script>
<script src="usage.js" onerror="void 0"></script>
<script src="agents.js" onerror="void 0"></script>
<script src="github_actions.js" onerror="void 0"></script>
<script src="codebase/codebase-meta.js" onerror="void 0"></script>
<script>
const D=window.DASHBOARD_DATA;
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const WORK=['bimpossible','addins','site','families'];
const PERS=['pickem','laundry'];
const PILL={active:'p-active',gated:'p-gated',paused:'p-paused',dormant:'p-dormant'};
const DOTC={active:'var(--green)',gated:'var(--amber)',paused:'#b0bac8',dormant:'var(--grey)'};
const SC={CLOSED:'var(--green)',SHIPPED:'var(--green)',BUILT:'var(--amber)',PARTIAL:'var(--w)',ACTIVE:'var(--w)','SCOPE-LOCK':'var(--w2)',PLANNED:'var(--dim)',PENDING:'var(--dim)'};
const SEVS=['critical','high','medium','low','info'];
const SEVLBL={critical:'Critical',high:'High',medium:'Medium',low:'Low',info:'Info'};
const ICO={
  grid:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
  layers:'<svg viewBox="0 0 24 24"><path d="M12 3 2 8.5 12 14l10-5.5L12 3z"/><path d="m2 13.5 10 5.5 10-5.5"/></svg>',
  wrench:'<svg viewBox="0 0 24 24"><path d="M14.7 6.3a4.5 4.5 0 0 0-6 5.6L3 17.6V21h3.4l5.7-5.7a4.5 4.5 0 0 0 5.6-6L14.6 12l-2.6-2.6 2.7-3.1z"/></svg>',
  globe:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>',
  trophy:'<svg viewBox="0 0 24 24"><path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M7 6H4a3 3 0 0 0 3 5M17 6h3a3 3 0 0 1-3 5M12 14v4m-4 3h8m-4-3v3"/></svg>',
  box:'<svg viewBox="0 0 24 24"><path d="M21 8 12 3 3 8v8l9 5 9-5V8z"/><path d="m3 8 9 5 9-5M12 13v8"/></svg>',
  cube:'<svg viewBox="0 0 24 24"><path d="M12 2 4 6.5v9L12 20l8-4.5v-9L12 2z"/><path d="M4 6.5 12 11l8-4.5M12 11v9"/></svg>',
  shield:'<svg viewBox="0 0 24 24"><path d="M12 3 5 6v5c0 4.2 2.9 7.9 7 9 4.1-1.1 7-4.8 7-9V6l-7-3z"/><path d="m9 12 2 2 4-4"/></svg>',
  graph:'<svg viewBox="0 0 24 24"><circle cx="5" cy="5" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="12" cy="19" r="2"/><line x1="5" y1="7" x2="12" y2="17"/><line x1="19" y1="7" x2="12" y2="17"/><line x1="5" y1="5" x2="19" y2="5"/></svg>',
  idea:'<svg viewBox="0 0 24 24"><path d="M9 21h6m-3-18a6 6 0 0 1 3.75 10.67C15 15 15 16 15 17H9c0-1 0-2-.75-2.33A6 6 0 0 1 12 3z"/></svg>',
  usage:'<svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>',
  agents:'<svg viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="11" rx="2"/><path d="M12 4v4M2 13v3M22 13v3"/><circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/></svg>',
  health:'<svg viewBox="0 0 24 24"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg>',
  toolkit:'<svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>'
};
window._PR={};

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function pathLink(p,label){const uri='vscode://file/'+p.replace(/\\/g,'/');return`<a class="path-chip" href="${esc(uri)}" title="${esc(p)}">${esc(label||p)}</a>`;}
let _toastTimer;
function copyPath(el,path){
  navigator.clipboard.writeText(path).catch(()=>{const i=Object.assign(document.createElement('input'),{value:path,style:'position:fixed;opacity:0'});document.body.appendChild(i);i.select();document.execCommand('copy');i.remove();});
  el.classList.add('copied');setTimeout(()=>el.classList.remove('copied'),1400);
  const t=document.getElementById('toast');t.textContent='📋 Path copied — paste in Explorer, VS Code, or Terminal';t.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
function daysAgo(iso){if(!iso)return null;return Math.round((TODAY-new Date(iso+'T00:00:00'))/86400000);}
function ageHtml(iso){
  const n=daysAgo(iso);if(n===null)return'';
  const t=n<=0?'today':n===1?'yesterday':n+'d ago';
  const c=n>=14?'color:var(--red)':n>=7?'color:var(--amber)':'color:var(--dim)';
  return`<span style="${c}">${t}</span>`;
}
function overallPct(p){
  if(!p||!p.progress||!p.progress.phases||!p.progress.phases.length)return null;
  return Math.round(p.progress.phases.reduce((s,x)=>s+x.pct,0)/p.progress.phases.length);
}
function auditSummary(p){
  if(!p.audit)return null;
  const c=p.audit.counts||{};
  const total=SEVS.reduce((s,k)=>s+(c[k]||0),0);
  const hot=(c.critical||0)+(c.high||0);
  return{total,hot,c};
}
function getTC(tasks){const c={done:0,active:0,pending:0,blocked:0};tasks.forEach(t=>{if(c[t.status]!==undefined)c[t.status]++;});return c;}
function buildTS(c){
  const p=[];
  if(c.done)p.push('<span class="ts-done">&#10003;'+c.done+'</span>');
  if(c.active)p.push('<span class="ts-active">&#9679;'+c.active+'</span>');
  if(c.pending)p.push('<span>&#9675;'+c.pending+'</span>');
  if(c.blocked)p.push('<span class="ts-blocked">&#10007;'+c.blocked+'</span>');
  return p.length?'<div class="tsumm">'+p.join('')+'</div>':'';
}
const TICONS={done:'&#10003;',active:'&#9679;',pending:'&#9675;',blocked:'&#10007;'};

function donut(pct,size,label){
  const sw=Math.max(7,Math.round(size*.082));
  const r=(size-sw)/2-1,c=2*Math.PI*r,off=c*(1-pct/100);
  const fs=Math.round(size*.2);
  const uid='dg'+size+'_'+Math.random().toString(36).slice(2,6);
  return`<div class="donut" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}">
      <defs><linearGradient id="${uid}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="var(--w)"/><stop offset="100%" stop-color="var(--w2)"/>
      </linearGradient></defs>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--track)" stroke-width="${sw}"/>
      <circle class="val" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#${uid})" stroke-width="${sw}"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}" data-off="${off}"/>
    </svg>
    <div class="mid"><span class="n num" style="font-size:${fs}px">${pct}%</span>
    ${label?`<span class="t">${esc(label)}</span>`:''}</div>
  </div>`;
}

function heat(series,isP){
  const max=Math.max(...series.concat([1]));
  const base=new Date(D.activitySince+'T00:00:00');
  return'<div class="heat'+(isP?' pers':'')+'">'+series.map((v,i)=>{
    const d=new Date(base.getTime()+i*86400000);
    const lv=v===0?0:Math.min(4,Math.ceil(v/max*4));
    const label=`${d.getMonth()+1}/${d.getDate()}: ${v} commit${v!==1?'s':''}`;
    return`<div class="hc h${lv}" title="${label}"></div>`;
  }).join('')+'</div>';
}

function miniPhases(phases,isP){
  if(!phases||!phases.length)return'';
  return'<div class="mphases'+(isP?' pers-bars':'')+'">'+
    phases.slice(0,4).map(ph=>'<div class="mph">'+
      `<span class="lbl">${esc(ph.name)}</span>`+
      `<div class="bar"><i data-w="${ph.pct}" class="${ph.pct>=100?'full':''}"></i></div>`+
      `<span class="pv num">${ph.pct}%</span>`+
    '</div>').join('')+'</div>';
}

function phaseBars(prog,pid){
  if(!prog)return'<p class="empty">no phase data yet</p>';
  return'<div class="phases">'+prog.phases.map((ph,i)=>{
    const key=(pid||'ph')+'_'+i;window._PR[key]=ph;
    const has=ph.tasks&&ph.tasks.length;
    const cnt=has?getTC(ph.tasks):null;
    return`<div class="ph${has?' ph-click':''}"${has?` data-pk="${key}"`:''}>`+
      `<div class="row"><span class="nm">${esc(ph.name)}${ph.note?` <span class="nt">– ${esc(ph.note)}</span>`:''}</span><span class="pv num">${ph.pct}%</span></div>`+
      `<div class="bar"><i data-w="${ph.pct}" class="${ph.pct>=100?'full':''}"></i></div>`+
      (cnt?buildTS(cnt):'')+'</div>';
  }).join('')+'</div>';
}

function areaChart(series,w,h,id){
  const n=series.length;if(!n)return'';
  const max=Math.max(...series.concat([1]));
  const pL=6,pR=6,pT=8,pB=16,iw=w-pL-pR,ih=h-pT-pB;
  const pts=series.map((v,i)=>[pL+iw*i/(n-1),pT+ih*(1-v/max)]);
  let d='M'+pts[0][0]+','+pts[0][1];
  for(let i=1;i<n;i++){const p0=pts[i-1],p1=pts[i],mx=(p0[0]+p1[0])/2;d+=` C${mx},${p0[1]} ${mx},${p1[1]} ${p1[0]},${p1[1]}`;}
  const area=d+` L${pts[n-1][0]},${pT+ih} L${pts[0][0]},${pT+ih} Z`;
  const start=new Date(D.activitySince+'T00:00:00');
  let ticks='';
  for(let i=0;i<n;i+=Math.ceil(n/5)){
    const dt=new Date(start.getTime()+i*86400000);
    ticks+=`<text class="axis" x="${pL+iw*i/(n-1)}" y="${h-3}" text-anchor="middle">${dt.getMonth()+1}/${dt.getDate()}</text>`;
  }
  const dots=pts.map((p,i)=>series[i]>0?`<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="var(--w)"><title>${series[i]} commits</title></circle>`:'').join('');
  return`<div class="chart-wrap"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="max-height:${h}px">
    <defs><linearGradient id="ag${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(110,168,255,.38)"/><stop offset="100%" stop-color="rgba(110,168,255,0)"/>
    </linearGradient></defs>
    <line x1="${pL}" y1="${pT+ih}" x2="${w-pR}" y2="${pT+ih}" stroke="var(--track)"/>
    <path d="${area}" fill="url(#ag${id})"/>
    <path d="${d}" fill="none" stroke="var(--w)" stroke-width="1.8"/>
    ${dots}${ticks}</svg></div>`;
}

function badges(p,isP){
  const b=[];
  const as=auditSummary(p);
  if(as){
    if(as.total===0)b.push('<span class="badge ok">✓ Audit clear</span>');
    else b.push(`<span class="badge ${as.hot?'bad':'warn'}">${as.total} open findings</span>`);
  }
  const dec=(p.pendingDecisions||[]).length;
  if(dec)b.push(`<span class="badge warn">◆ ${dec} decision${dec>1?'s':''}</span>`);
  const blk=(p.blockers||[]).length;
  if(blk)b.push(`<span class="badge bad">⬥ ${blk} blocker${blk>1?'s':''}</span>`);
  const rem=(p.reminders||[]).length;
  if(rem)b.push(`<span class="badge">${rem} reminder${rem>1?'s':''}</span>`);
  if(p.git&&p.git.warn)b.push('<span class="badge warn">⚠ git</span>');
  return b.length?`<div class="badges">${b.join('')}</div>`:'';
}

function wavePanel(w){
  const sm=w.summary||{};
  let h='<div class="wave-sum">';
  [['done',sm.done,'var(--green)'],['built',sm.built,'var(--amber)'],['in flight',sm.inFlight,'var(--w)'],['ahead',sm.ahead,'var(--dim)']].forEach(([l,n,c])=>{
    h+=`<div class="wpip"><div class="wn" style="color:${c}">${n||0}</div><div class="wl">${l}</div></div>`;
  });
  h+='</div>';
  if(w.lastCompleted){
    h+=`<p style="font-size:11px;color:var(--dim);margin-bottom:10px">Last done: <b style="color:var(--muted)">Wave ${esc(w.lastCompleted.id)}</b> ${esc(w.lastCompleted.title||'')}${w.lastCompleted.date?' ('+esc(w.lastCompleted.date)+')':''}</p>`;
  }
  h+=(w.current||[]).map(v=>{
    const c=SC[v.status]||'var(--dim)';
    return`<div class="wi">
      <span class="wst" style="background:${c}22;color:${c}">Wave ${esc(v.id)}</span>
      <div class="wbody"><div class="wtitle">${esc(v.status)} – ${esc(v.title)}</div>${v.note?`<div class="wnote">${esc(v.note)}</div>`:''}</div>
    </div>`;
  }).join('');
  const realDrift=(w.drift||[]).filter(d=>!d.startsWith('No wave-'));
  if(realDrift.length)h+=`<div class="gwarn" style="margin-top:8px">⚠ ${realDrift.map(esc).join('<br>⚠ ')}</div>`;
  return h;
}

function tlItem(raw){
  const m=raw.match(/^(\d{4}-\d{2}-\d{2})\s*[-–]\s*/);
  const date=m?m[1]:'';
  const text=m?raw.slice(m[0].length):raw;
  const n=daysAgo(date);
  const dc=n===null?'':n<=0?'now':n<=3?'new':'';
  return`<div class="tl-i"><div class="tl-dot ${dc}"></div><div class="tl-body"><div class="tl-date">${esc(date)}</div><div class="tl-text">${esc(text)}</div></div></div>`;
}

function sevBadge(k){return`<span class="sev sev-${k}">${SEVLBL[k]}</span>`;}

// ── Phase popup ────────────────────────────────────────────────────────────
function openPP(key,el){
  const ph=window._PR[key];if(!ph)return;
  const pp=document.getElementById('pp');
  let html=`<div class="pp-head"><span class="pp-title">${esc(ph.name)}</span><span class="pp-pct num">${ph.pct}%</span><button class="pp-x" onclick="closePP()">&#10005;</button></div>`+
    `<div class="pp-mb"><div class="pp-mb-fill" style="width:0%" data-w="${ph.pct}"></div></div>`;
  if(ph.note)html+=`<div class="pp-note">${esc(ph.note)}</div>`;
  if(ph.tasks&&ph.tasks.length){
    html+='<div class="pp-tasks">'+ph.tasks.map(t=>{
      const st=t.status||'pending';
      return`<div class="tr"><span class="ti ${st}">${TICONS[st]||'&#9675;'}</span><div class="tb"><div class="tl2">${esc(t.label)}</div>${t.note?`<div class="tn">${esc(t.note)}</div>`:''}</div></div>`;
    }).join('')+'</div>';
  }
  pp.innerHTML=html;pp.style.visibility='hidden';pp.style.display='block';
  document.getElementById('ppb').style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const f=pp.querySelector('.pp-mb-fill');if(f)f.style.width=f.dataset.w+'%';
  }));
  const rect=el.getBoundingClientRect(),pw=pp.offsetWidth,ph2=pp.offsetHeight;
  const vw=window.innerWidth,vh=window.innerHeight;
  let top=rect.bottom+8;if(top+ph2>vh-16)top=Math.max(10,rect.top-ph2-8);
  let left=rect.left;if(left+pw>vw-16)left=vw-pw-16;if(left<10)left=10;
  pp.style.top=top+'px';pp.style.left=left+'px';pp.style.visibility='';
}
function closePP(){document.getElementById('pp').style.display='none';document.getElementById('ppb').style.display='none';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePP();});

function doReload(btn){btn.classList.add('spinning');btn.disabled=true;setTimeout(()=>location.reload(),300);}

function animate(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.bar i').forEach(b=>{b.style.width=b.dataset.w+'%';});
    document.querySelectorAll('.donut circle.val').forEach(c=>{c.style.strokeDashoffset=c.dataset.off;});
  }));
}

// ── Sidebar ───────────────────────────────────────────────────────────────
function buildSide(){
  const side=document.getElementById('side');
  const totH=D.projects.reduce((s,p)=>{const a=auditSummary(p);return s+(a?a.hot:0);},0);
  const totO=D.projects.reduce((s,p)=>{const a=auditSummary(p);return s+(a?a.total:0);},0);
  const gmL=window.GRAPH_METRICS&&window.GRAPH_METRICS.length;
  let h=`<div class="logo"><div class="mark">${ICO.layers}</div><div><h1>Mission Control</h1><span>F:\\AI-Dev</span></div></div>`;
  h+=navI('overview',ICO.grid,'Overview');
  h+=navI('audit',ICO.shield,'Audit',totO?(totO+''):'✓',totH?'color:var(--red)':'color:var(--green)');
  h+=navI('graph',ICO.graph,'Codebase',gmL?gmL+'':'');
  const _si=getStrategyItems(),_sp=_si.filter(i=>i.status==='pending').length,_sa=_si.filter(i=>i.status==='approved').length;
  h+=navI('strategy',ICO.idea,'Strategy',_sp?_sp+'?':'');
  const _u=window.DASHBOARD_USAGE;
  h+=navI('usage',ICO.usage,'Usage',_u?('$'+(_u.allTime.cost>=1000?(_u.allTime.cost/1000).toFixed(_u.allTime.cost>=10000?0:1)+'K':Math.round(_u.allTime.cost))):'');
  h+=navI('toolkit',ICO.toolkit,'Toolkit');
  h+='<div class="grp-sep"></div><div class="grp-lbl">BIMpossible Work</div>';
  WORK.forEach(id=>{const p=D.projects.find(q=>q.id===id);if(p)h+=navI(p.id,ICO[p.icon]||ICO.cube,p.name,pctStr(p),null,p.status,false);});
  h+='<div class="grp-sep"></div><div class="grp-lbl personal">Personal</div>';
  PERS.forEach(id=>{const p=D.projects.find(q=>q.id===id);if(p)h+=navI(p.id,ICO[p.icon]||ICO.cube,p.name,pctStr(p),null,p.status,true);});
  const n=daysAgo(D.generated);
  h+=`<div class="side-foot">Data: ${D.generated} (${n<=0?'today':n+'d ago'})${n>=3?'<br><span class="warn">⚠ stale — say "refresh dashboard"</span>':''}<br>Auto-syncs on every push</div>`;
  h+=`<button class="reload-btn" onclick="doReload(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9 9 0 0 1 6.3 2.55L21 9"/><path d="M21 3v6h-6"/><path d="M21 12a9 9 0 0 1-9 9 9 9 0 0 1-6.3-2.55L3 15"/><path d="M3 21v-6h6"/></svg>Reload data</button>`;
  side.innerHTML=h;
  side.querySelectorAll('.nav').forEach(el=>{el.onclick=()=>show(el.dataset.id);});
}
function pctStr(p){const pc=overallPct(p);return pc!==null?pc+'%':'';}
function navI(id,ico,name,extra,extraStyle,status,isP){
  return`<div class="nav${isP?' pers':''}" data-id="${id}">
    ${ico}<span class="nm">${esc(name)}</span>
    ${extra?`<span class="pc num" style="${extraStyle||''}">${esc(String(extra))}</span>`:''}
    ${status?`<span class="dot" style="background:${DOTC[status]||'var(--grey)'}"></span>`:''}
  </div>`;
}

// ── Overview ──────────────────────────────────────────────────────────────
function overview(){
  const act=D.projects.filter(p=>p.status==='active').length;
  const dec=D.projects.reduce((s,p)=>s+(p.pendingDecisions||[]).length,0);
  const blk=D.projects.reduce((s,p)=>s+(p.blockers||[]).length,0);
  const auHot=D.projects.reduce((s,p)=>{const a=auditSummary(p);return s+(a?a.hot:0);},0);
  const totalActs=D.projects[0].activity.map((_,i)=>D.projects.reduce((s,p)=>s+((p.activity||[])[i]||0),0));
  const totalC=totalActs.reduce((a,b)=>a+b,0);
  let h='<div class="crumbs">Overview</div><h2 class="page">Mission Control</h2>'
    +'<p class="sub">Every project at a glance. Click any card to drill in. Heat grid = 14-day commit activity.</p>';

  // Stat strip
  h+=`<div class="stat-row fade">
    <div class="stat ok"><div class="v num">${act}</div><div class="l">Active Projects</div></div>
    <div class="stat${dec?' warn':''}"><div class="v num">${dec}</div><div class="l">Decisions Waiting</div></div>
    <div class="stat${blk?' bad':''}"><div class="v num">${blk}</div><div class="l">Blockers</div></div>
    <div class="stat${auHot?' bad':' ok'}" data-id="audit"><div class="v num">${auHot||'✓'}</div><div class="l">Audit Crit/High Open</div></div>
    <div class="stat info"><div class="v num">${totalC}</div><div class="l">Commits (14 days)</div></div>
  </div>`;

  // ── BIMpossible work section ──
  h+='<div class="sec-hd fade" style="animation-delay:.04s"><div class="t">BIMpossible Work</div><div class="ln"></div></div>';
  h+='<div class="g g4 fade" style="animation-delay:.06s;margin-bottom:28px;">';

  // Hero card — BIMpossible Platform (spans all 4 cols)
  const bp=D.projects.find(p=>p.id==='bimpossible');
  if(bp){
    const pct=overallPct(bp);
    h+=`<div class="card glow span4 ov-hero" style="padding:22px 24px">`;
    h+=`<div style="display:flex;gap:20px;flex-wrap:wrap">`;
    // Left column
    h+=`<div style="flex:1;min-width:280px">`;
    h+=`<div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:14px">`;
    h+=pct!==null?donut(pct,90,''):'';
    h+=`<div style="flex:1"><div style="font-family:Sora;font-size:17px;font-weight:700">${esc(bp.name)}</div>`
      +`<div style="font-size:11.5px;color:var(--muted);margin:3px 0 8px">${esc(bp.oneLiner||'')}</div>`

  return h;
}

  const wa=D.projects.filter(p=>p.audit);

  wa.forEach(p=>SEVS.forEach(k=>agg[k]+=(p.audit.counts[k]||0)));
  const totO=SEVS.reduce((s,k)=>s+agg[k],0);

  let h='<div class="crumbs">Audit</div><h2 class="page">Audit Findings</h2>'
    +'<p class="sub">Open findings across every audited project. BIMpossible: weekly (Mon 6 AM). Any project: on-demand. Each run writes a report; the next dashboard refresh ingests it.</p>';
  h+=`<div class="card fade"><h3>Open findings by severity</h3><div class="sevcounts">`;
  SEVS.forEach(k=>{
    h+=`<div class="sevpip${(k==='critical'||k==='high')&&agg[k]?' hot':''}"><span class="n" style="color:${agg[k]?(k==='critical'?'var(--red)':k==='high'?'var(--amber)':'var(--text)'):'var(--dim)'}">${agg[k]}</span><span class="k">${SEVLBL[k]}</span></div>`;

    h+=`<div class="card fade" style="animation-delay:${0.08+i*.04}s;margin-top:13px"><h3>${esc(p.name)} — open findings</h3>`

  });

// ── Graph view ───────────────────────────────────────────────────────────
function glChart(series,labels,w,h,id){
  const n=series.length;if(!n)return'';
  const max=Math.max(...series),min=Math.min(...series),range=max-min||1;
  const pL=32,pR=6,pT=8,pB=20,iw=w-pL-pR,ih=h-pT-pB;
  const pts=series.map((v,i)=>[pL+iw*(n>1?i/(n-1):.5),pT+ih*(1-(v-min)/range)]);
  let d='M'+pts[0][0]+','+pts[0][1];
  for(let i=1;i<n;i++){const p0=pts[i-1],p1=pts[i],mx=(p0[0]+p1[0])/2;d+=` C${mx},${p0[1]} ${mx},${p1[1]} ${p1[0]},${p1[1]}`;}
  const area=d+` L${pts[n-1][0]},${pT+ih} L${pts[0][0]},${pT+ih} Z`;
  const step=Math.ceil(n/5);let ticks='';
  for(let i=0;i<n;i+=step)ticks+=`<text class="axis" x="${pL+iw*(n>1?i/(n-1):.5)}" y="${h-3}" text-anchor="middle">${esc(labels[i])}</text>`;
  const yTicks=[min,max].map((v,k)=>`<text class="axis" x="${pL-3}" y="${k===0?pT+ih:pT+4}" text-anchor="end">${Math.round(v).toLocaleString()}</text>`).join('');
  const dots=pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="var(--w)"><title>${series[i].toLocaleString()}</title></circle>`).join('');
  return`<div class="chart-wrap"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="max-height:${h}px">
    <defs><linearGradient id="gl${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(110,168,255,.32)"/><stop offset="100%" stop-color="rgba(110,168,255,0)"/></linearGradient></defs>
    <line x1="${pL}" y1="${pT+ih}" x2="${w-pR}" y2="${pT+ih}" stroke="var(--track)"/>
    <path d="${area}" fill="url(#gl${id})"/><path d="${d}" fill="none" stroke="var(--w)" stroke-width="1.8"/>
    ${dots}${ticks}${yTicks}</svg></div>`;
}
function gnBar(nodes){
  if(!nodes||!nodes.length)return'';
  const mx=Math.max(...nodes.map(n=>n.edges));
  return'<div style="display:flex;flex-direction:column;gap:6px;padding:2px 0">'+nodes.map(n=>{
    const pct=Math.round(n.edges/mx*100);
    const lbl=n.name.length>32?n.name.slice(0,30)+'…':n.name;
    return`<div style="display:flex;align-items:center;gap:9px">
      <span style="min-width:180px;font-size:11.5px;font-family:Sora;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(lbl)}</span>
      <div style="flex:1;height:6px;border-radius:4px;background:var(--track);overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--w),var(--w2));transition:width .9s cubic-bezier(.22,1,.36,1)"></div></div>
      <span class="num" style="min-width:26px;font-size:11px;color:var(--dim);text-align:right">${n.edges}</span></div>`;
  }).join('')+'</div>';
}
function graphMetricsBody(){
  const gm=window.GRAPH_METRICS;
  if(!gm||!gm.length)return'<p class="sub">No metrics yet — run Push-And-Verify.ps1 to capture the first snapshot.</p>';
  const L=gm[gm.length-1],P=gm.length>1?gm[gm.length-2]:null;
  function delta(cur,prev,lb){
    if(!P)return'<span style="color:var(--dim);font-size:11px">first push</span>';
    const d=cur-prev;if(d===0)return'<span style="color:var(--dim);font-size:11px">—</span>';
    const good=lb?d<0:d>0;
    return`<span style="color:${good?'var(--green)':'var(--red)'};font-size:11px;font-weight:600">${d>0?'+':''}${d}</span>`;
  }
  let h='<p class="sub">AST-extracted from BIMpossible backend. Tracks codebase structure over time.</p>';
  h+=`<div class="g gmg fade">`
    +`<div class="stat info"><div class="v num">${L.nodes.toLocaleString()}</div><div class="l">Nodes</div><div style="margin-top:4px">${delta(L.nodes,P?P.nodes:0,false)}</div></div>`
    +`<div class="stat info"><div class="v num">${L.edges.toLocaleString()}</div><div class="l">Edges</div><div style="margin-top:4px">${delta(L.edges,P?P.edges:0,false)}</div></div>`
    +`<div class="stat info"><div class="v num">${L.communities}</div><div class="l">Communities</div><div style="margin-top:4px">${delta(L.communities,P?P.communities:0,false)}</div></div>`
    +`<div class="stat${L.cycles>15?' warn':''}"><div class="v num">${L.cycles}</div><div class="l">Import Cycles</div><div style="margin-top:4px">${delta(L.cycles,P?P.cycles:0,true)}</div></div>`
    +`</div>`;
  h+=`<p style="font-size:11.5px;color:var(--dim);margin:12px 0 14px">Snapshot: ${esc(L.ts.slice(0,10))} · commit <code>${esc(L.sha)}</code> · ${gm.length} push${gm.length!==1?'es':''} tracked</p>`;
  h+=`<div class="g g2 fade" style="animation-delay:.06s">`;
  if(gm.length>1){
    h+=`<div class="card"><h3>Nodes over time</h3>${glChart(gm.map(m=>m.nodes),gm.map(m=>m.ts.slice(5,10)+' '+m.sha),360,120,'gn')}</div>`;
    h+=`<div class="card"><h3>Import cycles over time</h3>${glChart(gm.map(m=>m.cycles),gm.map(m=>m.ts.slice(5,10)+' '+m.sha),360,120,'gc')}</div>`;
  }else{
    h+=`<div class="card"><h3>Nodes over time</h3><p class="empty" style="padding:20px 0">Trends appear after the next push.</p></div>`;
    h+=`<div class="card"><h3>Import cycles over time</h3><p class="empty" style="padding:20px 0">Trends appear after the next push.</p></div>`;
  }
  h+=`</div>`;
  const gn=L.godNodes||[];
  if(gn.length)h+=`<div class="card fade" style="animation-delay:.09s;margin-top:13px"><h3>Top god nodes — highest blast radius</h3>${gnBar(gn)}</div>`;
  h+=`<div class="card fade" style="animation-delay:.11s;margin-top:13px"><h3>Quick links</h3><div class="links">`
    +`<a class="path-chip" href="#" onclick="window._ctab='network';show('graph');return false;">Interactive node graph</a>`
    +`<a class="path-chip" href="#" onclick="window._ctab='dashboard';show('graph');return false;">Standalone dashboard</a>`
    +`<a class="path-chip" href="#" onclick="window._ctab='report';show('graph');return false;">Graph report</a>`
    +`</div></div>`;
  return h;
}

const SCAT_COLOR={blindspot:'var(--amber)',idea:'var(--w)',outlook:'var(--w2)',custom:'var(--green)',watchlist:'var(--p)'};
const SCAT_LABEL={blindspot:'Blind Spot',idea:'Idea',outlook:'Outlook',custom:'Custom',watchlist:'Watchlist'};
const SSTAT_COLOR={pending:'var(--dim)',approved:'var(--green)',researching:'var(--w)',denied:'var(--red)'};
const SPRI={p1:{c:'var(--red)',l:'P1'},p2:{c:'var(--amber)',l:'P2'},p3:{c:'var(--w)',l:'P3'}};
const SPRI_NEXT={p1:'p2',p2:'p3',p3:'','':'p1'};

function getStrategyItems(){
  const rd=(id,k)=>{try{return localStorage.getItem('strat.'+k+'.'+id);}catch(e){return null;}};
  const enrich=it=>({
    ...it,
    status:rd(it.id,'s')||it.status||'pending',
    priority:rd(it.id,'p')||it.priority||'',
    ip:!!rd(it.id,'ip'),          // handed off to Cowork → In Progress
    cmp:rd(it.id,'cmp')==='1',    // ledger Promoted=yes → Completed
    unc:rd(it.id,'unc')==='1'     // restored-from-completed override (forces Promoted=no next sync)
  });
  const base=(window.STRATEGY_DATA?.items||[]).map(enrich);
  let custom=[];
  try{custom=JSON.parse(localStorage.getItem('strat.custom')||'[]').map(enrich);}catch(e){}
  return [...base,...custom];
}
// Workflow lane for a card — drives rendering + counts.
function _scLane(it){
  if(it.status==='denied')return 'denied';
  if(it.cmp)return 'completed';
  if(it.ip)return 'inprogress';
  if(it.status==='approved'||it.status==='researching')return 'decided';
  return 'pending';
}

function stratAct(id,next){
  let cur='pending';try{cur=localStorage.getItem('strat.s.'+id)||'pending';}catch(e){}
  const ns=cur===next?'pending':next;
  try{
    localStorage.setItem('strat.s.'+id,ns);
    if(ns!=='pending')localStorage.setItem('strat.ts.'+id,new Date().toISOString());
    // A changed/fresh decision restarts the workflow: drop In-Progress + Completed state
    // so it must be re-handed-off via → Cowork. (Deny lands it in the Denied bucket.)
    localStorage.removeItem('strat.ip.'+id);
    localStorage.removeItem('strat.cmp.'+id);
    localStorage.removeItem('strat.unc.'+id);
  }catch(e){}
  show('strategy');
}

// ── Cowork ledger sync — browser-side merge, writes straight to 00_Strategy\Dashboard ──
// One click: read the existing ledger, merge this tab's decisions BY ID (preserving each
// row's Promoted flag + any rows already there), write it back. No JSON, no .bat, no node.
const _SC_COLS=['ID','Title','Category','Status','Priority','Decided','Promoted','Notes'];
const _SC_HEADER='| '+_SC_COLS.join(' | ')+' |';
const _SC_SEP='|'+_SC_COLS.map(()=>'---').join('|')+'|';
const _SC_LEDGER='strategy_decisions_ledger.md';
const _scCell=s=>String(s==null?'':s).replace(/\r?\n+/g,' ').replace(/\|/g,'\\|').replace(/\s+/g,' ').trim();
const _scPriDisp=p=>{p=(p||'').toLowerCase();return p?p.toUpperCase():'—';};
const _scSplit=line=>line.split(/(?<!\\)\|/).slice(1,-1).map(c=>c.trim());
const _scToday=()=>new Date().toISOString().slice(0,10);

function _scTemplate(tableBlock,updatedLine){
  return '<!-- BIMpossible strategy decisions ledger — durable record of decisions made on the\n'
    +'     dashboard Strategy tab, written directly (one click) by the "→ Cowork" button.\n'
    +'     Rows are appended/updated BY ID, never overwritten — history and the Promoted flag\n'
    +'     persist. Claude Cowork READS this as the source of truth. Promotion of approved items\n'
    +'     into BIMpossible_ProgramPlan_*.md is a SEPARATE, human-reviewed step. -->\n\n'
    +'# BIMpossible — Strategy Decisions Ledger\n\n'
    +updatedLine+'\n'
    +'**Source:** dashboard Strategy tab (one-click write), merged by ID (append/update, never overwrite).\n'
    +'One row per decision. **Promoted = yes** means the item has been marked ✓ Done (handled / folded into the ProgramPlan) via the dashboard and archived off the active board; Restore sets it back to no.\n\n'
    +'## Status legend\n'
    +'- `approved` — ratified; eligible for promotion into the ProgramPlan.\n'
    +'- `researching` — needs investigation before deciding.\n'
    +'- `denied` — rejected; kept for the audit trail, never promoted.\n\n'
    +'## Decisions\n\n'
    +tableBlock+'\n';
}

// Pure merge: existing ledger text + decided items → new full text + stats.
function _scMerge(existingText,decided){
  let existingRows=[];
  if(existingText){
    const lines=existingText.split(/\r?\n/);
    const s=lines.findIndex(l=>/^\|\s*ID\s*\|/i.test(l));
    if(s>=0)for(let i=s+2;i<lines.length&&/^\s*\|/.test(lines[i]);i++){const c=_scSplit(lines[i]);if(c.length>=7&&c[0])existingRows.push(c);}
  }
  const order=existingRows.map(r=>r[0]);
  const rowById=new Map(existingRows.map(r=>[r[0],r]));
  const today=_scToday();
  let added=0,updated=0,unchanged=0;
  decided.forEach(d=>{
    const prev=rowById.get(d.id);
    const dec=d.decided_at?String(d.decided_at).slice(0,10):(prev?prev[5]:today);
    const prevPromoted=prev?(prev[6]||'no'):'no';
    const promoted=d.unc?'no':prevPromoted;   // preserve the ledger's Promoted (set during the promotion pass); Restore forces it back to no
    const row=[d.id,_scCell(d.title),_scCell(d.cat),_scCell(d.status),_scPriDisp(d.priority),dec,promoted,_scCell(d.body)];
    if(!prev){added++;order.push(d.id);}
    else if(JSON.stringify(prev)===JSON.stringify(row)){unchanged++;}
    else{updated++;}
    rowById.set(d.id,row);
  });
  const rows=order.map(id=>rowById.get(id));
  const cnt={approved:0,researching:0,denied:0};
  rows.forEach(r=>{const st=(r[3]||'').toLowerCase();if(st in cnt)cnt[st]++;});
  const tableBlock=[_SC_HEADER,_SC_SEP,...rows.map(r=>'| '+r.join(' | ')+' |')].join('\n');
  const updatedLine='**Updated:** '+today+' ('+rows.length+' decisions: '+cnt.approved+' approved · '+cnt.researching+' research · '+cnt.denied+' denied)';
  let out;
  if(!existingText){out=_scTemplate(tableBlock,updatedLine);}
  else{
    const lines=existingText.split(/\r?\n/);
    const s=lines.findIndex(l=>/^\|\s*ID\s*\|/i.test(l));
    if(s>=0){let e=s+1;while(e+1<lines.length&&/^\s*\|/.test(lines[e+1]))e++;out=[...lines.slice(0,s),...tableBlock.split('\n'),...lines.slice(e+1)].join('\n');}
    else if(/^##\s+Decisions/m.test(existingText)){out=existingText.replace(/(^##\s+Decisions.*$)/m,'$1\n\n'+tableBlock);}
    else{out=existingText.replace(/\s*$/,'')+'\n\n## Decisions\n\n'+tableBlock+'\n';}
    if(/^\*\*Updated:\*\*.*$/m.test(out))out=out.replace(/^\*\*Updated:\*\*.*$/m,updatedLine);
    else out=out.replace(/^(#\s+.*$)/m,'$1\n\n'+updatedLine);
  }
  return {out,added,updated,unchanged,total:rows.length,cnt};
}

function _scCollect(){
  return getStrategyItems().filter(i=>i.status!=='pending').map(d=>({
    id:d.id,cat:d.cat,title:d.title,body:d.body||'',status:d.status,priority:d.priority||'',unc:!!d.unc,
    decided_at:(()=>{try{return localStorage.getItem('strat.ts.'+d.id)||null;}catch(e){return null;}})()
  }));
}
// Parse the Promoted column out of an existing ledger → { id: 'yes'|'no' }.
function _scPromotedMap(text){
  const m={};if(!text)return m;
  const lines=text.split(/\r?\n/);
  const s=lines.findIndex(l=>/^\|\s*ID\s*\|/i.test(l));
  if(s>=0)for(let i=s+2;i<lines.length&&/^\s*\|/.test(lines[i]);i++){const c=_scSplit(lines[i]);if(c.length>=7&&c[0])m[c[0]]=(c[6]||'').toLowerCase();}
  return m;
}

function stratExportDecisions(){
  const decided=_scCollect();
  if(!decided.length){_scFlash('Nothing decided yet — approve, research, or deny some items first');return;}
  if(!window.showDirectoryPicker){   // non-Chromium fallback: download JSON, merge via strategy_cowork_sync.mjs
    _scDownload(JSON.stringify({generated:new Date().toISOString(),decisions:decided},null,2));return;
  }
  (async()=>{
    let dir=await _scGetHandle();
    if(dir&&dir.kind!=='directory')dir=null;
    if(dir){let p=await dir.queryPermission({mode:'readwrite'}).catch(()=>'denied');if(p!=='granted')p=await dir.requestPermission({mode:'readwrite'}).catch(()=>'denied');if(p!=='granted')dir=null;}
    if(!dir){
      _scToast('One-time setup: pick the folder  00_Strategy \\ Dashboard  — the dashboard remembers it after this.');
      try{dir=await window.showDirectoryPicker({mode:'readwrite',id:'scledger'});}
      catch(e){if(e.name!=='AbortError')_scFlash('Folder pick cancelled');return;}
      await _scStoreHandle(dir);
    }
    try{
      const fh=await dir.getFileHandle(_SC_LEDGER,{create:true});
      let existing='';try{existing=await (await fh.getFile()).text();}catch(e){}
      const r=_scMerge(existing,decided);
      const w=await fh.createWritable();await w.write(r.out);await w.close();
      // ── Reconcile workflow lanes from the merged ledger ──
      // Triggering Cowork moves every decided item to In Progress; completion is read
      // back from the ledger's Promoted column (set during the promotion pass).
      const pm=_scPromotedMap(r.out);let comp=0;
      decided.forEach(d=>{try{
        if(d.status==='approved'||d.status==='researching'){
          if(!localStorage.getItem('strat.ip.'+d.id))localStorage.setItem('strat.ip.'+d.id,new Date().toISOString());
        }
        if(pm[d.id]==='yes'&&localStorage.getItem('strat.unc.'+d.id)!=='1'){localStorage.setItem('strat.cmp.'+d.id,'1');comp++;}
        else localStorage.removeItem('strat.cmp.'+d.id);
      }catch(e){}});
      show('strategy');
      _scFlash('✅ Synced "'+dir.name+'" — '+r.total+' tracked · '+comp+' completed',true);
    }catch(e){_scFlash('Write failed: '+(e.message||e.name||'error'));}
  })();
}
function _scDownload(json){
  const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(json);a.download=_SC_LEDGER.replace('.md','.json');document.body.appendChild(a);a.click();document.body.removeChild(a);
  _scFlash('📥 Downloaded JSON — this browser cannot write files directly; use Chrome/Edge for one-click, or run strategy_cowork_sync.mjs');
}
function _scFlash(msg,ok){
  const b=document.getElementById('strat-cowork-btn');if(!b)return;
  const orig=b.dataset.orig||b.textContent;b.dataset.orig=orig;b.textContent=msg;if(ok)b.style.color='var(--green)';
  clearTimeout(b._t);b._t=setTimeout(()=>{b.textContent=orig;b.style.color='';},4000);
}
function _scToast(msg){
  const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove('show'),4200);
}
function _scGetHandle(){
  return new Promise(r=>{try{const q=indexedDB.open('sc1',1);q.onupgradeneeded=()=>q.result.createObjectStore('h');q.onsuccess=()=>{const t=q.result.transaction('h','readonly'),g=t.objectStore('h').get('dir');g.onsuccess=()=>r(g.result||null);g.onerror=()=>r(null);};q.onerror=()=>r(null);}catch(e){r(null);}});
}
function _scStoreHandle(h){
  return new Promise(r=>{try{const q=indexedDB.open('sc1',1);q.onupgradeneeded=()=>q.result.createObjectStore('h');q.onsuccess=()=>{const t=q.result.transaction('h','readwrite');t.objectStore('h').put(h,'dir');t.oncomplete=()=>r();t.onerror=()=>r();};q.onerror=()=>r();}catch(e){r();}});
}
function stratPri(id){
  let cur='';try{cur=localStorage.getItem('strat.p.'+id)||'';}catch(e){}
  try{localStorage.setItem('strat.p.'+id,SPRI_NEXT[cur]||'');}catch(e){}

}
function stratRestoreCompleted(id){   // pull a completed item back into the active In-Progress flow

  }catch(e){}

}
function stratRestoreDenied(id){      // reconsider a denied item → back to Pending

    localStorage.removeItem('strat.cmp.'+id);

function stratFilter(type,val){try{localStorage.setItem('strat.'+type,val);}catch(e){}show('strategy');}
function stratShowForm(visible){const f=document.getElementById('strat-form');if(f)f.style.display=visible?'block':'none';}

function getDumps(){let d=[];try{d=JSON.parse(localStorage.getItem('strat.dumps')||'[]');}catch(e){}return d;}
function saveDump(){

function strategyView(){
  const items=getStrategyItems();
  let catF='all',laneF='all',sortF='pri';
  try{
    catF=localStorage.getItem('strat.cat')||'all';
    laneF=localStorage.getItem('strat.status')||'all';
    sortF=localStorage.getItem('strat.sort')||'pri';
  }catch(e){}
  if(laneF==='approved'||laneF==='researching')laneF='decided';   // migrate old saved filters
  if(laneF==='archived')laneF='completed';

  // Assign every card to a workflow lane.
  const lane={};items.forEach(it=>lane[it.id]=_scLane(it));
  const byLane={pending:[],decided:[],inprogress:[],completed:[],denied:[]};
  items.forEach(it=>byLane[lane[it.id]].push(it));
  const activeItems=[...byLane.pending,...byLane.decided,...byLane.inprogress];   // counts toward active totals
  const catCount={all:activeItems.length,blindspot:0,idea:0,outlook:0,watchlist:0,custom:0};
  activeItems.forEach(i=>{if(i.cat in catCount)catCount[i.cat]++;});
  const PRIORD={p1:0,p2:1,p3:2,'':3};
  const sortItems=arr=>{const a=[...arr];if(sortF==='pri')a.sort((x,y)=>PRIORD[x.priority||'']-PRIORD[y.priority||'']);else if(sortF==='alpha')a.sort((x,y)=>x.title.localeCompare(y.title));return a;};

  let h=`<div class="crumbs">Strategy</div><h2 class="page">Strategy &amp; Ideas</h2>
    <p class="sub">Decide → hand off with → Cowork → work moves to In Progress → Completed once the ledger marks it promoted. Resolved items stay stacked under their group; denied items collapse into one bucket. State saved locally.</p>`;

  // Quick Capture panel
  let capOpen=false;try{capOpen=localStorage.getItem('strat.capture')==='1';}catch(e){}
